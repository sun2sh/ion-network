  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      description: 'Beckn HTTP Signature authentication header.

        See `#/components/schemas/Signature` for the expected format.'
      schema:
        $ref: '#/components/schemas/Signature'
  responses:
    Ack:
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Ack'
    AckNoCallback:
      description: Request received but no callback will follow (e.g. agents not found, inventory unavailable, provider
        closed, context.try preview complete).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckNoCallback'
    NackBadRequest:
      description: 'NACK — Bad Request: Malformed or invalid request; the server could not parse or validate the
        payload.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackBadRequest'
    NackUnauthorized:
      description: Invalid or missing authentication credentials; signature could not be verified.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackUnauthorized'
    ServerError:
      description: Internal failure on the network participant's application; the request could not be processed.
        The response body MAY contain an `error` object with additional details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerError'

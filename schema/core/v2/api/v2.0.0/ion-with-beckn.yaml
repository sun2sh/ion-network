        '404':
          $ref: '#/components/responses/NackBadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /raise:
    post:
      summary: Raise a commercial dispute to the ION network for adjudication
      description: 'ION EXTENSION. Not in Beckn 2.0 core. Either BAP or BPP submits a dispute to the ION Gateway
        when bilateral resolution via /update has exceeded the policy-defined SLA. The ION Gateway routes to the
        appropriate ION adjudication service.


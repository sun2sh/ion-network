          properties:
            method:
              type: string
              enum:
              - ORIGINAL_PAYMENT_METHOD
              - PLATFORM_WALLET
              - BANK_TRANSFER
              - LOYALTY_POINTS
              - STORE_CREDIT
              - VOUCHER
            walletId:
              type: string
              description: Required when method=PLATFORM_WALLET
            bankAccount:
              type: object
              additionalProperties: false
              properties:

                  type: string
                  format: date-time
                  example: 2026-04-03 09:00:00+07:00
                end:
                  type: string
                  format: date-time
                  example: 2026-04-03 13:00:00+07:00
              required:
              - start
              - end
            preferredPerformanceMode:
              type: string
              enum:
              - DELIVERY
              - SELF_PICKUP
              - DINE_IN
              - CURBSIDE
        invoicePreferences:
          type: object

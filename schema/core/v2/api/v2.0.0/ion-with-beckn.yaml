    ION_IONProductCertifications:
      type: object
      title: Indonesia Product Certifications
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:ProductCertifications
      required:
      - halalStatus
      properties:
        halalStatus:
          type: string
          enum:
          - HALAL
          - HALAL_PENDING
          - NON_HALAL
          - NOT_APPLICABLE
          description: 'Halal certification status. MANDATORY for all food and beverage products. Strongly recommended for
            cosmetics and pharmaceuticals. HALAL: MUI-certified halal. halalCertNumber required. HALAL_PENDING: certification
            in process. halalCertNumber optional. NON_HALAL: explicitly non-halal (e.g. pork products). NOT_APPLICABLE: non-food
            product where halal is not relevant.

            '
          example: HALAL
          x-ion-mandatory: always
          x-ion-regulatory: UU 33/2014 tentang Jaminan Produk Halal; PP 39/2021
        halalCertNumber:
          type: string
          description: 'MUI (Majelis Ulama Indonesia) halal certificate number. Format varies by certification period.

            '
          example: ID38010000151020
          x-ion-mandatory: conditional
          x-ion-condition: Required when halalStatus is HALAL
          x-ion-regulatory: UU 33/2014 tentang Jaminan Produk Halal
        bpomRegNumber:
          type: string
          description: 'BPOM registration number for food, cosmetics, and pharmaceuticals. BPOM_MD: domestic product (e.g.
            MD-123456789012). BPOM_ML: imported product (e.g. ML-123456789012).

            '
          example: MD-263510000567
          x-ion-mandatory: optional
          x-ion-regulatory: PerBPOM 27/2017 tentang Pendaftaran Pangan Olahan
        sniCertNumber:
          type: string
          description: 'SNI (Standar Nasional Indonesia) compliance certificate number. Required for products with mandatory
            SNI (electronics, PPE, toys).

            '
          example: SNI-01-3553-2006
          x-ion-mandatory: optional
          x-ion-regulatory: PP 34/2018 tentang Sistem Standardisasi dan Penilaian Kesesuaian Nasional
        spPIRTNumber:
          type: string
          description: 'SP-P-IRT small-scale home food production license. For UMKM food sellers without full BPOM registration.

            '
          example: SPIRT.2064701011023
          x-ion-mandatory: optional
          x-ion-regulatory: PerBPOM 22/2018
        ageRestricted:
          type: boolean
          description: 'Whether this product requires age verification at point of purchase. True for tobacco, alcohol, adult
            content, and certain pharmaceuticals.

            '
          default: false
          x-ion-mandatory: always
          x-ion-regulatory: PP 109/2012 tentang Pengamanan Bahan yang Mengandung Zat Adiktif
        minAge:
          type: integer
          minimum: 0
          maximum: 21
          description: 'Minimum purchaser age in years when ageRestricted is true. Indonesia: 18 for tobacco and alcohol,
            21 for certain substances.

            '
          example: 18
          x-ion-mandatory: conditional
          x-ion-condition: Required when ageRestricted is true
      allOf:
      - if:
          properties:
            halalStatus:
              enum:
              - HALAL
          required:
          - halalStatus
        then:
          required:
          - halalCertNumber
      - if:
          properties:
            ageRestricted:
              const: true
          required:
          - ageRestricted
        then:
          required:
          - minAge
    ION_IONTicket:
      type: object
      title: ION Issue Ticket
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:Ticket
      x-beckn-attaches-to: ION Raise channel (off-Beckn)
      required:
      - id
      - title
      - description
      - type
      - priority
      - raisedBy
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          x-ion-mandatory: always
          type: string
          description: Ticket ID assigned by ION ticketing system.
          example: TKT-2026-00001234
        externalRef:
          x-ion-mandatory: optional
          type: string
          description: Reference ID in external ticketing system (Freshdesk/Jira/Zendesk ticket number)
          example: FD-98765
        title:
          x-ion-mandatory: always
          type: string
          description: Short subject line for this ticket.
          maxLength: 200
          example: BPP not responding to on_confirm for 48 hours
        description:
          x-ion-mandatory: always
          type: string
          description: Full description of the issue.
          example: 'sellerapp.ion.id has not responded to our on_confirm callback for transaction 9fdb667c. We have retried
            3 times within the TTL window.

            '
        type:
          x-ion-mandatory: always
          type: string
          enum:
          - NP_DISPUTE
          - POLICY_VIOLATION
          - SETTLEMENT_DISPUTE
          - TECHNICAL_FAILURE
          - FRAUD
          - NETWORK_ISSUE
          - RECON_DISPUTE
          - SLA_BREACH
          - CATALOG_VIOLATION
          - COUNTERFEIT_FLAG
          - OTHER
          description: "NP_DISPUTE: BAP/BPP disagreement on transaction terms. POLICY_VIOLATION: participant violating ION\
            \ network policy. SETTLEMENT_DISPUTE: financial settlement disagreement (escalated from recon). TECHNICAL_FAILURE:\
            \ system or API failures affecting transactions. FRAUD: suspected fraudulent activity. NETWORK_ISSUE: ION infrastructure\
            \ or registry issue. RECON_DISPUTE: reconciliation status mismatch. SLA_BREACH: participant failing to meet mandated\
            \ SLAs. COUNTERFEIT_FLAG: authenticity challenge against a product listing.\n  Raised by brand owner, consumer,\
            \ or marketplace. Triggers\n  auto-delist pending investigation; ION Central arbitrates.\n"
          example: TECHNICAL_FAILURE
        priority:
          x-ion-mandatory: always
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
          description: 'CRITICAL: network-wide impact or financial fraud. Escalated immediately. HIGH: significant impact
            on transactions. Response within 2 hours. MEDIUM: operational issue. Response within 24 hours. LOW: general query
            or minor issue. Response within 72 hours.

            '
          example: HIGH
        raisedBy:
          x-ion-mandatory: always
          type: string
          description: Subscriber ID of the network participant raising the ticket.
          example: buyerapp.ion.id
        assignedTo:
          x-ion-mandatory: conditional
          x-ion-condition: Required when ticket is assigned to counterparty or ION
          type: string
          description: 'Subscriber ID of counterparty NP, or "ION" if raised to network operator.

            '
          example: ION
        contractId:
          x-ion-mandatory: conditional
          x-ion-condition: Required for transaction-specific tickets
          type: string
          description: Related trade contract ID, if issue is transaction-specific.
          example: ORD-2026-00012345
        reconId:
          x-ion-mandatory: optional
          type: string
          description: Related reconciliation session ID, if issue is settlement-related.
          example: RECON-2026-00001234
        status:
          x-ion-mandatory: always
          type: string
          enum:
          - OPEN
          - ACKNOWLEDGED
          - IN_PROGRESS
          - PENDING_INFO
          - RESOLVED
          - CLOSED
          - ESCALATED
          description: 'OPEN: ticket created, not yet acknowledged. ACKNOWLEDGED: assigned party has received and acknowledged.
            IN_PROGRESS: actively being worked on. PENDING_INFO: waiting for additional information from raiser. RESOLVED:
            issue resolved, awaiting raiser confirmation. CLOSED: fully resolved and closed. ESCALATED: escalated to ION governance
            or external authority.

            '
          example: OPEN
        thread:
          x-ion-mandatory: optional
          type: array
          description: Complete conversation trail for this ticket.
          items:
            type: object
            additionalProperties: false
            required:
            - messageId
            - from
            - message
            - timestamp
            properties:
              messageId:
                type: string
              from:
                type: string
                description: Subscriber ID or "ION"
              message:
                type: string
              attachments:
                type: array
                items:
                  type: string
                  format: uri
                description: Evidence URLs
              timestamp:
                type: string
                format: date-time
        resolution:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          properties:
            description:
              type: string
              description: How the issue was resolved
            actionTaken:
              type: string
              enum:
              - WARNING_ISSUED
              - PENALTY_APPLIED
              - SUSPENSION
              - REFUND_MANDATED
              - POLICY_CLARIFICATION
              - TECHNICAL_FIX_CONFIRMED
              - NO_ACTION
              - ESCALATED_TO_ODR
            penaltyAmount:
              type: number
              description: Penalty amount in IDR if actionTaken=PENALTY_APPLIED
            resolvedAt:
              type: string
              format: date-time
        sla:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          properties:
            expectedResponseTime:
              type: string
              description: ISO 8601 duration for first response
              example: PT2H
            expectedResolutionTime:
              type: string
              description: ISO 8601 duration for full resolution
              example: P3D
            responseDeadline:
              type: string
              format: date-time
            resolutionDeadline:
              type: string
              format: date-time
        createdAt:
          x-ion-mandatory: always
          type: string
          format: date-time
        updatedAt:
          x-ion-mandatory: always
          type: string
          format: date-time
        resolvedAt:
          x-ion-mandatory: optional
          type: string
          format: date-time
    ION_IONRatingAttributes:

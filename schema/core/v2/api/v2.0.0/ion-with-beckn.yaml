          - SELLER_INITIATED
          - ITEM_UNAVAILABLE
          - PAYMENT_FAILED
          - FRAUD_SUSPECTED
          - REGULATORY_HOLD
          - LOGISTICS_FAILURE
          - FORCE_CANCEL_TAT_BREACH
          x-ion-conditional: true
          x-ion-condition: Required when contract status is CANCELLED
        quoteTrail:
          type: array
          description: 'Trail of quote changes for price adjustment branch. Each entry records a delta to the original

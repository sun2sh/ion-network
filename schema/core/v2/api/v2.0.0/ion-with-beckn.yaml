          x-ion-mandatory: optional
        gpsAccuracyMeters:
          type: number
          minimum: 0
          description: 'Accuracy of GPS coordinate in metres. Required for pin-point delivery addresses in unaddressed areas
            (kampung, peri-urban). Affects agent last-mile routing.

            '
          example: 10
          x-ion-mandatory: optional
        landmark:
          type: string
          description: 'Notable nearby landmark for finding the address. Common in Indonesian urban delivery where street
            numbering is inconsistent.

            '
          example: Sebelah Indomaret, seberang masjid
          x-ion-mandatory: optional
        blockUnit:
          type: string
          description: 'Block/unit identifier for apartments and complexes. Beckn core ''door'' captures house number; this
            captures block/floor/unit where applicable.

            '
          example: Blok A3 Lantai 12 Unit 05
          x-ion-mandatory: optional
    ION_IONBusinessIdentity:

          example: true
          x-ion-conditional: true
          x-ion-condition: Required when returnable is true
        warrantyPolicy:
          type: string
          enum:
          - ion://policy/warranty.manufacturer.1y-distance-service
          - ion://policy/warranty.manufacturer.2y-distance-service
          - ion://policy/warranty.manufacturer.3y-distance-service
          - ion://policy/warranty.seller.1y
          - ion://policy/warranty.seller.1y.replacement_only
          - ion://policy/warranty.refurbished.30d-limited
          - ion://policy/warranty.extended.paid-addon
          - ion://policy/warranty.standard.none
          description: ION standard warranty policy IRI.
          example: ion://policy/warranty.manufacturer.1y-distance-service
          x-ion-regulatory: UU 8/1999 Pasal 25; PP 36/2023
        disputePolicy:
          type: string
          enum:
          - ion://policy/dispute.consumer.bpsk
          - ion://policy/dispute.commercial.bani
          - ion://policy/dispute.commercial.odr
          - ion://policy/dispute.international.standard.uncitral
          - ion://policy/dispute.b2g.lkpp
          description: 'ION standard dispute resolution policy IRI. dispute.consumer.bpsk: B2C — BPSK (Badan Penyelesaian
            Sengketa Konsumen). dispute.commercial.bani: B2B — BANI arbitration. dispute.commercial.odr: Online
            Dispute Resolution via ION platform.

            '
          example: ion://policy/dispute.consumer.bpsk
          x-ion-regulatory: UU 8/1999 Pasal 45; UU 30/1999 tentang Arbitrase
        timeToShip:
          type: string
          description: 'Time from order confirm to when seller hands package to logistics. ISO 8601 duration.

            '
          example: PT2H
        availableOnCod:
          type: boolean
          description: 'Whether Cash on Delivery is available for this product. Some categories cannot be sold on
            COD (prescription medicine, alcohol, tobacco, items above IDR 5,000,000).

            '
          example: true
        selfPickupOtp:
          type: boolean
          description: 'Whether OTP verification is required when consumer picks up order. If true, BPP generates
            deliveryOtp in performanceAttributes.

            '
          example: false
        selfPickupInstructions:
          type: string
          description: Instructions for self-pickup — counter number, floor, collection point.
          example: Ambil di counter F&B lantai 1, tunjukkan kode pesanan Anda.
        proofOfDeliveryType:
          type: string
          enum:
          - OTP
          - SIGNATURE
          - PHOTO
          - NONE
          description: Type of delivery confirmation proof required.
          example: OTP
        contactDetailsConsumerCare:
          type: string
          description: 'Consumer care contact in comma-separated format: name, email, phone. Displayed to consumer
            for post-purchase support queries.

            '
          example: Customer Service,cs@toko.com,08001234567
          x-ion-regulatory: UU 8/1999 tentang Perlindungan Konsumen Pasal 7
        displayLanguage:
          type: array
          items:
            type: string
            enum:
            - id
            - en
            - ms
            - zh
            - ar
            - ta
            - ko
            - ja
          description: 'Languages in which this offer''s catalog content is available. "id" always present. "en"
            required for XB commerce pattern.

            '
          example:
          - id
          - en
          x-ion-regulatory: ION Network Policy — language completeness validation
        minimumOrderQuantity:
          type: object
          additionalProperties: false
          properties:
            count:
              type: integer
              minimum: 1
            measure:
              type: object
              additionalProperties: false
              properties:
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                value:
                  type: number
          description: 'Minimum quantity for B2B wholesale. count for unit-based, measure for weight/volume-based
            products.

            '
          example:
            count: 10
          x-ion-conditional: true
          x-ion-condition: Required for B2B wholesale commerce pattern
        weightSlabs:
          type: array
          description: Weight-based pricing tiers for catalogued logistics offers.
          items:
            type: object
            additionalProperties: false
            properties:
              minKg:
                type: number
                minimum: 0
              maxKg:
                type: number
              priceIDR:
                type: integer
            required:
            - minKg
            - maxKg
            - priceIDR
          example:
          - minKg: 0
            maxKg: 5
            priceIDR: 15000
          - minKg: 5
            maxKg: 10
            priceIDR: 25000
          x-ion-conditional: true
          x-ion-condition: Required for catalogued domestic logistics patterns
        offerType:
          type: string
          enum:
          - LIST_PRICE
          - DISCOUNT
          - BUNDLE
          - BUY_X_GET_Y
          - CASHBACK
          - FREE_DELIVERY
          - VOUCHER
          description: Type of commercial offer.
          example: DISCOUNT
        priceModel:
          type: string
          enum:
          - FIXED
          - DYNAMIC
          - TIERED
          description: How pricing is determined for this offer.
          example: FIXED
        minBasketAmount:
          type: number
          description: Minimum basket value in IDR for offer to be valid.
          example: 50000
        maxDiscountAmount:
          type: number
          description: Maximum discount cap in IDR for percentage offers.
          example: 20000
        voucherCode:
          type: string
          description: Voucher or promo code to activate offer.
          example: HEMAT50
        stackable:
          type: boolean
          description: Whether this offer can be combined with other active offers.
          default: false
        usageLimitPerUser:
          type: integer
          minimum: 1
          description: Maximum times this offer can be used by a single user.
          example: 1
        customerSegment:
          type: string
          enum:
          - ALL
          - NEW_USER
          - LOYALTY
          - MEMBERSHIP
          - VERIFIED_SELLER
          description: Segment of customers eligible for this offer.
          example: ALL
        paymentMethodEligibility:
          type: array
          description: 'Structured payment method eligibility. Each entry declares minAmount/maxAmount constraints,
            required buyer tier, excluded categories. BAP checks buyer context + order amount against every entry;
            applies only those that pass all constraints. Empty array means all methods eligible.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              method:
                type: string
                enum:
                - QRIS
                - VIRTUAL_ACCOUNT
                - EWALLET
                - COD
                - BANK_TRANSFER
                - BI_FAST
                - RTGS
                - SKN
                - BNPL
                - CREDIT_CARD
                - DEBIT_CARD
                - DIRECT_DEBIT
                - CREDIT_FACILITY
                - ESCROW
              minAmount:
                type: number
                description: Minimum order value in IDR for this method to be eligible
              maxAmount:
                type: number
                description: Maximum order value in IDR (BI cap for QRIS is 10M)
              requiresBuyerTier:
                type: array
                items:
                  type: string
                  enum:
                  - NEW
                  - STANDARD
                  - VERIFIED
                  - PREMIUM
                  - VIP
                description: Buyer tier(s) eligible for this method
              requiresAddressVerification:
                type: boolean
                description: Whether buyer must have a verified delivery address
                default: false
              requiresPhoneVerification:
                type: boolean
                default: false
              excludedCategories:
                type: array
                items:
                  type: string
                description: Category codes excluded from this method
              requiredBnplProvider:
                type: array
                items:
                  type: string
                description: Specific BNPL providers allowed (when method=BNPL)
              eligibilityNote:
                type: string
                description: Optional human-readable explanation
            required:
            - method
        subsidyBreakup:
          type: object
          additionalProperties: false
          description: Who funds the discount/promotion.
          properties:
            sellerSubsidy:
              type: number
              minimum: 0
            platformSubsidy:
              type: number
              minimum: 0
            brandSubsidy:
              type: number
              minimum: 0
        startAt:
          type: string
          format: date-time
          description: When this promotional offer becomes active.
        endAt:
          type: string
          format: date-time
          description: When this promotional offer expires.
        priceValidFrom:
          type: string
          format: date-time
          description: 'Start of price validity window. Distinct from startAt (offer availability window) — price
            may change mid-campaign while offer remains active. Catalog TTL for offers with active priceChangeSchedule
            SHOULD be <=30 seconds to avoid stale-price surfacing on browsing surfaces.

            '
        priceValidUntil:
          type: string
          format: date-time
          description: End of price validity window.
        priceChangeSchedule:
          type: array
          description: 'Full price change timeline for a campaign. BAPs MUST render countdown UI and compute correct
            price at transaction time. Each entry defines a price valid for a window; entries MUST NOT overlap.
            Sorted ascending by validFrom.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              validFrom:
                type: string
                format: date-time
              validUntil:
                type: string
                format: date-time
              priceValue:
                type: number
                description: IDR amount valid in this window
              phaseLabel:
                type: string
                description: Human label e.g. "Jam pertama harga hemat"
                example: First hour at flash price
            required:
            - validFrom
            - validUntil
            - priceValue
        reservationWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: 'Seconds for which the BPP will hold availability and the on_select price quote. Default
            300. BPP soft-reserves at on_select, hard-reserves at on_init. After window expires, availability is
            released and any subsequent /confirm for this messageId returns ION-3006.

            '
          example: 300
          x-ion-default: 300
        totalStockCap:
          type: integer
          minimum: 1
          description: 'Absolute total quantity available under this offer. When reached, all subsequent /select
            calls return ION-3008. Distinct from resource.availability.maxOrderQty (per-order cap).

            '
          example: 100
        perUserQuantityCap:
          type: integer
          minimum: 1
          description: 'Maximum units a single buyer can purchase under this offer across all transactions (enforced
            by BPP). Distinct from usageLimitPerUser which is number of separate redemptions.

            '
          example: 2
        isFlashSale:
          type: boolean
          description: 'Signals this offer is a flash sale. BAP surfaces urgency UI; reservationWindowSeconds SHOULD
            be short (60-180s).

            '
          default: false
        queueEnabled:
          type: boolean
          description: 'Whether BPP uses a queue/throttle mechanism when demand exceeds supply. When true, on_select
            may return queuePosition.

            '
          default: false
        queuePosition:
          type: integer
          minimum: 0
          description: 'Consumer''s current position in the purchase queue. 0 = at front. Returned in on_select
            when queueEnabled=true.

            '
          x-ion-condition: Returned in on_select when queueEnabled=true
        estimatedWaitSeconds:
          type: integer
          minimum: 0
          description: Estimated wait time before this consumer reaches front of queue.
          x-ion-conditional: true
          x-ion-condition: Returned in on_select when queuePosition is present
        stackingGroup:
          type: string
          enum:
          - PLATFORM
          - SELLER
          - PAYMENT
          - BRAND
          - SHIPPING
          - CASHBACK
          description: 'Voucher stacking group. Vouchers from different groups stack by default. Within a single
            group only one voucher can apply per order unless stackingRules override. Replaces the ambiguous stackable
            flag.

            '
        stackingRules:
          type: object
          additionalProperties: false
          description: 'Explicit voucher stacking rules. Used when offer has complex combination logic beyond the
            default group rules.

            '
          properties:
            mustCombineWith:
              type: array
              items:
                type: string
              description: Offer IDs that must also be applied for this offer to activate.
            cannotCombineWith:
              type: array
              items:
                type: string
              description: Offer IDs with which this offer cannot be combined.
            maxDiscountWhenStacked:
              type: number
              description: Cap on total discount when multiple offers stack (IDR).
        codEligibilityForBuyer:
          type: boolean
          description: 'BPP-evaluated COD eligibility for the specific buyer in this transaction. Returned in on_select.
            Distinct from availableOnCod which is offer-level availability. Allows BPP to decline COD for new buyers,
            previous COD failures, high-value items exceeding buyer''s verified tier, etc.

            '
          x-ion-condition: Returned in on_select when availableOnCod=true
        codEligibilityReason:
          type: string
          enum:
          - ELIGIBLE
          - NEW_BUYER
          - PREVIOUS_COD_FAILURE
          - ADDRESS_NOT_VERIFIED
          - AMOUNT_EXCEEDS_LIMIT
          - PINCODE_NOT_SERVICED_FOR_COD
          - HIGH_RISK_CATEGORY
          - OTP_VERIFICATION_REQUIRED
          description: Reason for the codEligibilityForBuyer decision.
          x-ion-conditional: true
          x-ion-condition: Required when codEligibilityForBuyer is declared
        returnEvidenceRequirement:
          type: string
          enum:
          - NONE
          - PHOTO_OPTIONAL
          - PHOTO_REQUIRED
          - VIDEO_UNBOXING_REQUIRED
          - VIDEO_UNBOXING_AND_PHOTO
          - PHYSICAL_INSPECTION
          description: 'Evidence required from buyer when initiating a return. VIDEO_UNBOXING_REQUIRED is standard
            for high-value electronics. PHYSICAL_INSPECTION is used for high-value items (>IDR 10M) where seller
            sends inspector before accepting return.

            '
          example: PHOTO_REQUIRED
          x-ion-condition: Required when returnable=true
        returnEvidenceMinPhotos:
          type: integer
          minimum: 1
          maximum: 10
          description: Minimum number of evidence photos required.
          x-ion-conditional: true
          x-ion-condition: Required when returnEvidenceRequirement includes PHOTO
        handlingTimeHours:
          type: integer
          minimum: 0
          description: 'Hours from order confirm to package ready for logistics. Replaces QSR-only averagePreparationTime
            for non-food sellers. Used for custom-print, made-to-measure, pre-order merchandise.

            '
          example: 72
        grievanceSlaPolicy:
          type: string
          enum:
          - ion://policy/grievance-sla.consumer.standard
          - ion://policy/grievance.sla.premium_mall
          - ion://policy/grievance-sla.consumer.flash-critical
          - ion://policy/grievance.sla.b2b_businesshours
          description: 'ION Grievance SLA policy IRI. Declares response time, resolution time, escalation path,
            and penalty consequences when SLA is breached. Subject to marketplace minimum (grievance.sla.standard)
            for B2C; marketplace-operated BAPs may enforce stricter policies on their sellers. ION timer auto-escalates
            when SLAs are breached — no manual action needed.

            '
          example: ion://policy/grievance-sla.consumer.standard
          x-ion-regulatory: UU 8/1999 Pasal 45; Permendag 50/2020 Pasal 6
        paymentTermsPolicy:
          type: string
          enum:
          - ion://policy/payment-terms.upfront.full
          - ion://policy/payment.deposit.30pct.balance_on_delivery
          - ion://policy/payment-terms.cod.full
          - ion://policy/payment-terms.credit.net-7
          - ion://policy/payment-terms.credit.net-30
          - ion://policy/payment-terms.credit.net-60
          - ion://policy/payment.installment.3mo
          - ion://policy/payment-terms.subscription.monthly_autopay
          description: 'Payment terms policy IRI. Declares when payment is collected, which methods are accepted,
            whether deposit or credit terms apply, and what the late-payment penalty is if applicable. Must be compatible
            with the order''s paymentRail and collectedBy.

            '
          example: ion://policy/payment-terms.upfront.full
          x-ion-regulatory: UU 7/2021 HPP; OJK POJK terkait metode pembayaran
        penaltyPolicy:
          type: string
          description: 'Penalty policy IRI. Normally inferred from seller''s onboarding tier (Standard/Mall/Premium)
            and other declared policies (return, cancellation, grievance-sla). May be declared explicitly for per-offer
            overrides. Sellers cannot select a penalty policy weaker than their tier minimum.

            '
          example: ion://policy/penalty.seller-sla-breach.standard
          x-ion-conditional: true
          x-ion-condition: Auto-derived from tier + other policies; declare only for explicit override
        customTermsAddendum:
          type: string
          maxLength: 1000
          description: 'Free-text addendum for edge cases (e.g. watchmaker offering lifetime service). Supplements
            the declared policy IRIs but cannot contradict them. If addendum contradicts base policy, base policy
            wins and addendum is informational only. BAP displays addendum below the structured policy terms.

            '
          example: Garansi seumur hidup untuk mekanisme jam tangan mewah (terms & conditions apply - see seller
            page).
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            returnable:
              const: true
          required:
          - returnable
        then:
          required:
          - returnPolicy
          - sellerPickupReturn
      - if:
          properties:
            availableOnCod:
              const: 'true'
          required:
          - availableOnCod
        then:
          required:
          - codEligibilityForBuyer
      - if:
          properties:
            queueEnabled:
              const: 'true'
          required:
          - queueEnabled
        then:
          required:
          - queuePosition
      - if:
          properties:
            returnable:
              const: 'true'
          required:
          - returnable
        then:
          required:
          - returnEvidenceRequirement
      required:
      - cancellationPolicy
      - returnable
      - returnPolicy
      - warrantyPolicy
      - disputePolicy
      - timeToShip
      - availableOnCod
      - contactDetailsConsumerCare
      - displayLanguage
      - grievanceSlaPolicy
      - paymentTermsPolicy
      x-ion-closed-extensions: false
    TradePerformanceAttributes:
      type: object
      title: Trade Performance Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradePerformanceAttributes
      x-beckn-attaches-to: Performance.performanceAttributes
      properties:
        performanceMode:
          type: string
          enum:
          - DELIVERY
          - SELF_PICKUP
          - DINE_IN
          - CURBSIDE
          description: 'How the fulfilment is executed. DELIVERY: logistics delivers to buyer address. SELF_PICKUP:
            buyer collects from seller location. DINE_IN: for restaurant orders consumed on premises. CURBSIDE:
            buyer drives to pickup point, seller brings to car.

            '
          example: DELIVERY
        supportedPerformanceModes:
          type: array
          items:
            type: string
            enum:
            - DELIVERY
            - SELF_PICKUP
            - DINE_IN
            - CURBSIDE
          description: 'All performance modes supported by this provider for this offer. Declared in on_select.
            Buyer selects mode at init.

            '
          example:
          - DELIVERY
          - SELF_PICKUP
        sla:
          type: object
          additionalProperties: false
          description: Service Level Agreement for fulfilment timing.
          required:
          - unitBasis
          properties:
            min:
              type: string
              description: Minimum fulfilment time ISO 8601 duration
              example: PT30M
            max:
              type: string
              description: Maximum fulfilment time ISO 8601 duration
              example: PT90M
            unitBasis:
              type: string
              enum:
              - ORDER_CONFIRMATION
              - SHIPMENT
              - PAYMENT_RECEIPT
              description: Event from which SLA countdown starts.
              example: ORDER_CONFIRMATION
        handling:
          type: array
          items:
            type: string
            enum:
            - COLD_CHAIN
            - PERISHABLE
            - HIGH_VALUE
            - OVERSIZED
            - FRAGILE
            - HAZARDOUS
            - AGE_RESTRICTED
          description: 'Special handling requirements for this fulfilment. Determines logistics eligibility and
            surcharges.

            '
          example:
          - COLD_CHAIN
          - PERISHABLE
        readyToShip:
          type: boolean
          description: 'Seller signals that the package is physically ready for logistics pickup. Sent by BPP via
            /update. Triggers LSP to dispatch agent.

            '
          example: true
          x-ion-conditional: true
          x-ion-condition: Required in /update when seller is ready for pickup
        awbNumber:
          type: string
          description: 'Air Waybill number assigned by the logistics provider after pickup. Enables tracking on
            LSP platform.

            '
          example: JNE1234567890
          x-ion-conditional: true
          x-ion-condition: Added after order is picked up by logistics provider
        trackingUrl:
          type: string
          format: uri
          description: 'URL for real-time shipment tracking. Provided by logistics provider after pickup. BAP renders
            as tracking link or embedded tracker.

            '
          example: https://jne.co.id/track?awb=JNE1234567890
          x-ion-conditional: true
          x-ion-condition: Present after DISPATCHED state
        estimatedDeliveryTime:
          type: string
          format: date-time
          description: 'Updated estimated delivery datetime in ISO 8601 with timezone. BPP updates dynamically as
            fulfilment progresses.

            '
          example: 2026-04-19 14:30:00+07:00
          x-ion-conditional: true
          x-ion-condition: Present from DISPATCHED state onwards
        agentName:
          type: string
          description: Name of delivery agent or driver assigned to this fulfilment.
          example: Budi Santoso
          x-ion-conditional: true
          x-ion-condition: Present when agent is assigned
        agentPhone:
          type: string
          pattern: ^[0-9]{10,13}$
          description: Indonesian mobile number, 10-13 digits.
          example: 08123456789
          x-ion-conditional: true
          x-ion-condition: Present when agent is assigned
        agentPhoto:
          type: string
          format: uri
          description: 'URL to photo of delivery agent. Displayed by BAP for consumer security verification. URL
            must remain valid for 24 hours.

            '
          example: https://sellerapp.ion.id/agents/budi-santoso.jpg
          x-ion-conditional: true
          x-ion-condition: Present when agent is assigned
        deliveryOtp:
          type: string
          pattern: ^[0-9]{4,6}$
          description: 'One-time password required for agent to confirm delivery. Consumer shows OTP to agent at
            doorstep.

            '
          example: '482930'
          x-ion-conditional: true
          x-ion-condition: Present when offer.selfPickupOtp=true or high-value item
        deliveryProofUrl:
          type: string
          format: uri
          description: 'URL to photo proof of delivery — package at door or consumer signature. Added at DELIVERED
            state.

            '
          example: https://sellerapp.ion.id/proofs/delivery-ORD-001.jpg
          x-ion-conditional: true
          x-ion-condition: Present after DELIVERED state
        selfPickupCode:
          type: string
          description: 'Unique code generated by BPP for self-pickup orders. Consumer presents this code at counter
            to collect order.

            '
          example: SP-4729
          x-ion-conditional: true
          x-ion-condition: Present for SELF_PICKUP performance mode
        returnAgentName:
          type: string
          description: Name of pickup agent for return collection.
          example: Andi Wijaya
          x-ion-conditional: true
          x-ion-condition: Present on return Performance records when agent assigned
        returnTrackingUrl:
          type: string
          format: uri
          description: Tracking URL for return shipment.
          example: https://jne.co.id/track?awb=JNE9876543210
          x-ion-conditional: true
          x-ion-condition: Present on return Performance after RETURN_PICKED state
        installationScheduling:
          type: object
          additionalProperties: false
          description: 'Installation appointment scheduling. Declared capability is in resource.installation. This
            carries the transaction-time appointment.

            '
          properties:
            available:
              type: boolean
              description: Whether seller can schedule installation for this order.
            scheduledDate:
              type: string
              format: date-time
              description: Confirmed installation appointment datetime with timezone.
              example: 2026-04-05 10:00:00+07:00
            notes:
              type: string
              description: Instructions for consumer regarding installation.
              example: Teknisi akan menelepon 30 menit sebelum tiba.
          x-ion-conditional: true
          x-ion-condition: Present for products with installation.required=true
        realTimeGps:
          type: object
          additionalProperties: false
          description: 'Current GPS position of delivery agent. Updated via /track API. Not persisted — real-time
            only.

            '
          properties:
            latitude:
              type: number
              minimum: -90
              maximum: 90
            longitude:
              type: number
              minimum: -180
              maximum: 180
            accuracy:
              type: number
              description: Position accuracy in metres
            timestamp:
              type: string
              format: date-time
          required:
          - latitude
          - longitude
          - timestamp
          x-ion-conditional: true
          x-ion-condition: Present only in /on_track responses
        lspSubscriberId:
          type: string
          description: 'Subscriber ID of the on-network logistics provider handling this fulfilment. Enables ION
            to trace the cascaded logistics contract.

            '
          example: lsp.jne.ion.id
          x-ion-conditional: true
          x-ion-condition: Present when fulfilment is handled by on-network LSP
        shippingInsurance:
          type: object
          additionalProperties: false
          description: 'Insurance declaration for high-value shipments. Mandatory for items above IDR 5,000,000
            on all major marketplaces. Affects RTO refund calculations — claim filed against insurance policy when
            applicable.

            '
          required:
          - mandatory
          - provider
          - coverageAmount
          properties:
            mandatory:
              type: boolean
              description: Whether insurance is legally or operationally required.
            provider:
              type: string
              description: Insurance provider name
              example: PT Asuransi Sinar Mas
            policyNumber:
              type: string
              description: Policy reference assigned by insurance provider
              example: AS-POL-2026-00123456
            coverageAmount:
              type: number
              description: Maximum coverage in IDR
              example: 15000000
            premium:
              type: number
              description: Insurance premium in IDR — appears in consideration breakup
              example: 15000
            paidBy:
              type: string
              enum:
              - BUYER
              - SELLER
              - PLATFORM
              description: Who bears the insurance premium cost
            claimProcedureUrl:
              type: string
              format: uri
              description: URL to claim filing procedure for this policy
          x-ion-regulatory: OJK POJK 69/POJK.05/2016 tentang Perilaku Usaha Pialang Asuransi
          x-ion-conditional: true
          x-ion-condition: Required when offer.price > IDR 5,000,000 or category-mandated
        agentId:
          type: string
          description: 'Platform-issued agent ID that consumer can verify against BPP app or logistics app. More
            trustworthy than name alone — prevents impersonation scams.

            '
          example: SPX-RIDER-28471
          x-ion-conditional: true
          x-ion-condition: Present when agent is assigned
        agentVehicleType:
          type: string
          enum:
          - MOTORCYCLE
          - CAR
          - VAN
          - TRUCK
          - BICYCLE
          - WALK
          - PUBLIC_TRANSPORT
          description: Agent vehicle type — affects delivery ETA and corporate policy
        agentPlateNumber:
          type: string
          description: Indonesian vehicle plate (Nomor Polisi). Required by some corporate buyers for building access.
          example: B 1234 XYZ
        agentBadgeNumber:
          type: string
          description: 'Physical badge number the agent carries. Consumers verify at door. Distinct from agentId
            which is internal.

            '
          example: SPX-28471
        liveAgentLocationUrl:
          type: string
          format: uri
          description: 'URL for live agent location tracking (distinct from trackingUrl which is package-centric).
            Agent-centric view consumers use during OUT_FOR_DELIVERY for last-mile visibility.

            '
        qcResult:
          type: string
          enum:
          - QC_PASSED
          - QC_FAILED_TAMPERED
          - QC_FAILED_MISSING_PARTS
          - QC_FAILED_DIFFERENT_ITEM
          - QC_FAILED_USED_DAMAGED
          - QC_PARTIAL
          - QC_PENDING
          description: 'Quality inspection result when return package is received by seller. Determines refund amount
            — full for QC_PASSED, partial for QC_PARTIAL, zero for QC_FAILED_* variants (dispute-prone).

            '
          x-ion-conditional: true
          x-ion-condition: Required on Performance record for return-delivered state
        qcNotes:
          type: string
          description: Seller-provided explanation of QC findings
          x-ion-conditional: true
          x-ion-condition: Required when qcResult is not QC_PASSED
        qcEvidence:
          type: array
          items:
            type: string
            format: uri
          description: Photo/video URLs from seller's QC inspection. Used in dispute resolution.
          x-ion-condition: Required when qcResult is QC_FAILED_* or QC_PARTIAL
        marketplaceManagedLogistics:
          type: boolean
          description: 'True when logistics is orchestrated by the BAP (marketplace) rather than the BPP (seller).
            Seller BPP handles ready-to-ship only; marketplace BAP triggers its own logistics contract. Used by
            Shopee Xpress, Tokopedia TokoCabang, Amazon MFN.

            '
          default: false
        slaBreachCount:
          type: integer
          minimum: 0
          description: 'Number of SLA TATs breached by BPP on this fulfilment. Incremented by BAP each time an expected
            on_status does not arrive within SLA. Persists across updates for reconciliation penalty calculation.

            '
          default: 0
        slaBreachDetails:
          type: array
          description: Record of each SLA breach for audit trail.
          items:
            type: object
            additionalProperties: false
            properties:
              tatType:
                type: string
                enum:
                - ORDER_ACCEPTANCE
                - PACKED
                - DISPATCHED
                - DELIVERY
                - PICKUP_RETURN
                - RETURN_DELIVERED
                - REFUND_INITIATED
              expectedBy:
                type: string
                format: date-time
              breachedAt:
                type: string
                format: date-time
              breachDurationSeconds:
                type: integer
            required:
            - expectedBy
            - breachedAt
            - tatType
        ageVerificationRequired:
          type: boolean
          description: 'Whether delivery agent must verify buyer age at door before handover. Derived from resource.ageRestricted;
            BPP copies to performance record. If true, delivery fails (state goes to DELIVERY_FAILED) if verification
            is not successfully completed.

            '
          default: false
          x-ion-conditional: true
          x-ion-condition: Required when any item in order has resource.ageRestricted=true
        ageVerificationMethod:
          type: string
          enum:
          - KTP_SIGHTED
          - KTP_SCANNED
          - SIM_SIGHTED
          - PASSPORT_SIGHTED
          - SELFIE_COMPARISON
          - BIOMETRIC_API
          - NONE
          description: 'Method used to verify buyer age at delivery. KTP_SIGHTED: agent visually confirms KTP DOB.
            KTP_SCANNED: agent scans KTP via agent app; OCR reads DOB. SELFIE_COMPARISON: agent compares consumer
            face to buyer profile photo. BIOMETRIC_API: agent uses liveness + age estimation API.

            '
          x-ion-regulatory: UU 39/2007 tentang Cukai (tobacco); PP 109/2012; PerBPOM 28/2021 (alcohol)
          x-ion-condition: Required when ageVerificationRequired=true
        ageVerifiedAt:
          type: string
          format: date-time
          description: Timestamp of successful verification at door
          x-ion-condition: Required on DELIVERED state when ageVerificationRequired=true
        ageVerifiedByAgentId:
          type: string
          description: Agent ID of the person who performed verification
          x-ion-condition: Required on DELIVERED state when ageVerificationRequired=true
        ageVerificationEvidence:
          type: string
          format: uri
          description: 'URL to evidence of verification (photo of KTP with DOB visible, scan result). Retained per
            platform policy. Must be encrypted at rest and subject to data residency rules if applicable.

            '
          x-ion-condition: Required when ageVerificationMethod is KTP_SCANNED or BIOMETRIC_API
        ageVerificationFailedReason:
          type: string
          enum:
          - BUYER_UNDERAGE
          - BUYER_UNAVAILABLE_VERIFIER_NEEDED
          - BUYER_REFUSED_TO_SHOW_ID
          - ID_DOCUMENT_NOT_PRESENTED
          - ID_DOCUMENT_INVALID
          - BIOMETRIC_API_FAILED
          description: 'Reason age verification failed at delivery. Performance state should transition to DELIVERY_FAILED
            with this reason tag, and RTO flow initiates. Buyer may be blocked from future purchases of this category
            (per platform policy).

            '
          x-ion-conditional: true
          x-ion-condition: Required when delivery fails due to age verification
      required:
      - performanceMode
      - supportedPerformanceModes
      - sla
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            ageVerificationMethod:
              const: KTP_SCANNED
          required:
          - ageVerificationMethod
        then:
          required:
          - ageVerificationEvidence
      - if:
          properties:
            ageVerificationRequired:
              const: 'true'
          required:
          - ageVerificationRequired
        then:
          required:
          - ageVerificationMethod
          - ageVerifiedAt
          - ageVerifiedByAgentId
      - if:
          properties:
            qcResult:
              const: QC_FAILED_
          required:
          - qcResult
        then:
          required:
          - qcEvidence
      x-ion-closed-extensions: false
    TradeProviderAttributes:
      type: object
      title: Trade Provider Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeProviderAttributes
      x-beckn-attaches-to: Provider.providerAttributes
      properties:
        invoicingModel:
          type: string
          enum:
          - CENTRAL
          - PER_FULFILMENT_CENTRE
          description: 'Whether the brand invoices centrally (one NPWP for all fulfilment centres) or each fulfilment
            centre invoices separately. CENTRAL: single legal entity invoices for all outlets. PER_FULFILMENT_CENTRE:
            each FC has own NPWP and invoices independently.

            '
          example: CENTRAL
          x-ion-regulatory: UU 6/1983 tentang Ketentuan Umum Perpajakan — NPWP obligation per taxable entity
        invoicingEntity:
          type: string
          description: 'Legal entity name of the invoicing entity when invoicingModel is CENTRAL. This is the brand''s
            registered legal entity — not the store name.

            '
          example: PT Paragon Technology and Innovation
          x-ion-regulatory: PMK 168/PMK.010/2023 tentang Faktur Pajak
          x-ion-condition: Required when invoicingModel is CENTRAL
        storeStatus:
          type: string
          enum:
          - OPEN
          - TEMPORARILY_CLOSED
          - DISABLED
          description: 'Operational status of this provider location. OPEN: accepting orders normally. TEMPORARILY_CLOSED:
            closed for a defined period (temporaryClosureEnd required). DISABLED: permanently closed or suspended.

            '
          example: OPEN
        operatingHours:
          type: array
          description: 'Weekly operating schedule as a typed array. Each entry covers one timing type for a day
            range. Types: ORDER (when orders accepted), DELIVERY (delivery window), SELF_PICKUP (pickup window),
            PREPARATION (kitchen active hours).

            '
          items:
            type: object
            additionalProperties: false
            properties:
              type:
                type: string
                enum:
                - ORDER
                - DELIVERY
                - SELF_PICKUP
                - PREPARATION
              dayFrom:
                type: integer
                minimum: 1
                maximum: 7
                description: Day of week, 1=Monday, 7=Sunday
              dayTo:
                type: integer
                minimum: 1
                maximum: 7
                description: Day of week, 1=Monday, 7=Sunday. Must be >= dayFrom.
              timeFrom:
                type: string
                pattern: ^[0-9]{4}$
                description: 24-hour format HHMM e.g. 1000
              timeTo:
                type: string
                pattern: ^[0-9]{4}$
                description: 24-hour format HHMM e.g. 2200. 0000 means midnight.
            required:
            - type
            - dayFrom
            - dayTo
            - timeFrom
            - timeTo
          example:
          - type: ORDER
            dayFrom: 1
            dayTo: 7
            timeFrom: '1000'
            timeTo: '2200'
        holidayCalendar:
          type: array
          items:
            type: string
            format: date
          description: 'Future-dated holiday dates on which this location will not accept or fulfil orders. ISO
            8601 date format. Empty array if no planned closures.

            '
          example:
          - 2026-08-17
          - 2026-12-25
          - 2027-01-01
        temporaryClosureEnd:
          type: string
          format: date-time
          description: 'ISO 8601 datetime when temporary closure ends. Required when storeStatus is TEMPORARILY_CLOSED.
            Timezone must be included.

            '
          example: 2026-04-19 23:59:00+07:00
          x-ion-condition: Required when storeStatus is TEMPORARILY_CLOSED
        serviceabilityByCategory:
          type: array
          description: 'Per-category serviceability polygon overrides. When a provider serves different delivery
            zones for different categories (e.g. a larger radius for grocery vs a smaller one for hot food).

            '
          items:
            type: object
            additionalProperties: false
            properties:
              categoryId:
                type: string
                description: ION category code e.g. food-qsr, grocery
                example: food-qsr
              geo:
                type: object
                description: GeoJSON Polygon defining delivery zone
                x-format: GeoJSONGeometry (RFC 7946)
            required:
            - categoryId
            - geo
        averagePreparationTime:
          type: string
          description: 'Average time from order confirm to item ready for logistics pickup at this location. ISO
            8601 duration. Used by BAP to compute estimated delivery time. Provider-level default; per-item preparationTime
            in resource/v1 overrides this.

            '
          example: PT25M
          x-ion-conditional: true
          x-ion-condition: Required for food-qsr and quick-commerce providers
        providerCategory:
          type: string
          enum:
          - RESTAURANT
          - CLOUD_KITCHEN
          - GROCERY
          - PHARMACY
          - FASHION
          - ELECTRONICS
          - BEAUTY
          - FMCG
          - AGRITECH
          - B2B_DISTRIBUTOR
          - QUICK_COMMERCE
          - HOME_AND_KITCHEN
          - PET_SUPPLIES
          - BOOKS_STATIONERY
          - TOYS_GAMES
          - SPORTS_OUTDOORS
          - AUTOMOTIVE_PARTS
          description: 'Category of this provider location. Used by BAP for display, filtering, and UI rendering
            decisions.

            '
          example: RESTAURANT
        nibRegistered:
          type: boolean
          description: 'Whether this provider has a valid active NIB registered with OSS (Online Single Submission).
            ION Central validates NIB at onboarding. Must be true for all active providers.

            '
          example: true
          x-ion-regulatory: PP 5/2021 tentang Penyelenggaraan Perizinan Berusaha Berbasis Risiko
        trustedSellerBadge:
          type: boolean
          description: 'Whether this provider has earned ION Trusted Seller status. Awarded by ION Central based
            on transaction volume, rating, and compliance record. Cannot be self-declared.

            '
          example: false
        handlingTimeMinutes:
          type: integer
          minimum: 0
          description: 'Time in minutes from order confirm to package ready for logistics. More precise than averagePreparationTime.
            Used for SLA computation.

            '
          example: 30
        preferredLogisticsProvider:
          type: string
          description: 'Preferred on-network logistics provider subscriber ID for this seller''s shipments. When
            marketplaceManagedLogistics=true, this should be the marketplace''s logistics arm (e.g. lsp.spx.ion.id).

            '
          example: lsp.spx.ion.id
        marketplaceManagedLogistics:
          type: boolean
          description: 'Whether this provider''s fulfilments use marketplace-managed logistics (Shopee Xpress, Tokopedia
            TokoCabang, Amazon MFN) rather than seller-selected LSP. Affects who orchestrates the on-network logistics
            transaction.

            '
          default: false
        liveCommerceEnabled:
          type: boolean
          description: 'Whether this provider supports live commerce (Shopee Live, Tokopedia Play, TikTok Shop-style
            sessions). Providers with this enabled may use the B2C-LIVE spine.

            '
          default: false
        liveCommerceStreamers:
          type: array
          items:
            type: string
          description: 'Subscriber IDs of authorised streamers who can feature this provider''s products in live
            sessions. Commission and settlement is pre-agreed off-network.

            '
        ottPartnerEnabled:
          type: boolean
          description: 'Whether this provider allows its catalog to be surfaced through OTT-embedded shoppable content
            (Vidio, Netflix, Disney+ Hotstar in-video shopping). Requires separate off-network agreement with OTT
            partner.

            '
          default: false
        kycStatus:
          type: string
          enum:
          - PENDING
          - APPROVED
          - APPROVED_WITH_CAVEATS
          - REJECTED
          - SUSPENDED
          - EXPIRED
          description: 'Current KYC status of this provider with the BPP platform. Only APPROVED and APPROVED_WITH_CAVEATS
            providers may publish catalogs. EXPIRED providers must renew before next catalog. SUSPENDED signals
            temporary enforcement action — spec processors must pause active transactions.

            '
          example: APPROVED
        kycLevel:
          type: string
          enum:
          - BASIC
          - STANDARD
          - ENHANCED
          - ENTERPRISE
          description: 'KYC depth. Determines maximum transaction value, allowed payment methods, eligibility for
            Mall/Premium tiers. BASIC: NIB + NPWP only. Max per-order IDR 5M. STANDARD: BASIC + bank account verification
            + phone. Max per-order IDR 50M. ENHANCED: STANDARD + beneficial ownership + director ID verified. Max
            per-order IDR 500M. ENTERPRISE: ENHANCED + AML screen + compliance officer named. No cap.

            '
          example: STANDARD
        kycValidUntil:
          type: string
          format: date
          description: 'Expiry date of current KYC certification. Providers MUST renew before this date. BPPs MUST
            block publish_catalog after expiry.

            '
          example: 2027-04-19
        kycEvidenceRef:
          type: string
          description: 'Opaque reference to KYC evidence bundle (encrypted off-network). Used by ION Central when
            audit required. Not a URL — internal ref.

            '
        kycCaveats:
          type: array
          items:
            type: string
            enum:
            - PENDING_BENEFICIAL_OWNERSHIP
            - PENDING_AML_SCREEN
            - PENDING_CATEGORY_LICENSE
            - PENDING_FINAL_VERIFICATION
            - PROBATIONARY_PERIOD
          description: 'When kycStatus is APPROVED_WITH_CAVEATS, these describe the outstanding items. Each caveat
            has a deadline (tracked off-catalog); failure to clear results in SUSPENDED status.

            '
          x-ion-condition: Required when kycStatus is APPROVED_WITH_CAVEATS
        categoryLicenses:
          type: array
          description: 'Category-specific operating licenses beyond NIB/NPWP. Examples: SIA for alcohol, SIKA for
            meat, Izin PBF for pharmacy, Izin Edar BPOM for cosmetics. Required for the corresponding providerCategory.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              licenseType:
                type: string
                enum:
                - SIA_ALCOHOL
                - SIKA_MEAT
                - PBF_PHARMACY
                - BPOM_COSMETICS
                - BPOM_FOOD
                - SIUP_HEAVY
                - OTHER
              licenseNumber:
                type: string
              validUntil:
                type: string
                format: date
              issuingAuthority:
                type: string
                example: BPOM
              evidenceUrl:
                type: string
                format: uri
            required:
            - licenseType
            - licenseNumber
            - validUntil
          x-ion-regulatory: PP 5/2021; PerBPOM various
          x-ion-conditional: true
          x-ion-condition: Required for regulated categories (pharmacy, alcohol, tobacco, meat)
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            storeStatus:
              const: TEMPORARILY_CLOSED
          required:
          - storeStatus
        then:
          required:
          - temporaryClosureEnd
      - if:
          properties:
            invoicingModel:
              const: CENTRAL
          required:
          - invoicingModel
        then:
          required:
          - invoicingEntity
      - if:
          properties:
            kycStatus:
              const: APPROVED_WITH_CAVEATS
          required:
          - kycStatus
        then:
          required:
          - kycCaveats
      - if:
          properties:
            providerCategory:
              enum:
              - PHARMACY
          required:
          - providerCategory
        then:
          required:
          - categoryLicenses
      - if:
          properties:
            invoicingModel:
              const: CENTRAL
          required:
          - invoicingModel
        then:
          required:
          - invoicingEntity
      - if:
          properties:
            kycStatus:
              const: APPROVED_WITH_CAVEATS
          required:
          - kycStatus
        then:
          required:
          - kycCaveats
      - if:
          properties:
            storeStatus:
              const: TEMPORARILY_CLOSED
          required:
          - storeStatus
        then:
          required:
          - temporaryClosureEnd
      required:
      - invoicingModel
      - storeStatus
      - operatingHours
      - holidayCalendar
      - providerCategory
      - nibRegistered
      - kycStatus
      - kycLevel
      - kycValidUntil
      x-ion-closed-extensions: false
    LocalisedText__trade_resource:
      type: object
      description: Language-keyed text. "id" always required. "en" required for XB pattern.
      minProperties: 1
      additionalProperties:
        type: string
      properties:
        id:
          type: string
        en:
          type: string
      example:
        id: Nasi Goreng Spesial
        en: Special Fried Rice
      required:
      - id
    TradeResourceAttributes:
      type: object
      title: Trade Resource Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeResourceAttributes
      x-beckn-attaches-to: Resource.resourceAttributes
      properties:
        quantity:
          type: object
          title: Quantity of this resource on the order line
          additionalProperties: false
          properties:
            value:
              type: number
              minimum: 0
              description: Numeric quantity — may be fractional for weight-based goods
            unit:
              type: string
              enum:
              - piece
              - pack
              - box
              - carton
              - kilogram
              - gram
              - litre
              - millilitre
              - subscription
              - voucher
              - topup
              description: Unit of measure appropriate to what is being ordered
          required:
          - value
          - unit
        resourceStructure:
          type: string
          enum:
          - PLAIN
          - VARIANT
          - WITH_EXTRAS
          - COMPOSED
          - BUNDLE
          description: 'PLAIN: single SKU, no choices. VARIANT: one of several pre-defined options of a parent.
            WITH_EXTRAS: base item with optional add-ons. COMPOSED: base with mandatory and optional customisation
            groups. BUNDLE: composite of multiple component resources (see bundleComposition).

            '
          example: COMPOSED
        resourceTangibility:
          type: string
          enum:
          - PHYSICAL
          - DIGITAL_VOUCHER
          - DIGITAL_TOP_UP
          - DIGITAL_SUBSCRIPTION
          description: 'PHYSICAL: tangible goods requiring logistics fulfilment. DIGITAL_VOUCHER: voucher code,
            gift card, in-game currency (delivered electronically). DIGITAL_TOP_UP: mobile pulsa, data package,
            utility bill top-up. DIGITAL_SUBSCRIPTION: time-bound digital subscription access.

            '
          example: PHYSICAL
        parentResourceId:
          type: string
          description: ID of parent resource. Present on VARIANT and WITH_EXTRAS.
          example: PIZZA-MARGHERITA
          x-ion-conditional: true
          x-ion-condition: Required when resourceStructure IN [VARIANT, WITH_EXTRAS]
        isDefaultVariant:
          type: boolean
          description: Whether this is the default variant shown to consumer.
          example: true
          x-ion-condition: Required when resourceStructure = VARIANT
        variantGroup:
          type: object
          additionalProperties: false
          required:
          - id
          - name
          - variantOn
          properties:
            id:
              type: string
              example: VG-SIZE
            name:
              $ref: '#/components/schemas/LocalisedText'
            variantOn:
              type: string
              description: The attribute that varies. e.g. size, colour, storage
              example: size
          x-ion-condition: Required when resourceStructure = VARIANT
        variantMatrix:
          type: object
          additionalProperties: false
          description: 'Multi-axis variant declaration. Use instead of explicit VARIANT resources when combinations
            are derivable. BPP MUST resolve the specific variant at on_select and compute final price via priceDeltaByCombination
            or per-axis priceDelta. Only valid on parent resources with resourceStructure=PLAIN; child VARIANT resources
            are not needed when this is declared.

            '
          required:
          - axes
          - combinationRules
          properties:
            axes:
              type: array
              minItems: 1
              maxItems: 6
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    description: Axis identifier (size, color, storage, model, etc.)
                  label:
                    $ref: '#/components/schemas/LocalisedText'
                  values:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: string
                        label:
                          $ref: '#/components/schemas/LocalisedText'
                        priceDelta:
                          type: number
                          description: IDR delta for this axis value (signed)
                        available:
                          type: boolean
                          default: true
                          description: Whether this specific axis value is currently sellable
                        resourceIdOverride:
                          type: string
                          description: Optional mapping to an explicit VARIANT resource ID if this combination has
                            its own SKU
                      required:
                      - id
                required:
                - id
                - values
            combinationRules:
              type: object
              additionalProperties: false
              properties:
                generateAllCombinations:
                  type: boolean
                  description: If true, all permutations are valid. If false, combinations must be listed explicitly.
                explicitCombinations:
                  type: array
                  description: Required when generateAllCombinations=false. Each entry names axis-value pairs and
                    the resulting final price.
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      axisValues:
                        type: object
                        description: Map of axisId to valueId
                        additionalProperties:
                          type: string
                      priceValue:
                        type: number
                        description: Absolute IDR price for this combination
                      available:
                        type: boolean
                        default: true
                    required:
                    - axisValues
                    - priceValue
                priceCalculationMode:
                  type: string
                  enum:
                  - SUM_AXIS_DELTAS
                  - EXPLICIT_PRICE
                  description: 'SUM_AXIS_DELTAS — final price = base offer price + sum of axis priceDeltas. EXPLICIT_PRICE
                    — final price = priceValue from matching explicitCombinations entry.

                    '
                  default: SUM_AXIS_DELTAS
              required:
              - generateAllCombinations
        customisationGroups:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
                example: CG-SIZE
              name:
                $ref: '#/components/schemas/LocalisedText'
              selectionType:
                type: string
                enum:
                - SINGLE_REQUIRED
                - SINGLE_OPTIONAL
                - MULTIPLE_OPTIONAL
                - FIXED
              minSelections:
                type: integer
                minimum: 0
              maxSelections:
                type: integer
                minimum: 1
              sequence:
                type: integer
              inputType:
                type: string
                enum:
                - select
                - text
                - number
                - date
                - boolean
                default: select
              options:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: string
                    label:
                      $ref: '#/components/schemas/LocalisedText'
                    resourceId:
                      type: string
                    priceDelta:
                      type: object
                      additionalProperties: false
                      required:
                      - type
                      - value
                      properties:
                        type:
                          type: string
                          enum:
                          - FIXED
                          - PERCENT
                        value:
                          type: number
                    available:
                      type: boolean
                      default: true
                  required:
                  - id
                  - label
            required:
            - id
            - name
            - selectionType
            - options
          x-ion-conditional: true
          x-ion-condition: Required when resourceStructure IN [COMPOSED, WITH_EXTRAS]

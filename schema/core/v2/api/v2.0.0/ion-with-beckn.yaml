            '
          example: '3171'
          x-ion-mandatory: optional
          x-ion-regulatory: Permendagri 72/2019
        kelurahan:
          type: string
          description: 'Village or urban administrative zone (kelurahan/desa). Required for precise last-mile delivery address.

            '
          example: Gambir
          x-ion-mandatory: conditional
          x-ion-condition: Required for delivery addresses
        kecamatan:
          type: string
          description: 'District or sub-city (kecamatan). Administrative level between kabupaten and kelurahan.

            '
          example: Gambir
          x-ion-mandatory: conditional
          x-ion-condition: Required for delivery addresses
        rt:
          type: string
          description: 'Rukun Tetangga — neighborhood group, typically ~40 households. Critical for last-mile delivery in
            Indonesia — riders use RT/RW to locate specific houses in dense residential areas.

            '
          example: '02'
          x-ion-mandatory: optional
        rw:
          type: string
          description: 'Rukun Warga — association of RTs, typically ~400 people. Used together with RT for precise address
            resolution.

            '
          example: '03'
          x-ion-mandatory: optional
        postalCode:
          type: string
          pattern: ^[0-9]{5}$
          description: 'Indonesian kodepos (postal code). 5 digits. Distinct from Beckn core area_code which conflates many
            country-specific codes.

            '
          example: '12190'
          x-ion-mandatory: optional
          x-ion-regulatory: PermenKomInfo — Standar Kodepos Nasional
        addressType:

        '@context': ./context.jsonld
        '@type': ion:TradeCommitmentAttributes
      x-beckn-attaches-to: Commitment.commitmentAttributes
      properties:
        lineId:
          type: string
          description: 'Unique identifier for this commitment line within the contract. Assigned by BAP at select.
            Persists through the contract lifecycle. Used to reference specific lines in updates, cancellations,
            returns.

            '
          example: L01
        resourceId:
          type: string
          description: 'ID of the resource being committed. References beckn:Resource.id from the catalog. For VARIANT
            resources, this is the specific variant ID, not the parent.

            '
          example: ITEM-001
        offerId:
          type: string
          description: 'ID of the offer under which this resource is being committed. References beckn:Offer.id
            from the catalog.

            '
          example: OFFER-001
        quantity:
          type: object
          additionalProperties: false
          description: Quantity of this resource being committed.
          properties:
            count:
              type: integer
              minimum: 1
              description: Unit count for discrete items
              example: 2
            measure:
              type: object
              additionalProperties: false
              description: Weight or volume measure for continuous items
              properties:
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                  - METER
                value:
                  type: number
                  minimum: 0
              required:
              - unit
              - value
        price:
          type: object
          additionalProperties: false
          description: 'Locked price for this commitment line as agreed at select. Price is fixed at on_select and
            does not change unless a price adjustment branch is triggered.

            '
          properties:
            value:
              type: string
              description: IDR amount as string decimal
              example: '89000'
            currency:
              type: string
              const: IDR
              default: IDR
          required:
          - value
          - currency
          x-ion-conditional: true
          x-ion-condition: Set by BPP at on_select
        customisationSelections:
          type: array
          description: 'Buyer''s selections from customisationGroups for COMPOSED and WITH_EXTRAS resources. One
            entry per group selected.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              groupId:
                type: string
                description: ID of the customisationGroup selected from
                example: CG-SIZE
              optionId:
                type: string
                description: ID of the option selected within the group
                example: OPT-LARGE
              priceDelta:
                type: object
                additionalProperties: false
                description: Price delta applied by this selection
                properties:
                  type:
                    type: string
                    enum:
                    - FIXED
                    - PERCENT
                  value:
                    type: number
            required:
            - groupId
            - optionId
          x-ion-conditional: true
          x-ion-condition: Required for COMPOSED and WITH_EXTRAS resources
        specialInstructions:
          type: string
          description: 'Per-line buyer note. e.g. "Extra crispy base", "No onion", "Gift wrap this item separately".
            Visible to seller at fulfilment.

            '
          maxLength: 500
          example: Tanpa bawang, tolong pedas ekstra.
      required:
      - lineId
      - resourceId
      - offerId
      - quantity
      x-ion-closed-extensions: false
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
    TradeConsiderationAttributes:
      type: object
      title: Trade Consideration Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeConsiderationAttributes
      x-beckn-attaches-to: Consideration.considerationAttributes
      properties:
        ppnRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'PPN (Pajak Pertambahan Nilai) rate applied to this consideration line. The applicable rate
            MUST be sourced from current Indonesian tax regulation (DJP / PMK), not hardcoded. Current PPN standard
            is 0.11 (11%) per PMK 131/2024 under UU 7/2021 HPP; some categories (basic foods, books, health services)
            have reduced or zero rates.

            '
          example: 0.11
          x-ion-regulatory: UU 7/2021 HPP; PMK 131/2024 (or current applicable PMK)
          x-ion-conditional: true
          x-ion-condition: Required on TAX consideration lines
        ppnbmRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'PPnBM (Pajak Penjualan atas Barang Mewah) rate for luxury goods. Applied in addition to
            PPN. Applicable rate MUST be sourced from current regulation (rates vary by luxury category — check
            DJP for the applicable schedule under PMK 141/2021 and later).

            '
          example: 0.2
          x-ion-regulatory: UU 42/2009 tentang PPN dan PPnBM; current applicable PMK
          x-ion-conditional: true
          x-ion-condition: Required on PPNBM consideration lines for luxury goods
        discountType:
          type: string
          enum:
          - PERCENT
          - FIXED
          description: 'Whether the discount is a percentage of item price or a fixed IDR amount. Used on PROVIDER_BENEFIT
            and BUYER_BENEFIT consideration lines.

            '
          example: PERCENT
          x-ion-conditional: true
          x-ion-condition: Required on discount consideration lines
        discountValue:
          type: string
          description: 'Value of the discount. If discountType=PERCENT, this is a decimal e.g. 0.10 for 10%. If
            discountType=FIXED, this is an IDR amount.

            '
          example: '0.10'
          x-ion-conditional: true
          x-ion-condition: Required when discountType is declared
        breakupLineType:
          type: string
          enum:
          - ITEM
          - DELIVERY
          - TAX
          - TAX_PPNBM
          - HANDLING
          - PACKAGING
          - INSURANCE
          - SHIPPING_INSURANCE
          - PROVIDER_BENEFIT
          - BUYER_BENEFIT
          - PLATFORM_VOUCHER
          - SELLER_VOUCHER
          - PAYMENT_VOUCHER
          - SHIPPING_VOUCHER
          - CASHBACK_VOUCHER
          - BRAND_VOUCHER
          - COD_FEE
          - TRADE_IN
          - LOYALTY_REDEEM
          - FINANCE_CHARGE
          - GIFT_WRAP
          - PLATFORM_FEE
          - STREAMER_COMMISSION
          - AFFILIATE_COMMISSION
          - SLA_PENALTY
          - CANCELLATION_FEE
          - RESTOCKING_FEE
          - PPH_WITHHOLDING
          - PPN_REMIT_PMSE
          - PAYMENT_MILESTONE
          description: 'Canonical type for this consideration breakup line. ITEM: per-item price line. DELIVERY:
            shipping/delivery charge. TAX: PPN tax line. TAX_PPNBM: luxury goods tax line. HANDLING: special handling
            surcharge (cold chain, oversized). PACKAGING: gift or special packaging charge. INSURANCE: shipping
            insurance. PROVIDER_BENEFIT: seller-funded discount. BUYER_BENEFIT: BAP-funded discount or cashback.
            COD_FEE: cash on delivery handling fee. TRADE_IN: trade-in deduction value. LOYALTY_REDEEM: loyalty
            points redemption. FINANCE_CHARGE: BNPL or credit interest charge. GIFT_WRAP: gift wrapping fee. PLATFORM_FEE:
            ION network participant fee.

            '
          example: ITEM
        totalAmount:
          type: number
          description: 'Total amount for this consideration in IDR. For the final consideration record, this is
            the net payable amount after all discounts and taxes.

            '
          example: 89000
        currency:
          type: string
          const: IDR
          description: Always IDR for domestic ION transactions.
          default: IDR
      required:
      - breakupLineType
      - totalAmount
      - currency
      x-ion-closed-extensions: false
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
    TradeContractAttributes:
      type: object
      title: Trade Contract Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeContractAttributes
      x-beckn-attaches-to: Contract.contractAttributes
      properties:
        fulfillingLocationId:
          type: string
          description: 'ID of the specific fulfilment centre that will fulfil this order. Populated by BPP at on_confirm

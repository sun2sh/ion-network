            required:
            - url
          description: Video reviews for product feedback. Moderated.
          maxItems: 3
        verifiedPurchase:
          type: boolean
          description: 'Whether this rating is from a verified purchase on ION. True by default — all ION ratings
            are verified purchases by design.

            '
          default: true
        helpfulCount:
          type: integer
          minimum: 0
          description: Number of users who marked this review as helpful
          default: 0
        sellerResponse:
          type: object
          additionalProperties: false
          description: Seller's public response to the review
          properties:
            responseText:
              type: string
              maxLength: 1000
            respondedAt:
              type: string
              format: date-time
            respondedBy:
              type: string
              description: Name of seller representative
      required:
      - ratingCategory
      - ratingValue
      x-ion-closed-extensions: false
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
    IONReconcileAttributes:
      type: object
      title: ION Reconcile Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:ReconcileAttributes
      x-beckn-attaches-to: Settlement.settlementAttributes
      properties:
        reconId:
          type: string
          description: ION-assigned unique identifier for this reconciliation session.
          example: RECON-2026-00001234
        contractId:
          type: string
          description: The trade contract this reconciliation covers.
          example: ORD-2026-00012345
        settlementBasis:
          type: string
          enum:
          - AFTER_DELIVERY
          - AFTER_SHIPMENT
          - AFTER_RETURN_WINDOW_EXPIRY
          - AFTER_PAYMENT_DUE_DATE
          description: 'The event that triggers the settlement window countdown. Agreed at order init and locked
            at confirm.

            '
          example: AFTER_DELIVERY
          x-ion-regulatory: ION Network Model settlement design
        settlementWindow:
          type: string
          description: 'Time window after settlementBasis event within which settlement must be completed. ISO 8601
            duration.

            '
          example: P1D
        collectedBy:
          type: string
          enum:
          - BAP
          - BPP
          - LSP
          description: Which participant collected payment from consumer.
          example: BAP
        amounts:
          type: object
          additionalProperties: false
          description: Declared amounts for reconciliation.
          required:
          - baseContractAmount
          properties:
            baseContractAmount:
              type: number
              description: Total confirmed order value in IDR (from on_confirm quote)
            buyerFinderFeeType:
              type: string
              enum:
              - PERCENT
              - AMOUNT
              description: How BAP's finder fee is calculated
            buyerFinderFeeAmount:
              type: number
              description: BAP's finder fee in IDR
            withholdingAmount:
              type: number
              description: 'Amount withheld until return window closes. Held by collector to fund potential refunds.

                '
            withholdingAmountPercent:
              type: number
              description: Withholding as percentage of base order amount e.g. 0.1 = 10%
            netPayableToReceiver:
              type: number
              description: 'Amount payable to BPP/receiver = baseContractAmount - finderFee - withholdingAmount
                ± adjustments

                '
        returnWindowExpiry:
          type: string
          format: date-time
          description: 'Date-time when return window closes and withholding amount releases. After this date, withholdingAmount
            is settled to BPP if no return.

            '
          example: 2026-04-26 23:59:59+07:00
        adjustments:
          type: array
          description: 'Contract-level adjustments to the base order amount that must be agreed before final settlement.
            These are post-confirm changes due to returns, cancellations, penalties, or price corrections.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              type:
                type: string
                enum:
                - PRICE_ADJUSTMENT
                - CANCELLATION_FEE
                - RETURN_DEDUCTION
                - DAMAGE_PENALTY
                - LATE_DELIVERY_PENALTY
                - COD_REMITTANCE
                - REFUND
                - LOYALTY_ADJUSTMENT
                - PLATFORM_FEE_CORRECTION
              amount:
                type: number
                description: 'IDR amount. Positive = deducted from receiver. Negative = credited to receiver.

                  '
              reason:
                type: string
                description: Human-readable reason for adjustment
              referenceId:
                type: string
                description: Contract ID, return ID, or cancellation ID that triggered this
              approvedBy:
                type: string
                enum:
                - BAP
                - BPP
                - ION
                description: Which participant approved this adjustment
            required:
            - type
            - amount
            - reason
        netSettlementAmount:
          type: number
          description: 'Final net amount to settle to BPP/receiver after all adjustments. Computed: baseContractAmount
            - finderFee - withholdingAmount + adjustments sum

            '
        netWithholdingRelease:
          type: number
          description: 'Withholding amount to release to BPP after return window. withholdingAmount - returnDeductions
            - refunds

            '
        counterparty:
          type: object
          additionalProperties: false
          description: Identification of the counterparty in this reconciliation.
          properties:
            collectorAppId:
              type: string
              description: Subscriber ID of BAP (collector)
              example: buyerapp.ion.id
            receiverAppId:
              type: string
              description: Subscriber ID of BPP (receiver)
              example: sellerapp.ion.id
        bankDetails:
          type: object
          additionalProperties: false
          description: Settlement bank account details for the receiver.
          properties:
            settlementType:
              type: string
              enum:
              - BI_FAST
              - RTGS
              - SKN
              - QRIS
              - VIRTUAL_ACCOUNT
              - UPI
            accountNumber:
              type: string
            ifscCode:
              type: string
              description: Bank routing code equivalent
            upiAddress:
              type: string
            beneficiaryName:
              type: string
            bankName:
              type: string
        reconStatus:
          type: string
          enum:
          - PENDING
          - AGREED
          - DISPUTED
          description: 'PENDING: recon initiated, awaiting counterparty acknowledgment. AGREED: both parties agree
            on amounts. DISPUTED: amounts do not match — raise ticket via raise/on_raise.

            '
          example: PENDING
        disputeReason:
          type: string
          description: 'Human-readable reason for DISPUTED status. Referenced when raising a dispute ticket via
            raise/on_raise.

            '
          x-ion-condition: Required when reconStatus is DISPUTED
        recon_status:
          type: string
          enum:
          - '01'
          - '02'
          - '03'
          description: 'Numeric recon status compatible with ONDC RSF receiver_recon model. 01=amounts match, 02=collector
            paid more than expected, 03=less than expected.

            '
          x-ion-conditional: true
          x-ion-condition: Set by on_reconcile from BPP/receiver
        slaPenaltyDeduction:
          type: number
          minimum: 0
          description: 'Amount deducted from BPP''s net settlement due to confirmed SLA breaches on this contract.
            BAP tracks breaches in performanceAttributes.slaBreachCount during fulfilment and applies penalty per
            ION network penalty schedule at reconcile time.

            '
          example: 5000
          x-ion-regulatory: ION Network Policy — SLA Enforcement Schedule
        slaPenaltyBreakdown:
          type: array
          description: Per-breach penalty calculation for transparency.
          items:
            type: object
            additionalProperties: false
            properties:
              tatType:
                type: string
              breachedAt:
                type: string
                format: date-time
              penaltyAmount:
                type: number
            required:
            - tatType
            - penaltyAmount
        streamerCommissionAmount:
          type: number
          minimum: 0
          description: 'Amount to settle to streamer/creator for B2C-LIVE orders. Deducted from BPP or BAP per commercial
            agreement.

            '
          x-ion-conditional: true
          x-ion-condition: Required when contract was placed via live/social commerce
        affiliateCommissionAmount:
          type: number
          minimum: 0
          description: Amount to settle to affiliate for affiliate-sourced orders.
          x-ion-conditional: true
          x-ion-condition: Required when contract.liveCommerceContext.sourceChannel=AFFILIATE_LINK
        isBatch:
          type: boolean
          description: 'Whether this reconcile covers multiple contracts as a batch. Marketplace scale requires
            batched settlement (daily, weekly). When true, contractId may be null and contractIds[] carries the
            per-contract list; contractDetails[] carries per-contract breakdown.

            '
          default: false
        contractIds:
          type: array
          items:
            type: string
          description: 'List of contract IDs covered when isBatch=true. Single-contract reconcile populates contractId
            instead.

            '
          x-ion-condition: Required when isBatch=true
        batchPeriod:
          type: object
          additionalProperties: false
          description: Time window this batch covers.
          required:
          - from
          - to
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
            periodLabel:
              type: string
              description: Human-readable label (e.g. "Week 17, 2026")
          x-ion-condition: Required when isBatch=true
        contractDetails:
          type: array
          description: Per-contract financial breakdown for batch reconcile.
          items:
            type: object
            additionalProperties: false
            properties:
              contractId:
                type: string
              baseAmount:
                type: number
              finderFee:
                type: number
              withholding:
                type: number
              slaPenaltyDeduction:
                type: number
              adjustment:
                type: number
              taxWithheld:
                type: number
              netPayable:
                type: number
            required:
            - contractId
            - baseAmount
            - netPayable
          x-ion-condition: Required when isBatch=true
        parentReconId:
          type: string
          description: 'When this reconcile corrects an earlier one, references the earlier reconId. Used for clawbacks,
            additional payments, post-reconcile corrections discovered later.

            '
          x-ion-conditional: true
          x-ion-condition: Required when adjustmentType is present
        adjustmentType:
          type: string
          enum:
          - CLAWBACK
          - ADDITIONAL_PAYMENT
          - CORRECTION
          - LATE_FEE_CHARGE
          - GOODWILL_CREDIT
          description: 'Type of adjustment being made against a prior reconcile. CLAWBACK: recover funds previously
            settled incorrectly. ADDITIONAL_PAYMENT: additional settlement owed. CORRECTION: neutral correction
            with details in adjustmentReason. LATE_FEE_CHARGE: overdue payment charge. GOODWILL_CREDIT: platform-funded
            consumer compensation.

            '
          x-ion-conditional: true
          x-ion-condition: Required when parentReconId is present
        adjustmentReason:
          type: string
          description: Plain-language reason for the adjustment
          x-ion-conditional: true
          x-ion-condition: Required when adjustmentType is present
        adjustmentEvidence:
          type: array
          items:
            type: string
            format: uri
          description: Evidence URLs supporting the adjustment (audit logs, screenshots, communications)
          x-ion-condition: Required when adjustmentType is CLAWBACK
        taxWithholdings:
          type: array
          description: 'Indonesian tax withholdings applied to this settlement. Marketplaces in Indonesia withhold
            PPh 22 on certain transactions per PMK 41/2022 (marketplace tax collector appointment). PPh 23 applies
            on service fees. PPN remittance for PMSE. Required for Mall-tier and above sellers.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              taxType:
                type: string
                enum:
                - PPH22
                - PPH23
                - PPH_FINAL_05
                - PPN_REMIT
                - PPN_PMSE
                description: 'PPH22: withheld by marketplace on seller payouts (0.5% of gross). PPH23: on services/commissions
                  (2%). PPH_FINAL_05: final tax 0.5% for UMKM. PPN_REMIT: PPN collected from buyer remitted to DJP.
                  PPN_PMSE: PPN for cross-border digital services (Netflix model).

                  '
              rate:
                type: number
                description: Applied rate (decimal, e.g. 0.005 for 0.5%)
              basis:
                type: number
                description: IDR base amount against which the tax was computed
              amount:
                type: number
                description: IDR amount withheld
              remittedTo:
                type: string
                enum:
                - DJP
                - OJK
                - BI
                - OTHER
                description: Which authority the withheld amount is remitted to
              remittanceRef:
                type: string
                description: Reference number of the remittance (NTPN for PPh)
              remittanceDate:
                type: string
                format: date
              buktiPotongUrl:
                type: string
                format: uri
                description: URL to the Bukti Potong (withholding slip) document
            required:
            - taxType
            - rate
            - amount
            - remittedTo
          x-ion-regulatory: PMK 41/PMK.03/2022 tentang Penunjukan Pemungut PPh 22; PMK 48/PMK.03/2020 (PPN PMSE);
            PMK 168/2023
          x-ion-conditional: true
          x-ion-condition: Required when seller is Mall-tier or above, or when PPN PMSE applies
        codRemittance:
          type: object
          description: 'COD remittance record — how the collecting party (LSP or BPP) remits collected cash to the
            selling party. Batched across many shipments; the batch reference ties line-level reconciliation to
            the aggregate transfer.

            '
          additionalProperties: false
          properties:
            remittanceAmount:
              type: number
              description: Total amount remitted in this batch (IDR)
            batchRef:
              type: string
              description: Remittance batch reference (ties many shipments to one transfer)
            batchPeriod:
              type: object
              description: Window over which collections were aggregated
              properties:
                start:
                  type: string
                  format: date-time
                end:
                  type: string
                  format: date-time
            remittanceTimestamp:
              type: string
              format: date-time
            remittanceMethod:
              type: string
              enum:
              - BI_FAST
              - BANK_TRANSFER_SKN
              - BANK_TRANSFER_RTGS
              - VIRTUAL_ACCOUNT
              - QRIS
            variance:
              type: object
              description: Variance between expected and remitted amounts
              properties:
                expectedAmount:
                  type: number
                remittedAmount:
                  type: number
                variancePercent:
                  type: number
                  description: (remitted - expected) / expected, in decimal
                toleranceApplied:
                  type: number
                  description: Per-FWA or network-default tolerance (e.g. 0.001 = 0.1%)
                withinTolerance:
                  type: boolean
          x-ion-conditional: true
          x-ion-condition: Required when one or more settlements in this reconcile carry method=COD
      required:
      - reconId
      - contractId
      - collectedBy
      - settlementBasis
      - settlementWindow
      - amounts
      - counterparty
      - reconStatus
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            adjustmentType:
              const: CLAWBACK
          required:
          - adjustmentType
        then:
          required:
          - adjustmentEvidence
      - if:
          properties:
            isBatch:
              const: 'true'
          required:
          - isBatch
        then:
          required:
          - batchPeriod
          - contractDetails
          - contractIds
      - if:
          properties:
            reconStatus:
              const: DISPUTED
          required:
          - reconStatus
        then:
          required:
          - disputeReason
      x-ion-closed-extensions: false
    IONSupportTicket:
      type: object
      title: ION Consumer Support Ticket
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:SupportTicket
      x-beckn-attaches-to: Support.channels[*]
      properties:
        id:
          type: string
          description: Network-wide unique issue identifier. Assigned at creation.
          example: ISSUE-2026-00001234
        category:
          type: string
          enum:
          - ITEM
          - FULFILLMENT
          - PAYMENT
          - SELLER_CONDUCT
          - RETURN
          - REFUND
          - OTHER
          description: 'ITEM: wrong item, damaged, not as described. FULFILLMENT: delivery delay, non-delivery,
            wrong address. PAYMENT: overcharge, payment not processed, duplicate charge. SELLER_CONDUCT: rude behaviour,
            misleading listing. RETURN: return not accepted, pickup not arranged. REFUND: refund not processed,
            partial refund disputed.

            '
          example: FULFILLMENT
        subCategory:
          type: string
          description: 'Sub-category code for more precise classification. e.g. ITM01=wrong item, ITM02=damaged,
            FLM01=delay, FLM02=non-delivery

            '
          example: FLM01
        complainantInfo:
          type: object
          additionalProperties: false
          required:
          - person
          - contact
          properties:
            person:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  example: Ahmad Fauzi
              required:
              - name
            contact:
              type: object
              additionalProperties: false
              properties:
                phone:
                  type: string
                  example: 0812345678
                email:
                  type: string
                  format: email
                  example: ahmad@email.com
        description:
          type: object
          additionalProperties: false
          required:
          - shortDesc
          properties:
            name:
              type: string
              description: Issue title
              example: Pesanan tidak sampai setelah 3 hari
            shortDesc:
              type: string
              description: Brief description of the problem
              example: Paket masih dalam status DISPATCHED sudah 3 hari, belum ada update.
            longDesc:
              type: string
              description: Full detailed description
            images:
              type: array
              items:
                type: string
                format: uri
              description: Evidence photos or screenshots
        source:
          type: object
          additionalProperties: false
          required:
          - networkParticipantId
          - type
          properties:
            networkParticipantId:
              type: string
              description: Subscriber ID of the NP where issue was raised (BAP)
              example: buyerapp.ion.id
            type:
              type: string
              enum:
              - CONSUMER
              - SELLER
              - INTERFACING_NP
              description: Who raised this issue
        expectedResponseTime:
          type: string
          description: ISO 8601 duration. Time within which respondent must acknowledge.
          example: PT2H
        expectedResolutionTime:
          type: string
          description: ISO 8601 duration. Time within which resolution must be provided.
          example: P1D
        status:
          type: string
          enum:
          - OPEN
          - PROCESSING
          - ESCALATED
          - RESOLVED
          - CLOSED
          example: OPEN
        severity:
          type: string
          enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          example: MEDIUM
        issueActions:
          type: object
          additionalProperties: false
          description: Action trail — both sides of the conversation.
          properties:
            complainantActions:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  complainantAction:
                    type: string
                    enum:
                    - OPEN
                    - ESCALATE
                    - CLOSE
                  shortDesc:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
                  updatedBy:
                    $ref: '#/components/schemas/IONSupportTicket/properties/issueActions/properties/ActionParty'
                required:
                - complainantAction
                - updatedAt
                - updatedBy
            respondentActions:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  respondentAction:
                    type: string
                    enum:
                    - PROCESSING
                    - RESOLVED
                    - NO_ACTION
                    - NEED_MORE_INFO
                  shortDesc:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
                  updatedBy:
                    $ref: '#/components/schemas/IONSupportTicket/properties/issueActions/properties/ActionParty'
                  cascadedLevel:
                    type: integer
                    minimum: 1
                    maximum: 3
                    description: '1=Interfacing NP (auto-resolution). 2=GRO of counterparty NP. 3=ODR external resolution.

                      '
                required:
                - respondentAction
                - updatedAt
                - updatedBy
            ActionParty:
              type: object
              additionalProperties: false
              properties:
                org:
                  type: object
                  properties:
                    name:
                      type: string
                      example: sellerapp.ion.id::ion:trade
                contact:
                  type: object
                  properties:
                    phone:
                      type: string
                    email:
                      type: string
                      format: email
                person:
                  type: object
                  properties:
                    name:
                      type: string
        resolution:
          type: object
          additionalProperties: false
          properties:
            shortDesc:
              type: string
              description: Brief summary of resolution
            longDesc:
              type: string
              description: Full resolution details
            actionTriggered:
              type: string
              enum:
              - REFUND
              - REPLACEMENT
              - RESHIP
              - NO_ACTION
              - CANCEL
              - PARTIAL_REFUND
              description: Action taken to resolve the issue
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Consumer rating of resolution quality after issue is CLOSED
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        escalationLevel:
          type: string
          enum:
          - SELLER
          - MARKETPLACE_MEDIATION
          - BPSK
          - KOMINFO
          - ION_NETWORK
          description: 'Current escalation level of the dispute. Progression: 1. SELLER — buyer contacts seller
            (default support flow, 1-2 days). 2. MARKETPLACE_MEDIATION — marketplace intervenes (3-5 days). 3. BPSK
            — Badan Penyelesaian Sengketa Konsumen (government, 6-14 days). 4. KOMINFO — Kominfo consumer protection
            portal. 5. ION_NETWORK — escalated to ION via raise channel. Each level has its own SLA declared in
            support/on_support.

            '
          example: MARKETPLACE_MEDIATION
          x-ion-regulatory: UU 8/1999 Pasal 45; Permendag 72/2015 tentang BPSK
        escalationTimestamp:
          type: string
          format: date-time
          description: When the ticket was escalated to this level
          x-ion-conditional: true
          x-ion-condition: Required when escalationLevel changes
        escalationSlaHours:
          type: integer
          description: SLA in hours for the current escalation level
        bpskReference:
          type: string
          description: BPSK case reference number
          x-ion-condition: Required when escalationLevel=BPSK
        kominfoReference:
          type: string
          description: Kominfo consumer complaint portal reference
          x-ion-condition: Required when escalationLevel=KOMINFO
      required:
      - id
      - category
      - complainantInfo
      - description
      - source
      - status
      - createdAt
      - updatedAt
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            escalationLevel:
              const: BPSK
          required:
          - escalationLevel
        then:
          required:
          - bpskReference
      - if:
          properties:
            escalationLevel:
              const: KOMINFO
          required:
          - escalationLevel
        then:
          required:
          - kominfoReference
      x-ion-attach-mode: array-element-by-jsonld-type
      x-ion-closed-extensions: false
      x-ion-discriminator:
        propertyName: '@type'
        expectedValue: ion:SupportTicket
        doc: 'JSON Schema discriminator: an array element matches this schema iff its @type property equals expectedValue.'
    IONTaxDetail:
      type: object
      title: Indonesia Tax Detail
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TaxDetail
      properties:
        taxRegime:
          type: string
          enum:
          - PPN
          - PPNBM
          - PPH22
          - PPH23
          - PPN_FINAL
          - EXEMPT
          description: 'PPN: Pajak Pertambahan Nilai (VAT), standard 11%. PPNBM: Pajak Penjualan atas Barang Mewah
            (luxury goods tax). PPH22: Income tax on import/certain transactions. PPH23: Withholding tax on services.
            PPN_FINAL: Final PPN for specific categories (e.g. certain construction). EXEMPT: No tax applicable
            (basic foods, books, health services).

            '
          example: PPN
          x-ion-regulatory: UU 7/2021 tentang Harmonisasi Peraturan Perpajakan (HPP)
        taxCategory:
          type: string
          enum:
          - BKP
          - JKP
          - NON_BKP
          description: 'BKP: Barang Kena Pajak — taxable goods. JKP: Jasa Kena Pajak — taxable services. NON_BKP:
            Non-taxable goods or services.

            '
          example: BKP
          x-ion-regulatory: UU 8/1983 tentang PPN Pasal 4
        taxRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'Tax rate as decimal fraction. The applicable rate MUST be sourced from current Indonesian
            tax regulation (DJP / PMK), not hardcoded. For reference, PPN standard is currently 0.11 (11%) per PMK
            131/2024; PPnBM rates vary by category (typical range 0.10 to 0.75). This field documents the rate actually
            charged on this transaction.

            '
          example: 0.11
          x-ion-conditional: true
          x-ion-condition: Required when taxRegime is not EXEMPT
        taxAmount:
          type: number
          description: Calculated tax amount in IDR
          example: 9900
          x-ion-conditional: true
          x-ion-condition: Required when taxRegime is not EXEMPT
        taxIncluded:
          type: boolean
          description: 'Whether the tax amount is already included in the item price (tax-inclusive pricing) or
            added on top (tax-exclusive).

            '
          example: true
        eFakturRef:
          type: string
          nullable: true
          description: 'e-Invoice reference (Faktur Pajak) number from DJP e-Faktur system. Format: XXX.XXX-YY.XXXXXXXX
            where XXX is kode faktur. Only applicable for PKP sellers.

            '
          example: 010.000-26.00000001
          x-ion-regulatory: PMK 168/PMK.010/2023 tentang Faktur Pajak
        taxBaseAmount:
          type: number
          description: The amount on which tax is calculated (before tax)
          example: 90000
          x-ion-conditional: true
          x-ion-condition: Required for proper tax computation trail
      allOf:
      - if:
          properties:
            taxRegime:
              not:
                enum:
                - EXEMPT
          required:
          - taxRegime
        then:
          required:

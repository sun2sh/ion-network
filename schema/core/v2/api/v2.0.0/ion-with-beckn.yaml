          description: "Category-specific rating dimension. Enables granular seller insights and more informative reviews.\
            \ Examples by category:\n  Food: freshness, taste, packaging, temperature_on_arrival\n  Fashion: fit, fabric_quality,\
            \ size_accuracy, color_accuracy\n  Electronics: battery_life, performance, build_quality, authenticity\n  Grocery:\
            \ freshness, expiry_date, cold_chain, substitution\n  Beauty: effectiveness, skin_reaction, scent, texture\n"
          example: fit
        ratingImages:
          x-ion-mandatory: optional
          type: array
          items:
            type: string
            format: uri
          description: 'Photo URLs attached to the review. Subject to BAP/BPP moderation. Photo reviews drive significant
            conversion on all major marketplaces.

            '
          maxItems: 10
        ratingVideos:
          x-ion-mandatory: optional
          type: array
          items:
            type: object
            additionalProperties: false
            required:
            - url
            properties:
              url:
                type: string
                format: uri
              durationSeconds:
                type: integer
              thumbnailUrl:
                type: string
                format: uri
          description: Video reviews for product feedback. Moderated.
          maxItems: 3
        verifiedPurchase:
          x-ion-mandatory: optional
          type: boolean
          description: 'Whether this rating is from a verified purchase on ION. True by default — all ION ratings are verified
            purchases by design.

            '
          default: true
        helpfulCount:
          x-ion-mandatory: optional
          type: integer
          minimum: 0
          description: Number of users who marked this review as helpful
          default: 0
        sellerResponse:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          description: Seller's public response to the review
          properties:
            responseText:
              type: string
              maxLength: 1000
            respondedAt:
              type: string
              format: date-time
            respondedBy:
              type: string
              description: Name of seller representative
    ION_IONReconcileAttributes:
      type: object
      title: ION Reconcile Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:ReconcileAttributes
      x-beckn-attaches-to: Settlement.settlementAttributes
      required:
      - reconId
      - contractId
      - collectedBy
      - settlementBasis
      - settlementWindow
      properties:
        reconId:
          type: string
          description: ION-assigned unique identifier for this reconciliation session.
          example: RECON-2026-00001234
          x-ion-mandatory: always
        contractId:
          type: string
          description: The trade contract this reconciliation covers.
          example: ORD-2026-00012345
          x-ion-mandatory: always
        settlementBasis:
          type: string
          enum:
          - AFTER_DELIVERY
          - AFTER_SHIPMENT
          - AFTER_RETURN_WINDOW_EXPIRY
          - AFTER_PAYMENT_DUE_DATE
          description: 'The event that triggers the settlement window countdown. Agreed at order init and locked at confirm.

            '
          example: AFTER_DELIVERY
          x-ion-mandatory: always
          x-ion-regulatory: ION Network Model settlement design
        settlementWindow:
          type: string
          description: 'Time window after settlementBasis event within which settlement must be completed. ISO 8601 duration.

            '
          example: P1D
          x-ion-mandatory: always
        collectedBy:
          type: string
          enum:
          - BAP
          - BPP
          - LSP
          description: Which participant collected payment from consumer.
          example: BAP
          x-ion-mandatory: always
        amounts:
          type: object
          additionalProperties: false
          description: Declared amounts for reconciliation.
          required:
          - baseContractAmount
          properties:
            baseContractAmount:
              type: number
              description: Total confirmed order value in IDR (from on_confirm quote)
            buyerFinderFeeType:
              type: string
              enum:
              - PERCENT
              - AMOUNT
              description: How BAP's finder fee is calculated
            buyerFinderFeeAmount:
              type: number
              description: BAP's finder fee in IDR
            withholdingAmount:
              type: number
              description: 'Amount withheld until return window closes. Held by collector to fund potential refunds.

                '
            withholdingAmountPercent:
              type: number
              description: Withholding as percentage of base order amount e.g. 0.1 = 10%
            netPayableToReceiver:
              type: number
              description: 'Amount payable to BPP/receiver = baseContractAmount - finderFee - withholdingAmount ± adjustments

                '
          x-ion-mandatory: always
        returnWindowExpiry:
          type: string
          format: date-time
          description: 'Date-time when return window closes and withholding amount releases. After this date, withholdingAmount
            is settled to BPP if no return.

            '
          example: 2026-04-26 23:59:59+07:00
          x-ion-mandatory: optional
        adjustments:
          type: array
          description: 'Contract-level adjustments to the base order amount that must be agreed before final settlement. These
            are post-confirm changes due to returns, cancellations, penalties, or price corrections.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - type
            - amount
            - reason
            properties:
              type:
                type: string
                enum:
                - PRICE_ADJUSTMENT
                - CANCELLATION_FEE
                - RETURN_DEDUCTION
                - DAMAGE_PENALTY
                - LATE_DELIVERY_PENALTY
                - COD_REMITTANCE
                - REFUND
                - LOYALTY_ADJUSTMENT
                - PLATFORM_FEE_CORRECTION
              amount:
                type: number
                description: 'IDR amount. Positive = deducted from receiver. Negative = credited to receiver.

                  '
              reason:
                type: string
                description: Human-readable reason for adjustment
              referenceId:
                type: string
                description: Contract ID, return ID, or cancellation ID that triggered this
              approvedBy:
                type: string
                enum:
                - BAP
                - BPP
                - ION
                description: Which participant approved this adjustment
          x-ion-mandatory: optional
        netSettlementAmount:
          type: number
          description: 'Final net amount to settle to BPP/receiver after all adjustments. Computed: baseContractAmount - finderFee
            - withholdingAmount + adjustments sum

            '
          x-ion-mandatory: optional
        netWithholdingRelease:
          type: number
          description: 'Withholding amount to release to BPP after return window. withholdingAmount - returnDeductions - refunds

            '
          x-ion-mandatory: optional
        counterparty:
          type: object
          additionalProperties: false
          description: Identification of the counterparty in this reconciliation.
          properties:
            collectorAppId:
              type: string
              description: Subscriber ID of BAP (collector)
              example: buyerapp.ion.id
            receiverAppId:
              type: string
              description: Subscriber ID of BPP (receiver)
              example: sellerapp.ion.id
          x-ion-mandatory: always
        bankDetails:
          type: object
          additionalProperties: false
          description: Settlement bank account details for the receiver.
          properties:
            settlementType:
              type: string
              enum:
              - BI_FAST
              - RTGS
              - SKN
              - QRIS
              - VIRTUAL_ACCOUNT
              - UPI
            accountNumber:
              type: string
            ifscCode:
              type: string
              description: Bank routing code equivalent
            upiAddress:
              type: string
            beneficiaryName:
              type: string
            bankName:
              type: string
          x-ion-mandatory: optional
        reconStatus:
          type: string
          enum:
          - PENDING
          - AGREED
          - DISPUTED
          description: 'PENDING: recon initiated, awaiting counterparty acknowledgment. AGREED: both parties agree on amounts.
            DISPUTED: amounts do not match — raise ticket via raise/on_raise.

            '
          example: PENDING
          x-ion-mandatory: always
        disputeReason:
          type: string
          description: 'Human-readable reason for DISPUTED status. Referenced when raising a dispute ticket via raise/on_raise.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when reconStatus is DISPUTED
        recon_status:
          type: string
          enum:
          - '01'
          - '02'
          - '03'
          description: 'Numeric recon status compatible with ONDC RSF receiver_recon model. 01=amounts match, 02=collector
            paid more than expected, 03=less than expected.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Set by on_reconcile from BPP/receiver
        slaPenaltyDeduction:
          type: number
          minimum: 0
          description: 'Amount deducted from BPP''s net settlement due to confirmed SLA breaches on this contract. BAP tracks
            breaches in performanceAttributes.slaBreachCount during fulfilment and applies penalty per ION network penalty
            schedule at reconcile time.

            '
          example: 5000
          x-ion-mandatory: optional
          x-ion-regulatory: ION Network Policy — SLA Enforcement Schedule
        slaPenaltyBreakdown:
          type: array
          description: Per-breach penalty calculation for transparency.
          items:
            type: object
            additionalProperties: false
            required:
            - tatType
            - penaltyAmount
            properties:
              tatType:
                type: string
              breachedAt:
                type: string
                format: date-time
              penaltyAmount:
                type: number
          x-ion-mandatory: optional
        streamerCommissionAmount:
          type: number
          minimum: 0
          description: 'Amount to settle to streamer/creator for B2C-LIVE orders. Deducted from BPP or BAP per commercial
            agreement.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when contract was placed via live/social commerce
        affiliateCommissionAmount:
          type: number
          minimum: 0
          description: Amount to settle to affiliate for affiliate-sourced orders.
          x-ion-mandatory: conditional
          x-ion-condition: Required when contract.liveCommerceContext.sourceChannel=AFFILIATE_LINK
        isBatch:
          type: boolean
          description: 'Whether this reconcile covers multiple contracts as a batch. Marketplace scale requires batched settlement
            (daily, weekly). When true, contractId may be null and contractIds[] carries the per-contract list; contractDetails[]
            carries per-contract breakdown.

            '
          default: false
          x-ion-mandatory: optional
        contractIds:
          type: array
          items:
            type: string
          description: 'List of contract IDs covered when isBatch=true. Single-contract reconcile populates contractId instead.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when isBatch=true
        batchPeriod:
          type: object
          additionalProperties: false
          description: Time window this batch covers.
          required:
          - from
          - to
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
            periodLabel:
              type: string
              description: Human-readable label (e.g. "Week 17, 2026")
          x-ion-mandatory: conditional
          x-ion-condition: Required when isBatch=true
        contractDetails:
          type: array
          description: Per-contract financial breakdown for batch reconcile.
          items:
            type: object
            additionalProperties: false
            required:
            - contractId
            - baseAmount
            - netPayable
            properties:
              contractId:
                type: string
              baseAmount:
                type: number
              finderFee:
                type: number
              withholding:
                type: number
              slaPenaltyDeduction:
                type: number
              adjustment:
                type: number
              taxWithheld:
                type: number
              netPayable:
                type: number
          x-ion-mandatory: conditional
          x-ion-condition: Required when isBatch=true
        parentReconId:
          type: string
          description: 'When this reconcile corrects an earlier one, references the earlier reconId. Used for clawbacks, additional
            payments, post-reconcile corrections discovered later.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when adjustmentType is present
        adjustmentType:
          type: string
          enum:
          - CLAWBACK
          - ADDITIONAL_PAYMENT
          - CORRECTION
          - LATE_FEE_CHARGE
          - GOODWILL_CREDIT
          description: 'Type of adjustment being made against a prior reconcile. CLAWBACK: recover funds previously settled
            incorrectly. ADDITIONAL_PAYMENT: additional settlement owed. CORRECTION: neutral correction with details in adjustmentReason.
            LATE_FEE_CHARGE: overdue payment charge. GOODWILL_CREDIT: platform-funded consumer compensation.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when parentReconId is present
        adjustmentReason:
          type: string
          description: Plain-language reason for the adjustment
          x-ion-mandatory: conditional
          x-ion-condition: Required when adjustmentType is present
        adjustmentEvidence:
          type: array
          items:
            type: string
            format: uri
          description: Evidence URLs supporting the adjustment (audit logs, screenshots, communications)
          x-ion-mandatory: conditional
          x-ion-condition: Required when adjustmentType is CLAWBACK
        taxWithholdings:
          type: array
          description: 'Indonesian tax withholdings applied to this settlement. Marketplaces in Indonesia withhold PPh 22
            on certain transactions per PMK 41/2022 (marketplace tax collector appointment). PPh 23 applies on service fees.
            PPN remittance for PMSE. Required for Mall-tier and above sellers.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - taxType
            - rate
            - amount
            - remittedTo
            properties:
              taxType:
                type: string
                enum:
                - PPH22
                - PPH23
                - PPH_FINAL_05
                - PPN_REMIT
                - PPN_PMSE
                description: 'PPH22: withheld by marketplace on seller payouts (0.5% of gross). PPH23: on services/commissions
                  (2%). PPH_FINAL_05: final tax 0.5% for UMKM. PPN_REMIT: PPN collected from buyer remitted to DJP. PPN_PMSE:
                  PPN for cross-border digital services (Netflix model).

                  '
              rate:
                type: number
                description: Applied rate (decimal, e.g. 0.005 for 0.5%)
              basis:
                type: number
                description: IDR base amount against which the tax was computed
              amount:
                type: number
                description: IDR amount withheld
              remittedTo:
                type: string
                enum:
                - DJP
                - OJK
                - BI
                - OTHER
                description: Which authority the withheld amount is remitted to
              remittanceRef:
                type: string
                description: Reference number of the remittance (NTPN for PPh)
              remittanceDate:
                type: string
                format: date
              buktiPotongUrl:
                type: string
                format: uri
                description: URL to the Bukti Potong (withholding slip) document
          x-ion-mandatory: conditional
          x-ion-condition: Required when seller is Mall-tier or above, or when PPN PMSE applies
          x-ion-regulatory: PMK 41/PMK.03/2022 tentang Penunjukan Pemungut PPh 22; PMK 48/PMK.03/2020 (PPN PMSE); PMK 168/2023
    ION_IONSupportTicket:
      type: object
      title: ION Consumer Support Ticket
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:SupportTicket
      x-beckn-attaches-to: Support (as issue contents)
      required:
      - id
      - category
      - complainantInfo
      - description
      - source
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          x-ion-mandatory: always
          type: string
          description: Network-wide unique issue identifier. Assigned at creation.
          example: ISSUE-2026-00001234
        orderId:
          x-ion-mandatory: conditional
          x-ion-condition: Required when ticket relates to a specific order
          type: string
          description: Contract/order ID this issue relates to.
          example: ORD-2026-00012345
        category:
          x-ion-mandatory: always
          type: string
          enum:
          - ITEM
          - FULFILLMENT
          - PAYMENT
          - SELLER_CONDUCT
          - RETURN
          - REFUND
          - OTHER
          description: 'ITEM: wrong item, damaged, not as described. FULFILLMENT: delivery delay, non-delivery, wrong address.
            PAYMENT: overcharge, payment not processed, duplicate charge. SELLER_CONDUCT: rude behaviour, misleading listing.
            RETURN: return not accepted, pickup not arranged. REFUND: refund not processed, partial refund disputed.

            '
          example: FULFILLMENT
        subCategory:
          x-ion-mandatory: optional
          type: string
          description: 'Sub-category code for more precise classification. e.g. ITM01=wrong item, ITM02=damaged, FLM01=delay,
            FLM02=non-delivery

            '
          example: FLM01
        complainantInfo:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          required:
          - person
          - contact
          properties:
            person:
              type: object
              additionalProperties: false
              required:
              - name
              properties:
                name:
                  type: string
                  example: Ahmad Fauzi
            contact:
              type: object
              additionalProperties: false
              properties:
                phone:
                  type: string
                  example: 0812345678
                email:
                  type: string
                  format: email
                  example: ahmad@email.com
        description:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          required:
          - shortDesc
          properties:
            name:
              type: string
              description: Issue title
              example: Pesanan tidak sampai setelah 3 hari
            shortDesc:
              type: string
              description: Brief description of the problem
              example: Paket masih dalam status DISPATCHED sudah 3 hari, belum ada update.
            longDesc:
              type: string
              description: Full detailed description
            images:
              type: array
              items:
                type: string
                format: uri
              description: Evidence photos or screenshots
        source:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          required:
          - networkParticipantId
          - type
          properties:
            networkParticipantId:
              type: string
              description: Subscriber ID of the NP where issue was raised (BAP)
              example: buyerapp.ion.id
            type:
              type: string
              enum:
              - CONSUMER
              - SELLER
              - INTERFACING_NP
              description: Who raised this issue
        expectedResponseTime:
          x-ion-mandatory: optional
          type: string
          description: ISO 8601 duration. Time within which respondent must acknowledge.
          example: PT2H
        expectedResolutionTime:
          x-ion-mandatory: optional
          type: string
          description: ISO 8601 duration. Time within which resolution must be provided.
          example: P1D
        status:
          x-ion-mandatory: always
          type: string
          enum:
          - OPEN
          - PROCESSING
          - ESCALATED
          - RESOLVED
          - CLOSED
          example: OPEN
        severity:
          x-ion-mandatory: optional
          type: string
          enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          example: MEDIUM
        issueActions:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          description: Action trail — both sides of the conversation.
          properties:
            complainantActions:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                - complainantAction
                - updatedAt
                - updatedBy
                properties:
                  complainantAction:
                    type: string
                    enum:
                    - OPEN
                    - ESCALATE
                    - CLOSE
                  shortDesc:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
                  updatedBy:
                    $ref: '#/components/schemas/IONSupportTicket/properties/issueActions/properties/ActionParty'
            respondentActions:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                - respondentAction
                - updatedAt
                - updatedBy
                properties:
                  respondentAction:
                    type: string
                    enum:
                    - PROCESSING
                    - RESOLVED
                    - NO_ACTION
                    - NEED_MORE_INFO
                  shortDesc:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
                  updatedBy:
                    $ref: '#/components/schemas/IONSupportTicket/properties/issueActions/properties/ActionParty'
                  cascadedLevel:
                    type: integer
                    minimum: 1
                    maximum: 3
                    description: '1=Interfacing NP (auto-resolution). 2=GRO of counterparty NP. 3=ODR external resolution.

                      '
            ActionParty:
              type: object
              additionalProperties: false
              properties:
                org:
                  type: object
                  properties:
                    name:
                      type: string
                      example: sellerapp.ion.id::ion:trade
                contact:
                  type: object
                  properties:
                    phone:
                      type: string
                    email:
                      type: string
                      format: email
                person:
                  type: object
                  properties:
                    name:
                      type: string
        resolution:
          x-ion-mandatory: optional
          type: object
          additionalProperties: false
          properties:
            shortDesc:
              type: string
              description: Brief summary of resolution
            longDesc:
              type: string
              description: Full resolution details
            actionTriggered:
              type: string
              enum:
              - REFUND
              - REPLACEMENT
              - RESHIP
              - NO_ACTION
              - CANCEL
              - PARTIAL_REFUND
              description: Action taken to resolve the issue
        rating:
          x-ion-mandatory: optional
          type: integer
          minimum: 1
          maximum: 5
          description: Consumer rating of resolution quality after issue is CLOSED
        createdAt:
          x-ion-mandatory: always
          type: string
          format: date-time
        updatedAt:
          x-ion-mandatory: always
          type: string
          format: date-time
        escalationLevel:
          x-ion-mandatory: optional
          type: string
          enum:
          - SELLER
          - MARKETPLACE_MEDIATION
          - BPSK
          - KOMINFO
          - ION_NETWORK
          description: 'Current escalation level of the dispute. Progression: 1. SELLER — buyer contacts seller (default support
            flow, 1-2 days). 2. MARKETPLACE_MEDIATION — marketplace intervenes (3-5 days). 3. BPSK — Badan Penyelesaian Sengketa
            Konsumen (government, 6-14 days). 4. KOMINFO — Kominfo consumer protection portal. 5. ION_NETWORK — escalated
            to ION via raise channel. Each level has its own SLA declared in support/on_support.

            '
          example: MARKETPLACE_MEDIATION
          x-ion-regulatory: UU 8/1999 Pasal 45; Permendag 72/2015 tentang BPSK
        escalationTimestamp:
          x-ion-mandatory: conditional
          x-ion-condition: Required when escalationLevel changes
          type: string
          format: date-time
          description: When the ticket was escalated to this level
        escalationSlaHours:
          x-ion-mandatory: optional
          type: integer
          description: SLA in hours for the current escalation level
        bpskReference:
          x-ion-mandatory: conditional
          x-ion-condition: Required when escalationLevel=BPSK
          type: string
          description: BPSK case reference number
        kominfoReference:
          x-ion-mandatory: conditional
          x-ion-condition: Required when escalationLevel=KOMINFO
          type: string
          description: Kominfo consumer complaint portal reference
    ION_IONTaxDetail:
      type: object
      title: Indonesia Tax Detail
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TaxDetail
      required:
      - taxRegime
      - taxCategory
      properties:
        taxRegime:
          x-ion-mandatory: optional
          type: string
          enum:
          - PPN
          - PPNBM
          - PPH22
          - PPH23
          - PPN_FINAL
          - EXEMPT
          description: 'PPN: Pajak Pertambahan Nilai (VAT), standard 11%. PPNBM: Pajak Penjualan atas Barang Mewah (luxury
            goods tax). PPH22: Income tax on import/certain transactions. PPH23: Withholding tax on services. PPN_FINAL: Final
            PPN for specific categories (e.g. certain construction). EXEMPT: No tax applicable (basic foods, books, health
            services).

            '
          example: PPN
          x-ion-regulatory: UU 7/2021 tentang Harmonisasi Peraturan Perpajakan (HPP)
        taxCategory:
          x-ion-mandatory: optional
          type: string
          enum:
          - BKP
          - JKP
          - NON_BKP
          description: 'BKP: Barang Kena Pajak — taxable goods. JKP: Jasa Kena Pajak — taxable services. NON_BKP: Non-taxable
            goods or services.

            '
          example: BKP
          x-ion-regulatory: UU 8/1983 tentang PPN Pasal 4
        taxRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'Tax rate as decimal fraction. PPN standard: 0.11. PPnBM rates: 0.10, 0.20, 0.30, 0.40, 0.50, 0.75,
            1.25.

            '
          example: 0.11
          x-ion-mandatory: conditional
          x-ion-condition: Required when taxRegime is not EXEMPT
        taxAmount:
          type: number
          description: Calculated tax amount in IDR
          example: 9900
          x-ion-mandatory: conditional
          x-ion-condition: Required when taxRegime is not EXEMPT
        taxIncluded:
          type: boolean
          description: 'Whether the tax amount is already included in the item price (tax-inclusive pricing) or added on top
            (tax-exclusive).

            '
          example: true
          x-ion-mandatory: always
        eFakturRef:
          type: string
          nullable: true
          description: 'e-Invoice reference (Faktur Pajak) number from DJP e-Faktur system. Format: XXX.XXX-YY.XXXXXXXX where
            XXX is kode faktur. Only applicable for PKP sellers.

            '
          example: 010.000-26.00000001
          x-ion-mandatory: optional
          x-ion-regulatory: PMK 168/PMK.010/2023 tentang Faktur Pajak
        taxBaseAmount:
          type: number
          description: The amount on which tax is calculated (before tax)
          example: 90000
          x-ion-mandatory: conditional
          x-ion-condition: Required for proper tax computation trail
      allOf:
      - if:
          properties:
            taxRegime:
              not:
                enum:
                - EXEMPT
          required:
          - taxRegime
        then:
          required:
          - taxRate
          - taxAmount
          - taxBaseAmount
    ION_TradeCommitmentAttributes:
      type: object
      title: Trade Commitment Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeCommitmentAttributes
      x-beckn-attaches-to: Commitment.commitmentAttributes
      required:
      - lineId
      - resourceId
      - offerId
      - quantity
      properties:
        lineId:
          type: string
          description: 'Unique identifier for this commitment line within the contract. Assigned by BAP at select. Persists
            through the contract lifecycle. Used to reference specific lines in updates, cancellations, returns.

            '
          example: L01
          x-ion-mandatory: always
        resourceId:
          type: string
          description: 'ID of the resource being committed. References beckn:Resource.id from the catalog. For VARIANT resources,
            this is the specific variant ID, not the parent.

            '
          example: ITEM-001
          x-ion-mandatory: always
        offerId:
          type: string
          description: 'ID of the offer under which this resource is being committed. References beckn:Offer.id from the catalog.

            '
          example: OFFER-001
          x-ion-mandatory: always
        quantity:
          type: object
          additionalProperties: false
          description: Quantity of this resource being committed.
          properties:
            count:
              type: integer
              minimum: 1
              description: Unit count for discrete items
              example: 2
            measure:
              type: object
              additionalProperties: false
              description: Weight or volume measure for continuous items
              properties:
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                  - METER
                value:
                  type: number
                  minimum: 0
              required:
              - unit
              - value
          x-ion-mandatory: always
        price:
          type: object
          additionalProperties: false
          description: 'Locked price for this commitment line as agreed at select. Price is fixed at on_select and does not
            change unless a price adjustment branch is triggered.

            '
          properties:
            value:
              type: string
              description: IDR amount as string decimal
              example: '89000'
            currency:
              type: string
              const: IDR
              default: IDR
          required:
          - value
          - currency
          x-ion-mandatory: conditional
          x-ion-condition: Set by BPP at on_select
        customisationSelections:
          type: array
          description: 'Buyer''s selections from customisationGroups for COMPOSED and WITH_EXTRAS resources. One entry per
            group selected.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - groupId
            - optionId
            properties:
              groupId:
                type: string
                description: ID of the customisationGroup selected from
                example: CG-SIZE
              optionId:
                type: string
                description: ID of the option selected within the group
                example: OPT-LARGE
              priceDelta:
                type: object
                additionalProperties: false
                description: Price delta applied by this selection
                properties:
                  type:
                    type: string
                    enum:
                    - FIXED
                    - PERCENT
                  value:
                    type: number
          x-ion-mandatory: conditional
          x-ion-condition: Required for COMPOSED and WITH_EXTRAS resources
        specialInstructions:
          type: string
          description: 'Per-line buyer note. e.g. "Extra crispy base", "No onion", "Gift wrap this item separately". Visible
            to seller at fulfilment.

            '
          maxLength: 500
          example: Tanpa bawang, tolong pedas ekstra.
          x-ion-mandatory: optional
    ION_TradeConsiderationAttributes:
      type: object
      title: Trade Consideration Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeConsiderationAttributes
      x-beckn-attaches-to: Consideration.considerationAttributes
      properties:
        ppnRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'PPN (Pajak Pertambahan Nilai) rate applied to this consideration line. Standard rate is 0.11 (11%).
            Some categories (basic foods, books, health services) may have reduced or zero rates.

            '
          example: 0.11
          x-ion-mandatory: conditional
          x-ion-condition: Required on TAX consideration lines
          x-ion-regulatory: UU 7/2021 tentang Harmonisasi Peraturan Perpajakan (HPP); PMK 62/2022
        ppnbmRate:
          type: number
          minimum: 0
          maximum: 1
          description: 'PPnBM (Pajak Penjualan atas Barang Mewah) rate for luxury goods. Applied in addition to PPN. Rates
            vary by luxury category. Common rates: 0.10, 0.20, 0.30, 0.40, 0.50, 0.75, 1.25.

            '
          example: 0.2
          x-ion-mandatory: conditional
          x-ion-condition: Required on PPNBM consideration lines for luxury goods
          x-ion-regulatory: UU 42/2009 tentang PPN dan PPnBM; PMK 141/2021
        discountType:
          type: string
          enum:
          - PERCENT
          - FIXED
          description: 'Whether the discount is a percentage of item price or a fixed IDR amount. Used on PROVIDER_BENEFIT
            and BUYER_BENEFIT consideration lines.

            '
          example: PERCENT
          x-ion-mandatory: conditional
          x-ion-condition: Required on discount consideration lines
        discountValue:
          type: string
          description: 'Value of the discount. If discountType=PERCENT, this is a decimal e.g. 0.10 for 10%. If discountType=FIXED,
            this is an IDR amount.

            '
          example: '0.10'
          x-ion-mandatory: conditional
          x-ion-condition: Required when discountType is declared
        breakupLineType:
          type: string
          enum:
          - ITEM
          - DELIVERY
          - TAX
          - TAX_PPNBM
          - HANDLING
          - PACKAGING
          - INSURANCE
          - SHIPPING_INSURANCE
          - PROVIDER_BENEFIT
          - BUYER_BENEFIT
          - PLATFORM_VOUCHER
          - SELLER_VOUCHER
          - PAYMENT_VOUCHER
          - SHIPPING_VOUCHER
          - CASHBACK_VOUCHER
          - BRAND_VOUCHER
          - COD_FEE
          - TRADE_IN
          - LOYALTY_REDEEM
          - FINANCE_CHARGE
          - GIFT_WRAP
          - PLATFORM_FEE
          - STREAMER_COMMISSION
          - AFFILIATE_COMMISSION
          - SLA_PENALTY
          - CANCELLATION_FEE
          - RESTOCKING_FEE
          - PPH_WITHHOLDING
          - PPN_REMIT_PMSE
          - PAYMENT_MILESTONE
          description: 'Canonical type for this consideration breakup line. ITEM: per-item price line. DELIVERY: shipping/delivery
            charge. TAX: PPN tax line. TAX_PPNBM: luxury goods tax line. HANDLING: special handling surcharge (cold chain,
            oversized). PACKAGING: gift or special packaging charge. INSURANCE: shipping insurance. PROVIDER_BENEFIT: seller-funded
            discount. BUYER_BENEFIT: BAP-funded discount or cashback. COD_FEE: cash on delivery handling fee. TRADE_IN: trade-in
            deduction value. LOYALTY_REDEEM: loyalty points redemption. FINANCE_CHARGE: BNPL or credit interest charge. GIFT_WRAP:
            gift wrapping fee. PLATFORM_FEE: ION network participant fee.

            '
          example: ITEM
          x-ion-mandatory: always
        totalAmount:
          type: number
          description: 'Total amount for this consideration in IDR. For the final consideration record, this is the net payable
            amount after all discounts and taxes.

            '
          example: 89000
          x-ion-mandatory: always
        currency:
          type: string
          const: IDR
          description: Always IDR for domestic ION transactions.
          default: IDR
          x-ion-mandatory: always
    ION_TradeContractAttributes:
      type: object
      title: Trade Contract Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeContractAttributes
      x-beckn-attaches-to: Contract.contractAttributes
      properties:
        fulfillingLocationId:
          type: string
          description: 'ID of the specific fulfilment centre that will fulfil this order. Populated by BPP at on_confirm after
            internal FC selection. Present when provider has multiple FC locations.

            '
          example: FC-SBY-01
          x-ion-mandatory: conditional
          x-ion-condition: Present when provider has multiple fulfilment centres
        buyerInstructions:
          type: string
          description: 'Free-text delivery instructions from buyer. e.g. "Leave at door", "Call before arriving", "Do not
            ring bell after 9pm".

            '
          example: Titipkan ke satpam jika tidak ada di rumah.
          x-ion-mandatory: optional
        deliveryPreferences:
          type: object
          additionalProperties: false
          properties:
            preferredTimeSlot:
              type: object
              additionalProperties: false
              description: Buyer's preferred delivery time window.
              properties:
                start:
                  type: string
                  format: date-time
                  example: 2026-04-03 09:00:00+07:00
                end:
                  type: string
                  format: date-time
                  example: 2026-04-03 13:00:00+07:00
              required:
              - start
              - end
            preferredPerformanceMode:
              type: string
              enum:
              - DELIVERY
              - SELF_PICKUP
              - DINE_IN
              - CURBSIDE
          x-ion-mandatory: optional
        invoicePreferences:
          type: object
          additionalProperties: false
          description: Buyer's invoice type and tax identity declaration.
          properties:
            taxId:
              type: object
              additionalProperties: false
              properties:
                scheme:
                  type: string
                  enum:
                  - NPWP
                  - NIK
                  description: NPWP for businesses, NIK for individuals
                value:
                  type: string
                  description: Tax ID number
                  example: 1234567890123456
              required:
              - scheme
              - value
            invoiceType:
              type: string
              enum:
              - RECEIPT
              - TAX_INVOICE
              - EINVOICE
              - SURAT_TAGIHAN
              - KOMERSIAL_INVOICE
              description: 'RECEIPT: simple receipt, no tax identity required. TAX_INVOICE: Faktur Pajak, requires PKP seller
                and NPWP buyer. EINVOICE: e-Faktur via DJP system. SURAT_TAGIHAN: PKP seller to non-PKP buyer — commercial
                invoice, no input-tax claim rights. KOMERSIAL_INVOICE: cross-border commercial invoice, bilingual layout.

                '
              example: TAX_INVOICE
          x-ion-mandatory: optional
        fakturPajakReference:
          type: string
          description: 'Faktur Pajak (e-Invoice) reference number assigned by BPP after contract confirm for PKP sellers.
            16-digit DJP format.

            '
          example: 010.000-26.00000001
          x-ion-mandatory: conditional
          x-ion-condition: Required for PKP sellers (identity.pkpStatus=PKP) when invoiceType=TAX_INVOICE
          x-ion-regulatory: PMK 168/PMK.010/2023 tentang Faktur Pajak
        purchaseOrderReference:
          type: string
          description: 'Buyer''s Purchase Order number for B2B wholesale transactions. Allows buyer to link ION contract to
            their internal PO system.

            '
          example: PO-2026-00456
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2B wholesale commerce patterns
        cancellationReasonCode:
          type: string
          description: 'Standardised cancellation reason code when contract is cancelled. Set by BPP on contract at time of
            cancellation.

            '
          enum:
          - BUYER_REQUESTED
          - SELLER_INITIATED
          - ITEM_UNAVAILABLE
          - PAYMENT_FAILED
          - FRAUD_SUSPECTED
          - REGULATORY_HOLD
          - LOGISTICS_FAILURE
          - FORCE_CANCEL_TAT_BREACH
          x-ion-mandatory: conditional
          x-ion-condition: Required when contract status is CANCELLED
        quoteTrail:
          type: array
          description: 'Trail of quote changes for price adjustment branch. Each entry records a delta to the original confirmed
            quote.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - type
            - id
            - currency
            - value
            properties:
              type:
                type: string
                enum:
                - item
                - tax
                - delivery
                - discount
                - refund
                - adjustment
              id:
                type: string
                description: Item ID or consideration ID this adjustment applies to
              currency:
                type: string
                const: IDR
              value:
                type: string
                description: Signed IDR amount. Negative for deductions, positive for additions.
                example: '-5000'
              reason:
                type: string
                description: Human-readable reason for this adjustment
          x-ion-mandatory: optional
        partialCancellationAllowed:
          type: boolean
          description: Whether individual items in a multi-item order can be cancelled.
          default: false
          x-ion-mandatory: optional
        replacementPreferred:
          type: boolean
          description: 'Whether buyer prefers replacement over refund in case of defective or wrong item. Declared at confirm.

            '
          default: false
          x-ion-mandatory: optional
        disputeWindowDays:
          type: integer
          minimum: 0
          description: 'Number of days after delivery within which buyer may raise a dispute. Defaults to ION network policy
            if not declared.

            '
          example: 7
          x-ion-mandatory: optional
        creditTermsDays:
          type: integer
          minimum: 0
          description: 'Number of days credit extended to the buyer from delivery date. 0 = prepaid. Common values: 7, 14,
            30, 45, 60, 90.

            '
          example: 30
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2B-CR commerce pattern
        paymentDueDate:
          type: string
          format: date-time
          description: 'Absolute datetime by which payment must be made for credit orders. Computed from delivery date + creditTermsDays.

            '
          example: 2026-05-19 23:59:59+07:00
          x-ion-mandatory: conditional
          x-ion-condition: Required when creditTermsDays > 0
        subscriptionBillingCycle:
          type: string
          enum:
          - WEEKLY
          - FORTNIGHTLY
          - MONTHLY
          - QUARTERLY
          - ANNUAL
          description: Billing cycle for subscription commerce pattern.
          example: MONTHLY
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2C-SUB commerce pattern
        subscriptionNextBillingDate:
          type: string
          format: date-time
          description: 'Date-time of next billing event. Updated by BPP after each successful billing.

            '
          example: 2026-05-19 00:00:00+07:00
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2C-SUB commerce pattern
        linkedContractId:
          type: string
          description: 'Reference to the Trade Contract this Logistics Contract serves. Enables ION Central to trace causal
            relationship between trade and logistics transactions.

            '
          example: TRD-2026-00012345
          x-ion-mandatory: conditional
          x-ion-condition: Required on all Logistics Contracts linked to a Trade fulfilment
        codAmount:
          type: string
          description: 'Total cash amount to be collected from consumer at delivery for COD orders. String decimal in IDR.

            '
          example: '150000'
          x-ion-mandatory: conditional
          x-ion-condition: Required when paymentRail=COD
        beaCukaiReference:
          type: string
          description: 'Indonesian Customs (Bea Cukai) clearance reference number. Required for all international inbound
            shipments.

            '
          example: BC-2026-001234567
          x-ion-mandatory: conditional
          x-ion-condition: Required for INTERNATIONAL_AIR and INTERNATIONAL_OCEAN logistics
          x-ion-regulatory: UU 17/2006 tentang Kepabeanan; PMK 199/PMK.010/2019
        liveCommerceContext:
          type: object
          additionalProperties: false
          description: 'Context for orders placed via live commerce or social commerce (TikTok Shop, Shopee Live, Tokopedia
            Play, OTT-embedded commerce). Required for B2C-LIVE spine. Enables revenue attribution to streamer/affiliate and
            platform-specific settlement.

            '
          properties:
            sourceChannel:
              type: string
              enum:
              - LIVE_STREAM
              - SHORT_VIDEO
              - OTT_EMBEDDED
              - SOCIAL_POST
              - AFFILIATE_LINK
              - GROUP_BUY
              - SHOPPABLE_AD
              description: 'Entry point for the order. OTT_EMBEDDED = order placed from within video streaming app (Netflix,
                Vidio, Disney+ Hotstar shoppable content).

                '
            liveSessionId:
              type: string
              description: Live session identifier when sourceChannel=LIVE_STREAM
              example: SHP-LIVE-2026-0419-8837
            streamerId:
              type: string
              description: 'Creator/streamer subscriber ID for revenue attribution. Streamer may earn commission separately
                from BPP/BAP.

                '
              example: streamer.ion.id/budi-gadget
            streamerCommissionPercent:
              type: number
              minimum: 0
              maximum: 1
              description: Streamer's commission as fraction of item value
              example: 0.05
            productPinnedAtMinute:
              type: integer
              minimum: 0
              description: Minutes into the live session when this product was pinned/featured
            ottPlatform:
              type: string
              enum:
              - VIDIO
              - NETFLIX
              - DISNEY_PLUS_HOTSTAR
              - IFLIX
              - VIU
              - GENFLIX
              - WETV
              - YOUTUBE
              - OTHER
              description: OTT platform where shoppable content was served (for OTT_EMBEDDED)
            ottContentId:
              type: string
              description: OTT platform's content ID (movie, episode, match) where item was shown
              example: VIDIO-MATCH-PERSIJA-PERSIB-2026-04-19
            ottTimestampSeconds:
              type: integer
              description: Playback position in seconds when product was presented
            shortVideoId:
              type: string
              description: Short-video/reel ID when sourceChannel=SHORT_VIDEO
            affiliateId:
              type: string
              description: Affiliate subscriber ID when sourceChannel=AFFILIATE_LINK
            groupBuyId:
              type: string
              description: Group-buy session ID when sourceChannel=GROUP_BUY
            groupBuyMinParticipants:
              type: integer
              description: Minimum participants needed for group discount to activate
            groupBuyActivated:
              type: boolean
              description: Whether group-buy discount has been unlocked
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2C-LIVE spine; optional otherwise
        refundDestination:
          type: object
          additionalProperties: false
          description: 'Where refund will be credited. When buyer does not specify, default is ORIGINAL_PAYMENT_METHOD. Platform
            wallets often faster; store credit used for partial refunds and goodwill.

            '
          required:
          - method
          properties:
            method:
              type: string
              enum:
              - ORIGINAL_PAYMENT_METHOD
              - PLATFORM_WALLET
              - BANK_TRANSFER
              - LOYALTY_POINTS
              - STORE_CREDIT
              - VOUCHER
            walletId:
              type: string
              description: Required when method=PLATFORM_WALLET
            bankAccount:
              type: object
              additionalProperties: false
              properties:
                bankCode:
                  type: string
                accountNumber:
                  type: string
                accountName:
                  type: string
              description: Required when method=BANK_TRANSFER
            loyaltyMultiplier:
              type: number
              description: Bonus multiplier when redeeming to loyalty points e.g. 1.1 = 10% bonus
          x-ion-mandatory: optional
        subscriptionTrialDays:
          type: integer
          minimum: 0
          description: First N days free. Billing starts on day N+1.
          x-ion-mandatory: optional
        subscriptionPauseType:
          type: string
          enum:
          - ACTIVE
          - PAUSED_UNTIL_DATE
          - PAUSED_INDEFINITE
          description: Current pause state for B2C-SUB orders
          x-ion-mandatory: optional
        subscriptionPauseUntil:
          type: string
          format: date-time
          description: Date to automatically resume. Required when pauseType=PAUSED_UNTIL_DATE
          x-ion-mandatory: conditional
          x-ion-condition: Required when subscriptionPauseType=PAUSED_UNTIL_DATE
        giftingDetails:
          type: object
          additionalProperties: false
          description: Structured gifting details replacing the simple gift flag.
          properties:
            isGift:
              type: boolean
            recipientName:
              type: string
            recipientPhone:
              type: string
            giftMessage:
              type: string
              maxLength: 280
              description: Message printed on gift card / packing slip
            hideSenderInfo:
              type: boolean
              default: false
              description: Anonymous gift — omit buyer details from all visible surfaces
            priceDisplayOnPackage:
              type: boolean
              default: false
              description: Whether to show prices on packing slip
            giftWrapOfferId:
              type: string
              description: Reference to the gift-wrap offer in consideration breakup
          x-ion-mandatory: optional
        paymentSchedule:
          type: array
          description: 'Multi-milestone payment schedule for partial-payment offers (down-payment + balance, milestone-based
            for services, etc.). Used when paymentTermsPolicy references a schedule-based IRI. Single-payment orders do not
            require this field. Contract moves to COMPLETE only when all milestones are PAID.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - milestone
            - amount
            - dueAt
            - status
            properties:
              milestone:
                type: string
                enum:
                - AT_CONFIRM
                - ON_DISPATCH
                - ON_DELIVERY
                - POST_DELIVERY
                - ON_MILESTONE_EVENT
                description: Event that triggers this payment
              milestoneLabel:
                type: string
                description: Human-readable milestone label (e.g. "30% down-payment")
              amount:
                type: number
                description: IDR amount due at this milestone
              currency:
                type: string
                const: IDR
                default: IDR
              dueAt:
                type: string
                format: date-time
                description: Absolute datetime when payment is due
              status:
                type: string
                enum:
                - PENDING
                - PAID
                - OVERDUE
                - WAIVED
                - FAILED
              paidAt:
                type: string
                format: date-time
              paymentMethod:
                type: string
                description: Method used for this specific milestone (may differ across milestones)
              gatewayRef:
                type: string
                description: Gateway transaction reference for this milestone
              graceDays:
                type: integer
                minimum: 0
                description: Grace period before status becomes OVERDUE
          x-ion-mandatory: conditional
          x-ion-condition: Required when paymentTermsPolicy is schedule-based
    ION_TradeOfferAttributes:
      type: object
      title: Trade Offer Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeOfferAttributes
      x-beckn-attaches-to: Offer.offerAttributes
      properties:
        cancellationPolicy:
          type: string
          enum:
          - ion://policy/cancel.prepacked.free
          - ion://policy/cancel.standard.until-dispatched
          - ion://policy/cancel.mto.nofee-before-prepare
          - ion://policy/cancel.standard.none
          - ion://policy/cancel.flash-sale.none-after-confirm
          - ion://policy/cancel.b2b.until-dispatched-15pct
          - ion://policy/cancel.subscription.prorated-midcycle
          - ion://policy/cancel.preorder.5d-before-release
          - ion://policy/cancel.digital.before-pending-operator
          - ion://policy/cancel.partial.refund-packed-threshold
          description: 'ION standard cancellation policy IRI. cancel.prepacked.free: buyer may cancel before packed at no
            fee. cancel.mto.nofee.before_prepare: MTO, free cancellation before preparation starts. cancel.none: no cancellation
            permitted after confirm.

            '
          example: ion://policy/cancel.prepacked.free
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 Pasal 19
        cancellationAllowedReasons:
          type: array
          items:
            type: string
            enum:
            - CHANGE_OF_MIND
            - WRONG_ITEM_ORDERED
            - ORDERED_WRONG_VARIANT
            - FOUND_BETTER_PRICE
            - DELIVERY_TOO_LONG
            - INCORRECT_ADDRESS
            - DUPLICATE_ORDER
            - PAYMENT_METHOD_CHANGE
            - ITEM_NO_LONGER_NEEDED
            - SELLER_UNRESPONSIVE
            - BUYER_FRAUD_SUSPECTED
            - QUALITY_ISSUE_AT_PREVIEW
          description: 'Seller-declared reasons for which buyer cancellation is accepted. Only meaningful when cancellationPolicy
            is not cancel.none.

            '
          example:
          - CHANGE_OF_MIND
          - WRONG_ITEM_ORDERED
          x-ion-mandatory: conditional
          x-ion-condition: Required when cancellationPolicy is not cancel.none
        returnable:
          type: boolean
          description: 'Whether the product can be returned after delivery. False for perishables, personalised items, digital
            goods, and hygiene products unless defective.

            '
          example: true
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 tentang Perlindungan Konsumen
        returnPolicy:
          type: string
          enum:
          - ion://policy/return.standard.7d-sellerpays
          - ion://policy/return.standard.14d-sellerpays
          - ion://policy/return.standard.30d-sellerpays
          - ion://policy/return.standard.7d-buyerpays
          - ion://policy/return.fashion.7d-fit-only-sellerpays
          - ion://policy/return.electronics.14d-unopened-or-defective-sellerpays
          - ion://policy/return.highvalue.14d-inspection-sellerpays
          - ion://policy/return.beauty.hygiene-nonreturnable
          - ion://policy/return.pharmacy.nonreturnable
          - ion://policy/return.grocery.sameday-defect-only
          - ion://policy/return.agritech.perishable-defect-only
          - ion://policy/return.jewelry.3d-tamper-seal-sellerpays
          - ion://policy/return.books.14d-sealed-only
          - ion://policy/return.custom.nonreturnable-defect-only
          - ion://policy/return.standard.none
          description: 'ION standard return policy IRI. Encodes window duration and who pays return shipping.

            '
          example: ion://policy/return.standard.7d-sellerpays
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 Pasal 25; Permendag 19/M-DAG/PER/5/2009
        sellerPickupReturn:
          type: boolean
          description: 'Whether the seller arranges pickup for returns (true) or consumer must arrange their own return shipping
            (false).

            '
          example: true
          x-ion-mandatory: conditional
          x-ion-condition: Required when returnable is true
        warrantyPolicy:
          type: string
          enum:
          - ion://policy/warranty.manufacturer.1y-distance-service
          - ion://policy/warranty.manufacturer.2y-distance-service
          - ion://policy/warranty.manufacturer.3y-distance-service
          - ion://policy/warranty.seller.1y
          - ion://policy/warranty.seller.1y.replacement_only
          - ion://policy/warranty.refurbished.30d-limited
          - ion://policy/warranty.extended.paid-addon
          - ion://policy/warranty.standard.none
          description: ION standard warranty policy IRI.
          example: ion://policy/warranty.manufacturer.1y-distance-service
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 Pasal 25; PP 36/2023
        disputePolicy:
          type: string
          enum:
          - ion://policy/dispute.consumer.bpsk
          - ion://policy/dispute.commercial.bani
          - ion://policy/dispute.commercial.odr
          - ion://policy/dispute.international.standard.uncitral
          - ion://policy/dispute.b2g.lkpp
          description: 'ION standard dispute resolution policy IRI. dispute.consumer.bpsk: B2C — BPSK (Badan Penyelesaian
            Sengketa Konsumen). dispute.commercial.bani: B2B — BANI arbitration. dispute.commercial.odr: Online Dispute Resolution
            via ION platform.

            '
          example: ion://policy/dispute.consumer.bpsk
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 Pasal 45; UU 30/1999 tentang Arbitrase
        timeToShip:
          type: string
          description: 'Time from order confirm to when seller hands package to logistics. ISO 8601 duration.

            '
          example: PT2H
          x-ion-mandatory: always
        availableOnCod:
          type: boolean
          description: 'Whether Cash on Delivery is available for this product. Some categories cannot be sold on COD (prescription
            medicine, alcohol, tobacco, items above IDR 5,000,000).

            '
          example: true
          x-ion-mandatory: always
        selfPickupOtp:
          type: boolean
          description: 'Whether OTP verification is required when consumer picks up order. If true, BPP generates deliveryOtp
            in performanceAttributes.

            '
          example: false
          x-ion-mandatory: optional
        selfPickupInstructions:
          type: string
          description: Instructions for self-pickup — counter number, floor, collection point.
          example: Ambil di counter F&B lantai 1, tunjukkan kode pesanan Anda.
          x-ion-mandatory: optional
        proofOfDeliveryType:
          type: string
          enum:
          - OTP
          - SIGNATURE
          - PHOTO
          - NONE
          description: Type of delivery confirmation proof required.
          example: OTP
          x-ion-mandatory: optional
        contactDetailsConsumerCare:
          type: string
          description: 'Consumer care contact in comma-separated format: name, email, phone. Displayed to consumer for post-purchase
            support queries.

            '
          example: Customer Service,cs@toko.com,08001234567
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 tentang Perlindungan Konsumen Pasal 7
        displayLanguage:
          type: array
          items:
            type: string
            enum:
            - id
            - en
            - ms
            - zh
            - ar
            - ta
            - ko
            - ja
          description: 'Languages in which this offer''s catalog content is available. "id" always present. "en" required
            for XB commerce pattern.

            '
          example:
          - id
          - en
          x-ion-mandatory: always
          x-ion-regulatory: ION Network Policy — language completeness validation
        minimumOrderQuantity:
          type: object
          additionalProperties: false
          properties:
            count:
              type: integer
              minimum: 1
            measure:
              type: object
              additionalProperties: false
              properties:
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                value:
                  type: number
          description: 'Minimum quantity for B2B wholesale. count for unit-based, measure for weight/volume-based products.

            '
          example:
            count: 10
          x-ion-mandatory: conditional
          x-ion-condition: Required for B2B wholesale commerce pattern
        weightSlabs:
          type: array
          description: Weight-based pricing tiers for catalogued logistics offers.
          items:
            type: object
            additionalProperties: false
            required:
            - minKg
            - maxKg
            - priceIDR
            properties:
              minKg:
                type: number
                minimum: 0
              maxKg:
                type: number
              priceIDR:
                type: integer
          example:
          - minKg: 0
            maxKg: 5
            priceIDR: 15000
          - minKg: 5
            maxKg: 10
            priceIDR: 25000
          x-ion-mandatory: conditional
          x-ion-condition: Required for catalogued domestic logistics patterns
        offerType:
          type: string
          enum:
          - LIST_PRICE
          - DISCOUNT
          - BUNDLE
          - BUY_X_GET_Y
          - CASHBACK
          - FREE_DELIVERY
          - VOUCHER
          description: Type of commercial offer.
          example: DISCOUNT
          x-ion-mandatory: optional
        priceModel:
          type: string
          enum:
          - FIXED
          - DYNAMIC
          - TIERED
          description: How pricing is determined for this offer.
          example: FIXED
          x-ion-mandatory: optional
        minBasketAmount:
          type: number
          description: Minimum basket value in IDR for offer to be valid.
          example: 50000
          x-ion-mandatory: optional
        maxDiscountAmount:
          type: number
          description: Maximum discount cap in IDR for percentage offers.
          example: 20000
          x-ion-mandatory: optional
        voucherCode:
          type: string
          description: Voucher or promo code to activate offer.
          example: HEMAT50
          x-ion-mandatory: optional
        stackable:
          type: boolean
          description: Whether this offer can be combined with other active offers.
          default: false
          x-ion-mandatory: optional
        usageLimitPerUser:
          type: integer
          minimum: 1
          description: Maximum times this offer can be used by a single user.
          example: 1
          x-ion-mandatory: optional
        customerSegment:
          type: string
          enum:
          - ALL
          - NEW_USER
          - LOYALTY
          - MEMBERSHIP
          - VERIFIED_SELLER
          description: Segment of customers eligible for this offer.
          example: ALL
          x-ion-mandatory: optional
        paymentMethodEligibility:
          type: array
          description: 'Structured payment method eligibility. Each entry declares minAmount/maxAmount constraints, required
            buyer tier, excluded categories. BAP checks buyer context + order amount against every entry; applies only those
            that pass all constraints. Empty array means all methods eligible.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - method
            properties:
              method:
                type: string
                enum:
                - QRIS
                - VIRTUAL_ACCOUNT
                - EWALLET
                - COD
                - BANK_TRANSFER
                - BI_FAST
                - RTGS
                - SKN
                - BNPL
                - CREDIT_CARD
                - DEBIT_CARD
                - DIRECT_DEBIT
                - CREDIT_FACILITY
                - ESCROW
              minAmount:
                type: number
                description: Minimum order value in IDR for this method to be eligible
              maxAmount:
                type: number
                description: Maximum order value in IDR (BI cap for QRIS is 10M)
              requiresBuyerTier:
                type: array
                items:
                  type: string
                  enum:
                  - NEW
                  - STANDARD
                  - VERIFIED
                  - PREMIUM
                  - VIP
                description: Buyer tier(s) eligible for this method
              requiresAddressVerification:
                type: boolean
                description: Whether buyer must have a verified delivery address
                default: false
              requiresPhoneVerification:
                type: boolean
                default: false
              excludedCategories:
                type: array
                items:
                  type: string
                description: Category codes excluded from this method
              requiredBnplProvider:
                type: array
                items:
                  type: string
                description: Specific BNPL providers allowed (when method=BNPL)
              eligibilityNote:
                type: string
                description: Optional human-readable explanation
          x-ion-mandatory: optional
        subsidyBreakup:
          type: object
          additionalProperties: false
          description: Who funds the discount/promotion.
          properties:
            sellerSubsidy:
              type: number
              minimum: 0
            platformSubsidy:
              type: number
              minimum: 0
            brandSubsidy:
              type: number
              minimum: 0
          x-ion-mandatory: optional
        startAt:
          type: string
          format: date-time
          description: When this promotional offer becomes active.
          x-ion-mandatory: optional
        endAt:
          type: string
          format: date-time
          description: When this promotional offer expires.
          x-ion-mandatory: optional
        priceValidFrom:
          type: string
          format: date-time
          description: 'Start of price validity window. Distinct from startAt (offer availability window) — price may change
            mid-campaign while offer remains active. Catalog TTL for offers with active priceChangeSchedule SHOULD be <=30
            seconds to avoid stale-price surfacing on browsing surfaces.

            '
          x-ion-mandatory: optional
        priceValidUntil:
          type: string
          format: date-time
          description: End of price validity window.
          x-ion-mandatory: optional
        priceChangeSchedule:
          type: array
          description: 'Full price change timeline for a campaign. BAPs MUST render countdown UI and compute correct price
            at transaction time. Each entry defines a price valid for a window; entries MUST NOT overlap. Sorted ascending
            by validFrom.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - validFrom
            - validUntil
            - priceValue
            properties:
              validFrom:
                type: string
                format: date-time
              validUntil:
                type: string
                format: date-time
              priceValue:
                type: number
                description: IDR amount valid in this window
              phaseLabel:
                type: string
                description: Human label e.g. "Jam pertama harga hemat"
                example: First hour at flash price
          x-ion-mandatory: optional
        reservationWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: 'Seconds for which the BPP will hold availability and the on_select price quote. Default 300. BPP soft-reserves
            at on_select, hard-reserves at on_init. After window expires, availability is released and any subsequent /confirm
            for this messageId returns ION-3006.

            '
          example: 300
          x-ion-mandatory: optional
          x-ion-default: 300
        totalStockCap:
          type: integer
          minimum: 1
          description: 'Absolute total quantity available under this offer. When reached, all subsequent /select calls return
            ION-3008. Distinct from resource.availability.maxOrderQty (per-order cap).

            '
          example: 100
          x-ion-mandatory: optional
        perUserQuantityCap:
          type: integer
          minimum: 1
          description: 'Maximum units a single buyer can purchase under this offer across all transactions (enforced by BPP).
            Distinct from usageLimitPerUser which is number of separate redemptions.

            '
          example: 2
          x-ion-mandatory: optional
        isFlashSale:
          type: boolean
          description: 'Signals this offer is a flash sale. BAP surfaces urgency UI; reservationWindowSeconds SHOULD be short
            (60-180s).

            '
          default: false
          x-ion-mandatory: optional
        queueEnabled:
          type: boolean
          description: 'Whether BPP uses a queue/throttle mechanism when demand exceeds supply. When true, on_select may return
            queuePosition.

            '
          default: false
          x-ion-mandatory: optional
        queuePosition:
          type: integer
          minimum: 0
          description: 'Consumer''s current position in the purchase queue. 0 = at front. Returned in on_select when queueEnabled=true.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Returned in on_select when queueEnabled=true
        estimatedWaitSeconds:
          type: integer
          minimum: 0
          description: Estimated wait time before this consumer reaches front of queue.
          x-ion-mandatory: conditional
          x-ion-condition: Returned in on_select when queuePosition is present
        stackingGroup:
          type: string
          enum:
          - PLATFORM
          - SELLER
          - PAYMENT
          - BRAND
          - SHIPPING
          - CASHBACK
          description: 'Voucher stacking group. Vouchers from different groups stack by default. Within a single group only
            one voucher can apply per order unless stackingRules override. Replaces the ambiguous stackable flag.

            '
          x-ion-mandatory: optional
        stackingRules:
          type: object
          additionalProperties: false
          description: 'Explicit voucher stacking rules. Used when offer has complex combination logic beyond the default
            group rules.

            '
          properties:
            mustCombineWith:
              type: array
              items:
                type: string
              description: Offer IDs that must also be applied for this offer to activate.
            cannotCombineWith:
              type: array
              items:
                type: string
              description: Offer IDs with which this offer cannot be combined.
            maxDiscountWhenStacked:
              type: number
              description: Cap on total discount when multiple offers stack (IDR).
          x-ion-mandatory: optional
        codEligibilityForBuyer:
          type: boolean
          description: 'BPP-evaluated COD eligibility for the specific buyer in this transaction. Returned in on_select. Distinct
            from availableOnCod which is offer-level availability. Allows BPP to decline COD for new buyers, previous COD
            failures, high-value items exceeding buyer''s verified tier, etc.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Returned in on_select when availableOnCod=true
        codEligibilityReason:
          type: string
          enum:
          - ELIGIBLE
          - NEW_BUYER
          - PREVIOUS_COD_FAILURE
          - ADDRESS_NOT_VERIFIED
          - AMOUNT_EXCEEDS_LIMIT
          - PINCODE_NOT_SERVICED_FOR_COD
          - HIGH_RISK_CATEGORY
          - OTP_VERIFICATION_REQUIRED
          description: Reason for the codEligibilityForBuyer decision.
          x-ion-mandatory: conditional
          x-ion-condition: Required when codEligibilityForBuyer is declared
        returnEvidenceRequirement:
          type: string
          enum:
          - NONE
          - PHOTO_OPTIONAL
          - PHOTO_REQUIRED
          - VIDEO_UNBOXING_REQUIRED
          - VIDEO_UNBOXING_AND_PHOTO
          - PHYSICAL_INSPECTION
          description: 'Evidence required from buyer when initiating a return. VIDEO_UNBOXING_REQUIRED is standard for high-value
            electronics. PHYSICAL_INSPECTION is used for high-value items (>IDR 10M) where seller sends inspector before accepting
            return.

            '
          example: PHOTO_REQUIRED
          x-ion-mandatory: conditional
          x-ion-condition: Required when returnable=true
        returnEvidenceMinPhotos:
          type: integer
          minimum: 1
          maximum: 10
          description: Minimum number of evidence photos required.
          x-ion-mandatory: conditional
          x-ion-condition: Required when returnEvidenceRequirement includes PHOTO
        handlingTimeHours:
          type: integer
          minimum: 0
          description: 'Hours from order confirm to package ready for logistics. Replaces QSR-only averagePreparationTime
            for non-food sellers. Used for custom-print, made-to-measure, pre-order merchandise.

            '
          example: 72
          x-ion-mandatory: optional
        grievanceSlaPolicy:
          type: string
          enum:
          - ion://policy/grievance-sla.consumer.standard
          - ion://policy/grievance.sla.premium_mall
          - ion://policy/grievance-sla.consumer.flash-critical
          - ion://policy/grievance.sla.b2b_businesshours
          description: 'ION Grievance SLA policy IRI. Declares response time, resolution time, escalation path, and penalty
            consequences when SLA is breached. Subject to marketplace minimum (grievance.sla.standard) for B2C; marketplace-operated
            BAPs may enforce stricter policies on their sellers. ION timer auto-escalates when SLAs are breached — no manual
            action needed.

            '
          example: ion://policy/grievance-sla.consumer.standard
          x-ion-mandatory: always
          x-ion-regulatory: UU 8/1999 Pasal 45; Permendag 50/2020 Pasal 6
        paymentTermsPolicy:
          type: string
          enum:
          - ion://policy/payment-terms.upfront.full
          - ion://policy/payment.deposit.30pct.balance_on_delivery
          - ion://policy/payment-terms.cod.full
          - ion://policy/payment-terms.credit.net-7
          - ion://policy/payment-terms.credit.net-30
          - ion://policy/payment-terms.credit.net-60
          - ion://policy/payment.installment.3mo
          - ion://policy/payment-terms.subscription.monthly_autopay
          description: 'Payment terms policy IRI. Declares when payment is collected, which methods are accepted, whether
            deposit or credit terms apply, and what the late-payment penalty is if applicable. Must be compatible with the
            order''s paymentRail and collectedBy.

            '
          example: ion://policy/payment-terms.upfront.full
          x-ion-mandatory: always
          x-ion-regulatory: UU 7/2021 HPP; OJK POJK terkait metode pembayaran
        penaltyPolicy:
          type: string
          description: 'Penalty policy IRI. Normally inferred from seller''s onboarding tier (Standard/Mall/Premium) and other
            declared policies (return, cancellation, grievance-sla). May be declared explicitly for per-offer overrides. Sellers
            cannot select a penalty policy weaker than their tier minimum.

            '
          example: ion://policy/penalty.seller-sla-breach.standard
          x-ion-mandatory: conditional
          x-ion-condition: Auto-derived from tier + other policies; declare only for explicit override
        customTermsAddendum:
          type: string
          maxLength: 1000
          description: 'Free-text addendum for edge cases (e.g. watchmaker offering lifetime service). Supplements the declared
            policy IRIs but cannot contradict them. If addendum contradicts base policy, base policy wins and addendum is
            informational only. BAP displays addendum below the structured policy terms.

            '
          example: Garansi seumur hidup untuk mekanisme jam tangan mewah (terms & conditions apply - see seller page).
          x-ion-mandatory: optional
      allOf:
      - if:
          properties:
            returnable:
              const: true
          required:
          - returnable
        then:
          required:
          - returnPolicy
          - sellerPickupReturn
    ION_TradePerformanceAttributes:
      type: object
      title: Trade Performance Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradePerformanceAttributes
      x-beckn-attaches-to: Performance.performanceAttributes
      properties:
        performanceMode:
          type: string
          enum:
          - DELIVERY
          - SELF_PICKUP
          - DINE_IN
          - CURBSIDE
          description: 'How the fulfilment is executed. DELIVERY: logistics delivers to buyer address. SELF_PICKUP: buyer
            collects from seller location. DINE_IN: for restaurant orders consumed on premises. CURBSIDE: buyer drives to
            pickup point, seller brings to car.

            '
          example: DELIVERY
          x-ion-mandatory: always
        supportedPerformanceModes:
          type: array
          items:
            type: string
            enum:
            - DELIVERY
            - SELF_PICKUP
            - DINE_IN
            - CURBSIDE
          description: 'All performance modes supported by this provider for this offer. Declared in on_select. Buyer selects
            mode at init.

            '
          example:
          - DELIVERY
          - SELF_PICKUP
          x-ion-mandatory: always
        sla:
          type: object
          additionalProperties: false
          description: Service Level Agreement for fulfilment timing.
          required:
          - unitBasis
          properties:
            min:
              type: string
              description: Minimum fulfilment time ISO 8601 duration
              example: PT30M
            max:
              type: string
              description: Maximum fulfilment time ISO 8601 duration
              example: PT90M
            unitBasis:
              type: string
              enum:
              - ORDER_CONFIRMATION
              - SHIPMENT
              - PAYMENT_RECEIPT
              description: Event from which SLA countdown starts.
              example: ORDER_CONFIRMATION
          x-ion-mandatory: always
        handling:
          type: array
          items:
            type: string
            enum:
            - COLD_CHAIN
            - PERISHABLE
            - HIGH_VALUE
            - OVERSIZED
            - FRAGILE
            - HAZARDOUS
            - AGE_RESTRICTED
          description: 'Special handling requirements for this fulfilment. Determines logistics eligibility and surcharges.

            '
          example:
          - COLD_CHAIN
          - PERISHABLE
          x-ion-mandatory: optional
        readyToShip:
          type: boolean
          description: 'Seller signals that the package is physically ready for logistics pickup. Sent by BPP via /update.
            Triggers LSP to dispatch agent.

            '
          example: true
          x-ion-mandatory: conditional
          x-ion-condition: Required in /update when seller is ready for pickup
        awbNumber:
          type: string
          description: 'Air Waybill number assigned by the logistics provider after pickup. Enables tracking on LSP platform.

            '
          example: JNE1234567890
          x-ion-mandatory: conditional
          x-ion-condition: Added after order is picked up by logistics provider
        trackingUrl:
          type: string
          format: uri
          description: 'URL for real-time shipment tracking. Provided by logistics provider after pickup. BAP renders as tracking
            link or embedded tracker.

            '
          example: https://jne.co.id/track?awb=JNE1234567890
          x-ion-mandatory: conditional
          x-ion-condition: Present after DISPATCHED state
        estimatedDeliveryTime:
          type: string
          format: date-time
          description: 'Updated estimated delivery datetime in ISO 8601 with timezone. BPP updates dynamically as fulfilment
            progresses.

            '
          example: 2026-04-19 14:30:00+07:00
          x-ion-mandatory: conditional
          x-ion-condition: Present from DISPATCHED state onwards
        agentName:
          type: string
          description: Name of delivery agent or driver assigned to this fulfilment.
          example: Budi Santoso
          x-ion-mandatory: conditional
          x-ion-condition: Present when agent is assigned
        agentPhone:
          type: string
          pattern: ^[0-9]{10,13}$
          description: Indonesian mobile number, 10-13 digits.
          example: 08123456789
          x-ion-mandatory: conditional
          x-ion-condition: Present when agent is assigned
        agentPhoto:
          type: string
          format: uri
          description: 'URL to photo of delivery agent. Displayed by BAP for consumer security verification. URL must remain
            valid for 24 hours.

            '
          example: https://sellerapp.ion.id/agents/budi-santoso.jpg
          x-ion-mandatory: conditional
          x-ion-condition: Present when agent is assigned
        deliveryOtp:
          type: string
          pattern: ^[0-9]{4,6}$
          description: 'One-time password required for agent to confirm delivery. Consumer shows OTP to agent at doorstep.

            '
          example: '482930'
          x-ion-mandatory: conditional
          x-ion-condition: Present when offer.selfPickupOtp=true or high-value item
        deliveryProofUrl:
          type: string
          format: uri
          description: 'URL to photo proof of delivery — package at door or consumer signature. Added at DELIVERED state.

            '
          example: https://sellerapp.ion.id/proofs/delivery-ORD-001.jpg
          x-ion-mandatory: conditional
          x-ion-condition: Present after DELIVERED state
        selfPickupCode:
          type: string
          description: 'Unique code generated by BPP for self-pickup orders. Consumer presents this code at counter to collect
            order.

            '
          example: SP-4729
          x-ion-mandatory: conditional
          x-ion-condition: Present for SELF_PICKUP performance mode
        returnAgentName:
          type: string
          description: Name of pickup agent for return collection.
          example: Andi Wijaya
          x-ion-mandatory: conditional
          x-ion-condition: Present on return Performance records when agent assigned
        returnTrackingUrl:
          type: string
          format: uri
          description: Tracking URL for return shipment.
          example: https://jne.co.id/track?awb=JNE9876543210
          x-ion-mandatory: conditional
          x-ion-condition: Present on return Performance after RETURN_PICKED state
        installationScheduling:
          type: object
          additionalProperties: false
          description: 'Installation appointment scheduling. Declared capability is in resource.installation. This carries
            the transaction-time appointment.

            '
          properties:
            available:
              type: boolean
              description: Whether seller can schedule installation for this order.
            scheduledDate:
              type: string
              format: date-time
              description: Confirmed installation appointment datetime with timezone.
              example: 2026-04-05 10:00:00+07:00
            notes:
              type: string
              description: Instructions for consumer regarding installation.
              example: Teknisi akan menelepon 30 menit sebelum tiba.
          x-ion-mandatory: conditional
          x-ion-condition: Present for products with installation.required=true
        realTimeGps:
          type: object
          additionalProperties: false
          description: 'Current GPS position of delivery agent. Updated via /track API. Not persisted — real-time only.

            '
          properties:
            latitude:
              type: number
              minimum: -90
              maximum: 90
            longitude:
              type: number
              minimum: -180
              maximum: 180
            accuracy:
              type: number
              description: Position accuracy in metres
            timestamp:
              type: string
              format: date-time
          required:
          - latitude
          - longitude
          - timestamp
          x-ion-mandatory: conditional
          x-ion-condition: Present only in /on_track responses
        lspSubscriberId:
          type: string
          description: 'Subscriber ID of the on-network logistics provider handling this fulfilment. Enables ION to trace
            the cascaded logistics contract.

            '
          example: lsp.jne.ion.id
          x-ion-mandatory: conditional
          x-ion-condition: Present when fulfilment is handled by on-network LSP
        shippingInsurance:
          type: object
          additionalProperties: false
          description: 'Insurance declaration for high-value shipments. Mandatory for items above IDR 5,000,000 on all major
            marketplaces. Affects RTO refund calculations — claim filed against insurance policy when applicable.

            '
          required:
          - mandatory
          - provider
          - coverageAmount
          properties:
            mandatory:
              type: boolean
              description: Whether insurance is legally or operationally required.
            provider:
              type: string
              description: Insurance provider name
              example: PT Asuransi Sinar Mas
            policyNumber:
              type: string
              description: Policy reference assigned by insurance provider
              example: AS-POL-2026-00123456
            coverageAmount:
              type: number
              description: Maximum coverage in IDR
              example: 15000000
            premium:
              type: number
              description: Insurance premium in IDR — appears in consideration breakup
              example: 15000
            paidBy:
              type: string
              enum:
              - BUYER
              - SELLER
              - PLATFORM
              description: Who bears the insurance premium cost
            claimProcedureUrl:
              type: string
              format: uri
              description: URL to claim filing procedure for this policy
          x-ion-mandatory: conditional
          x-ion-condition: Required when offer.price > IDR 5,000,000 or category-mandated
          x-ion-regulatory: OJK POJK 69/POJK.05/2016 tentang Perilaku Usaha Pialang Asuransi
        agentId:
          type: string
          description: 'Platform-issued agent ID that consumer can verify against BPP app or logistics app. More trustworthy
            than name alone — prevents impersonation scams.

            '
          example: SPX-RIDER-28471
          x-ion-mandatory: conditional
          x-ion-condition: Present when agent is assigned
        agentVehicleType:
          type: string
          enum:
          - MOTORCYCLE
          - CAR
          - VAN
          - TRUCK
          - BICYCLE
          - WALK
          - PUBLIC_TRANSPORT
          description: Agent vehicle type — affects delivery ETA and corporate policy
          x-ion-mandatory: optional
        agentPlateNumber:
          type: string
          description: Indonesian vehicle plate (Nomor Polisi). Required by some corporate buyers for building access.
          example: B 1234 XYZ
          x-ion-mandatory: optional
        agentBadgeNumber:
          type: string
          description: 'Physical badge number the agent carries. Consumers verify at door. Distinct from agentId which is
            internal.

            '
          example: SPX-28471
          x-ion-mandatory: optional
        liveAgentLocationUrl:
          type: string
          format: uri
          description: 'URL for live agent location tracking (distinct from trackingUrl which is package-centric). Agent-centric
            view consumers use during OUT_FOR_DELIVERY for last-mile visibility.

            '
          x-ion-mandatory: optional
        qcResult:
          type: string
          enum:
          - QC_PASSED
          - QC_FAILED_TAMPERED
          - QC_FAILED_MISSING_PARTS
          - QC_FAILED_DIFFERENT_ITEM
          - QC_FAILED_USED_DAMAGED
          - QC_PARTIAL
          - QC_PENDING
          description: 'Quality inspection result when return package is received by seller. Determines refund amount — full
            for QC_PASSED, partial for QC_PARTIAL, zero for QC_FAILED_* variants (dispute-prone).

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required on Performance record for return-delivered state
        qcNotes:
          type: string
          description: Seller-provided explanation of QC findings
          x-ion-mandatory: conditional
          x-ion-condition: Required when qcResult is not QC_PASSED
        qcEvidence:
          type: array
          items:
            type: string
            format: uri
          description: Photo/video URLs from seller's QC inspection. Used in dispute resolution.
          x-ion-mandatory: conditional
          x-ion-condition: Required when qcResult is QC_FAILED_* or QC_PARTIAL
        marketplaceManagedLogistics:
          type: boolean
          description: 'True when logistics is orchestrated by the BAP (marketplace) rather than the BPP (seller). Seller
            BPP handles ready-to-ship only; marketplace BAP triggers its own logistics contract. Used by Shopee Xpress, Tokopedia
            TokoCabang, Amazon MFN.

            '
          default: false
          x-ion-mandatory: optional
        slaBreachCount:
          type: integer
          minimum: 0
          description: 'Number of SLA TATs breached by BPP on this fulfilment. Incremented by BAP each time an expected on_status
            does not arrive within SLA. Persists across updates for reconciliation penalty calculation.

            '
          default: 0
          x-ion-mandatory: optional
        slaBreachDetails:
          type: array
          description: Record of each SLA breach for audit trail.
          items:
            type: object
            additionalProperties: false
            required:
            - expectedBy
            - breachedAt
            - tatType
            properties:
              tatType:
                type: string
                enum:
                - ORDER_ACCEPTANCE
                - PACKED
                - DISPATCHED
                - DELIVERY
                - PICKUP_RETURN
                - RETURN_DELIVERED
                - REFUND_INITIATED
              expectedBy:
                type: string
                format: date-time
              breachedAt:
                type: string
                format: date-time
              breachDurationSeconds:
                type: integer
          x-ion-mandatory: optional
        ageVerificationRequired:
          type: boolean
          description: 'Whether delivery agent must verify buyer age at door before handover. Derived from resource.ageRestricted;
            BPP copies to performance record. If true, delivery fails (state goes to DELIVERY_FAILED) if verification is not
            successfully completed.

            '
          default: false
          x-ion-mandatory: conditional
          x-ion-condition: Required when any item in order has resource.ageRestricted=true
        ageVerificationMethod:
          type: string
          enum:
          - KTP_SIGHTED
          - KTP_SCANNED
          - SIM_SIGHTED
          - PASSPORT_SIGHTED
          - SELFIE_COMPARISON
          - BIOMETRIC_API
          - NONE
          description: 'Method used to verify buyer age at delivery. KTP_SIGHTED: agent visually confirms KTP DOB. KTP_SCANNED:
            agent scans KTP via agent app; OCR reads DOB. SELFIE_COMPARISON: agent compares consumer face to buyer profile
            photo. BIOMETRIC_API: agent uses liveness + age estimation API.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when ageVerificationRequired=true
          x-ion-regulatory: UU 39/2007 tentang Cukai (tobacco); PP 109/2012; PerBPOM 28/2021 (alcohol)
        ageVerifiedAt:
          type: string
          format: date-time
          description: Timestamp of successful verification at door
          x-ion-mandatory: conditional
          x-ion-condition: Required on DELIVERED state when ageVerificationRequired=true
        ageVerifiedByAgentId:
          type: string
          description: Agent ID of the person who performed verification
          x-ion-mandatory: conditional
          x-ion-condition: Required on DELIVERED state when ageVerificationRequired=true
        ageVerificationEvidence:
          type: string
          format: uri
          description: 'URL to evidence of verification (photo of KTP with DOB visible, scan result). Retained per platform
            policy. Must be encrypted at rest and subject to data residency rules if applicable.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when ageVerificationMethod is KTP_SCANNED or BIOMETRIC_API
        ageVerificationFailedReason:
          type: string
          enum:
          - BUYER_UNDERAGE
          - BUYER_UNAVAILABLE_VERIFIER_NEEDED
          - BUYER_REFUSED_TO_SHOW_ID
          - ID_DOCUMENT_NOT_PRESENTED
          - ID_DOCUMENT_INVALID
          - BIOMETRIC_API_FAILED
          description: 'Reason age verification failed at delivery. Performance state should transition to DELIVERY_FAILED
            with this reason tag, and RTO flow initiates. Buyer may be blocked from future purchases of this category (per
            platform policy).

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when delivery fails due to age verification
    ION_TradeProviderAttributes:
      type: object
      title: Trade Provider Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeProviderAttributes
      x-beckn-attaches-to: Provider.providerAttributes
      properties:
        invoicingModel:
          type: string
          enum:
          - CENTRAL
          - PER_FULFILMENT_CENTRE
          description: 'Whether the brand invoices centrally (one NPWP for all fulfilment centres) or each fulfilment centre
            invoices separately. CENTRAL: single legal entity invoices for all outlets. PER_FULFILMENT_CENTRE: each FC has
            own NPWP and invoices independently.

            '
          example: CENTRAL
          x-ion-mandatory: always
          x-ion-regulatory: UU 6/1983 tentang Ketentuan Umum Perpajakan — NPWP obligation per taxable entity
        invoicingEntity:
          type: string
          description: 'Legal entity name of the invoicing entity when invoicingModel is CENTRAL. This is the brand''s registered
            legal entity — not the store name.

            '
          example: PT Paragon Technology and Innovation
          x-ion-mandatory: conditional
          x-ion-condition: Required when invoicingModel is CENTRAL
          x-ion-regulatory: PMK 168/PMK.010/2023 tentang Faktur Pajak
        storeStatus:
          type: string
          enum:
          - OPEN
          - TEMPORARILY_CLOSED
          - DISABLED
          description: 'Operational status of this provider location. OPEN: accepting orders normally. TEMPORARILY_CLOSED:
            closed for a defined period (temporaryClosureEnd required). DISABLED: permanently closed or suspended.

            '
          example: OPEN
          x-ion-mandatory: always
        operatingHours:
          type: array
          description: 'Weekly operating schedule as a typed array. Each entry covers one timing type for a day range. Types:
            ORDER (when orders accepted), DELIVERY (delivery window), SELF_PICKUP (pickup window), PREPARATION (kitchen active
            hours).

            '
          items:
            type: object
            additionalProperties: false
            required:
            - type
            - dayFrom
            - dayTo
            - timeFrom
            - timeTo
            properties:
              type:
                type: string
                enum:
                - ORDER
                - DELIVERY
                - SELF_PICKUP
                - PREPARATION
              dayFrom:
                type: integer
                minimum: 1
                maximum: 7
                description: Day of week, 1=Monday, 7=Sunday
              dayTo:
                type: integer
                minimum: 1
                maximum: 7
                description: Day of week, 1=Monday, 7=Sunday. Must be >= dayFrom.
              timeFrom:
                type: string
                pattern: ^[0-9]{4}$
                description: 24-hour format HHMM e.g. 1000
              timeTo:
                type: string
                pattern: ^[0-9]{4}$
                description: 24-hour format HHMM e.g. 2200. 0000 means midnight.
          example:
          - type: ORDER
            dayFrom: 1
            dayTo: 7
            timeFrom: '1000'
            timeTo: '2200'
          x-ion-mandatory: always
        holidayCalendar:
          type: array
          items:
            type: string
            format: date
          description: 'Future-dated holiday dates on which this location will not accept or fulfil orders. ISO 8601 date
            format. Empty array if no planned closures.

            '
          example:
          - 2026-08-17
          - 2026-12-25
          - 2027-01-01
          x-ion-mandatory: always
        temporaryClosureEnd:
          type: string
          format: date-time
          description: 'ISO 8601 datetime when temporary closure ends. Required when storeStatus is TEMPORARILY_CLOSED. Timezone
            must be included.

            '
          example: 2026-04-19 23:59:00+07:00
          x-ion-mandatory: conditional
          x-ion-condition: Required when storeStatus is TEMPORARILY_CLOSED
        serviceabilityByCategory:
          type: array
          description: 'Per-category serviceability polygon overrides. When a provider serves different delivery zones for
            different categories (e.g. a larger radius for grocery vs a smaller one for hot food).

            '
          items:
            type: object
            additionalProperties: false
            required:
            - categoryId
            - geo
            properties:
              categoryId:
                type: string
                description: ION category code e.g. food-qsr, grocery
                example: food-qsr
              geo:
                type: object
                description: GeoJSON Polygon defining delivery zone
                x-format: GeoJSONGeometry (RFC 7946)
          x-ion-mandatory: optional
        averagePreparationTime:
          type: string
          description: 'Average time from order confirm to item ready for logistics pickup at this location. ISO 8601 duration.
            Used by BAP to compute estimated delivery time. Provider-level default; per-item preparationTime in resource/v1
            overrides this.

            '
          example: PT25M
          x-ion-mandatory: conditional
          x-ion-condition: Required for food-qsr and quick-commerce providers
        providerCategory:
          type: string
          enum:
          - RESTAURANT
          - CLOUD_KITCHEN
          - GROCERY
          - PHARMACY
          - FASHION
          - ELECTRONICS
          - BEAUTY
          - FMCG
          - AGRITECH
          - B2B_DISTRIBUTOR
          - QUICK_COMMERCE
          - HOME_AND_KITCHEN
          - PET_SUPPLIES
          - BOOKS_STATIONERY
          - TOYS_GAMES
          - SPORTS_OUTDOORS
          - AUTOMOTIVE_PARTS
          description: 'Category of this provider location. Used by BAP for display, filtering, and UI rendering decisions.

            '
          example: RESTAURANT
          x-ion-mandatory: always
        nibRegistered:
          type: boolean
          description: 'Whether this provider has a valid active NIB registered with OSS (Online Single Submission). ION Central
            validates NIB at onboarding. Must be true for all active providers.

            '
          example: true
          x-ion-mandatory: always
          x-ion-regulatory: PP 5/2021 tentang Penyelenggaraan Perizinan Berusaha Berbasis Risiko
        trustedSellerBadge:
          type: boolean
          description: 'Whether this provider has earned ION Trusted Seller status. Awarded by ION Central based on transaction
            volume, rating, and compliance record. Cannot be self-declared.

            '
          example: false
          x-ion-mandatory: optional
        handlingTimeMinutes:
          type: integer
          minimum: 0
          description: 'Time in minutes from order confirm to package ready for logistics. More precise than averagePreparationTime.
            Used for SLA computation.

            '
          example: 30
          x-ion-mandatory: optional
        preferredLogisticsProvider:
          type: string
          description: 'Preferred on-network logistics provider subscriber ID for this seller''s shipments. When marketplaceManagedLogistics=true,
            this should be the marketplace''s logistics arm (e.g. lsp.spx.ion.id).

            '
          example: lsp.spx.ion.id
          x-ion-mandatory: optional
        marketplaceManagedLogistics:
          type: boolean
          description: 'Whether this provider''s fulfilments use marketplace-managed logistics (Shopee Xpress, Tokopedia TokoCabang,
            Amazon MFN) rather than seller-selected LSP. Affects who orchestrates the on-network logistics transaction.

            '
          default: false
          x-ion-mandatory: optional
        liveCommerceEnabled:
          type: boolean
          description: 'Whether this provider supports live commerce (Shopee Live, Tokopedia Play, TikTok Shop-style sessions).
            Providers with this enabled may use the B2C-LIVE spine.

            '
          default: false
          x-ion-mandatory: optional
        liveCommerceStreamers:
          type: array
          items:
            type: string
          description: 'Subscriber IDs of authorised streamers who can feature this provider''s products in live sessions.
            Commission and settlement is pre-agreed off-network.

            '
          x-ion-mandatory: optional
        ottPartnerEnabled:
          type: boolean
          description: 'Whether this provider allows its catalog to be surfaced through OTT-embedded shoppable content (Vidio,
            Netflix, Disney+ Hotstar in-video shopping). Requires separate off-network agreement with OTT partner.

            '
          default: false
          x-ion-mandatory: optional
        kycStatus:
          type: string
          enum:
          - PENDING
          - APPROVED
          - APPROVED_WITH_CAVEATS
          - REJECTED
          - SUSPENDED
          - EXPIRED
          description: 'Current KYC status of this provider with the BPP platform. Only APPROVED and APPROVED_WITH_CAVEATS
            providers may publish catalogs. EXPIRED providers must renew before next catalog. SUSPENDED signals temporary
            enforcement action — spec processors must pause active transactions.

            '
          example: APPROVED
          x-ion-mandatory: always
        kycLevel:
          type: string
          enum:
          - BASIC
          - STANDARD
          - ENHANCED
          - ENTERPRISE
          description: 'KYC depth. Determines maximum transaction value, allowed payment methods, eligibility for Mall/Premium
            tiers. BASIC: NIB + NPWP only. Max per-order IDR 5M. STANDARD: BASIC + bank account verification + phone. Max
            per-order IDR 50M. ENHANCED: STANDARD + beneficial ownership + director ID verified. Max per-order IDR 500M. ENTERPRISE:
            ENHANCED + AML screen + compliance officer named. No cap.

            '
          example: STANDARD
          x-ion-mandatory: always
        kycValidUntil:
          type: string
          format: date
          description: 'Expiry date of current KYC certification. Providers MUST renew before this date. BPPs MUST block publish_catalog
            after expiry.

            '
          example: 2027-04-19
          x-ion-mandatory: always
        kycEvidenceRef:
          type: string
          description: 'Opaque reference to KYC evidence bundle (encrypted off-network). Used by ION Central when audit required.
            Not a URL — internal ref.

            '
          x-ion-mandatory: optional
        kycCaveats:
          type: array
          items:
            type: string
            enum:
            - PENDING_BENEFICIAL_OWNERSHIP
            - PENDING_AML_SCREEN
            - PENDING_CATEGORY_LICENSE
            - PENDING_FINAL_VERIFICATION
            - PROBATIONARY_PERIOD
          description: 'When kycStatus is APPROVED_WITH_CAVEATS, these describe the outstanding items. Each caveat has a deadline
            (tracked off-catalog); failure to clear results in SUSPENDED status.

            '
          x-ion-mandatory: conditional
          x-ion-condition: Required when kycStatus is APPROVED_WITH_CAVEATS
        categoryLicenses:
          type: array
          description: 'Category-specific operating licenses beyond NIB/NPWP. Examples: SIA for alcohol, SIKA for meat, Izin
            PBF for pharmacy, Izin Edar BPOM for cosmetics. Required for the corresponding providerCategory.

            '
          items:
            type: object
            additionalProperties: false
            required:
            - licenseType
            - licenseNumber
            - validUntil
            properties:
              licenseType:
                type: string
                enum:
                - SIA_ALCOHOL
                - SIKA_MEAT
                - PBF_PHARMACY
                - BPOM_COSMETICS
                - BPOM_FOOD
                - SIUP_HEAVY
                - OTHER
              licenseNumber:
                type: string
              validUntil:
                type: string
                format: date
              issuingAuthority:
                type: string
                example: BPOM
              evidenceUrl:
                type: string
                format: uri
          x-ion-mandatory: conditional
          x-ion-condition: Required for regulated categories (pharmacy, alcohol, tobacco, meat)
          x-ion-regulatory: PP 5/2021; PerBPOM various
      allOf:
      - if:
          properties:
            storeStatus:
              const: TEMPORARILY_CLOSED
          required:
          - storeStatus
        then:
          required:
          - temporaryClosureEnd
      - if:
          properties:
            invoicingModel:
              const: CENTRAL
          required:
          - invoicingModel
        then:
          required:
          - invoicingEntity
      - if:
          properties:
            kycStatus:
              const: APPROVED_WITH_CAVEATS
          required:
          - kycStatus
        then:
          required:
          - kycCaveats
      - if:
          properties:
            providerCategory:
              enum:
              - PHARMACY
          required:
          - providerCategory
        then:
          required:
          - categoryLicenses
    ION_TradeResourceAttributes:
      type: object
      title: Trade Resource Attributes
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeResourceAttributes
      x-beckn-attaches-to: Resource.resourceAttributes
      properties:
        resourceStructure:
          type: string
          enum:
          - PLAIN
          - VARIANT
          - WITH_EXTRAS
          - COMPOSED
          - BUNDLE
          description: 'PLAIN: single SKU, no choices. VARIANT: one of several pre-defined options of a parent. WITH_EXTRAS:
            base item with optional add-ons. COMPOSED: base with mandatory and optional customisation groups. BUNDLE: composite
            of multiple component resources (see bundleComposition).

            '
          example: COMPOSED
          x-ion-mandatory: always
        resourceTangibility:
          type: string
          enum:
          - PHYSICAL
          - DIGITAL_VOUCHER
          - DIGITAL_TOP_UP
          - DIGITAL_SUBSCRIPTION
          description: 'PHYSICAL: tangible goods requiring logistics fulfilment. DIGITAL_VOUCHER: voucher code, gift card,
            in-game currency (delivered electronically). DIGITAL_TOP_UP: mobile pulsa, data package, utility bill top-up.
            DIGITAL_SUBSCRIPTION: time-bound digital subscription access.

            '
          example: PHYSICAL
          x-ion-mandatory: always
        parentResourceId:
          type: string
          description: ID of parent resource. Present on VARIANT and WITH_EXTRAS.
          example: PIZZA-MARGHERITA
          x-ion-mandatory: conditional
          x-ion-condition: Required when resourceStructure IN [VARIANT, WITH_EXTRAS]
        isDefaultVariant:
          type: boolean
          description: Whether this is the default variant shown to consumer.
          example: true
          x-ion-mandatory: conditional
          x-ion-condition: Required when resourceStructure = VARIANT
        variantGroup:
          type: object
          additionalProperties: false
          required:
          - id
          - name
          - variantOn
          properties:
            id:
              type: string
              example: VG-SIZE
            name:
              $ref: '#/components/schemas/LocalisedText'
            variantOn:
              type: string
              description: The attribute that varies. e.g. size, colour, storage
              example: size
          x-ion-mandatory: conditional
          x-ion-condition: Required when resourceStructure = VARIANT
        variantMatrix:
          type: object
          additionalProperties: false
          description: 'Multi-axis variant declaration. Use instead of explicit VARIANT resources when combinations are derivable.
            BPP MUST resolve the specific variant at on_select and compute final price via priceDeltaByCombination or per-axis
            priceDelta. Only valid on parent resources with resourceStructure=PLAIN; child VARIANT resources are not needed
            when this is declared.

            '
          required:
          - axes
          - combinationRules
          properties:
            axes:
              type: array
              minItems: 1
              maxItems: 6
              items:
                type: object
                additionalProperties: false
                required:
                - id
                - values
                properties:
                  id:
                    type: string
                    description: Axis identifier (size, color, storage, model, etc.)
                  label:
                    $ref: '#/components/schemas/LocalisedText'
                  values:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                      - id
                      properties:
                        id:
                          type: string
                        label:
                          $ref: '#/components/schemas/LocalisedText'
                        priceDelta:
                          type: number
                          description: IDR delta for this axis value (signed)
                        available:
                          type: boolean
                          default: true
                          description: Whether this specific axis value is currently sellable
                        resourceIdOverride:
                          type: string
                          description: Optional mapping to an explicit VARIANT resource ID if this combination has its own
                            SKU
            combinationRules:
              type: object
              additionalProperties: false
              required:
              - generateAllCombinations
              properties:
                generateAllCombinations:
                  type: boolean
                  description: If true, all permutations are valid. If false, combinations must be listed explicitly.
                explicitCombinations:
                  type: array
                  description: Required when generateAllCombinations=false. Each entry names axis-value pairs and the resulting
                    final price.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                    - axisValues
                    - priceValue
                    properties:
                      axisValues:
                        type: object
                        description: Map of axisId to valueId
                        additionalProperties:
                          type: string
                      priceValue:
                        type: number
                        description: Absolute IDR price for this combination
                      available:
                        type: boolean
                        default: true
                priceCalculationMode:
                  type: string
                  enum:
                  - SUM_AXIS_DELTAS
                  - EXPLICIT_PRICE
                  description: 'SUM_AXIS_DELTAS — final price = base offer price + sum of axis priceDeltas. EXPLICIT_PRICE
                    — final price = priceValue from matching explicitCombinations entry.

                    '
                  default: SUM_AXIS_DELTAS
          x-ion-mandatory: optional
        customisationGroups:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
            - id
            - name
            - selectionType
            - options
            properties:
              id:
                type: string
                example: CG-SIZE
              name:
                $ref: '#/components/schemas/LocalisedText'
              selectionType:
                type: string
                enum:
                - SINGLE_REQUIRED
                - SINGLE_OPTIONAL
                - MULTIPLE_OPTIONAL
                - FIXED
              minSelections:
                type: integer
                minimum: 0
              maxSelections:
                type: integer
                minimum: 1
              sequence:
                type: integer
              inputType:
                type: string
                enum:
                - select
                - text
                - number
                - date
                - boolean
                default: select
              options:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                  - id
                  - label
                  properties:
                    id:
                      type: string
                    label:
                      $ref: '#/components/schemas/LocalisedText'
                    resourceId:
                      type: string
                    priceDelta:
                      type: object
                      additionalProperties: false
                      required:
                      - type
                      - value
                      properties:
                        type:
                          type: string
                          enum:
                          - FIXED
                          - PERCENT
                        value:
                          type: number
                    available:
                      type: boolean
                      default: true
          x-ion-mandatory: conditional
          x-ion-condition: Required when resourceStructure IN [COMPOSED, WITH_EXTRAS]
        menuCategory:
          type: object
          additionalProperties: false
          required:
          - id
          - name
          properties:
            id:
              type: string
            name:
              $ref: '#/components/schemas/LocalisedText'
            sequence:
              type: integer
            imageUrl:
              type: string
              format: uri
          x-ion-mandatory: conditional
          x-ion-condition: Required for F&B providers
        preparationTime:
          type: string
          description: ISO 8601 duration. Time from order confirm to item ready.
          example: PT20M
          x-ion-mandatory: conditional
          x-ion-condition: Required for F&B and made-to-order items
        productCode:
          type: object
          additionalProperties: false
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - GTIN
              - EAN
              - UPC
              - ISBN
              - ASIN
              - HSN
              - ION_SKU
            value:
              type: string
          example:
            type: GTIN
            value: '8999999123456'

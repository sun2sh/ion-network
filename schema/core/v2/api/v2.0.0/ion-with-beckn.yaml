          - ion://policy/return.fashion.7d-fit-only-sellerpays
          - ion://policy/return.electronics.14d-unopened-or-defective-sellerpays
          - ion://policy/return.highvalue.14d-inspection-sellerpays
          - ion://policy/return.beauty.hygiene-nonreturnable
          - ion://policy/return.pharmacy.nonreturnable

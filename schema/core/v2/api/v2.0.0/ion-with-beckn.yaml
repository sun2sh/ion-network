          - DEBIT
        scheme:
          type: string
          enum:
          - VISA
          - MASTERCARD
          - JCB
          - AMEX
          - UNIONPAY
        maskedPan:
          type: string
          description: Last 4 digits of card for display
          example: '****4242'
        bankIssuer:
          type: string
          description: Card-issuing bank name
        gatewayRef:
          type: string
          description: Payment gateway transaction reference
      required:
      - cardType
      - scheme
    CashOnDelivery:
      type: object
      title: Cash On Delivery
      description: 'Runtime COD collection state. Offer-level COD policy fields (OTP required, denominations accepted,
        buyer daily limit, hold period, reconciliation variance) are declared per-offer in schema/extensions/logistics/offer/v1
        — they govern how COD is accepted, not the per-transaction collection record.

        '
      additionalProperties: false
      properties:
        collectionAmount:
          type: number
          description: Expected cash amount to collect from consumer
        collectionAmountCollected:
          type: number
          description: Actual cash amount the carrier collected
          x-ion-conditional: true
          x-ion-condition: Required after handover — actual amount collected
        collectionTimestamp:
          type: string
          format: date-time
          description: UTC timestamp of cash handover at delivery
          x-ion-conditional: true
          x-ion-condition: Required after handover
        collectionReceiptRef:
          type: string
          description: Receipt reference for the collected cash (scan, photo URL, or receipt ID)
        currency:
          type: string
          const: IDR
        changeIssuedBy:
          type: string
          enum:
          - PROVIDER
          - COURIER
          description: Who provides change to consumer
        maxCodAmount:
          type: number
          description: Maximum COD value allowed per ION network policy
        partialCollectionReason:
          type: string
          enum:
          - CONSUMER_SHORT_ON_CASH
          - DENOMINATION_UNAVAILABLE
          - CONSUMER_NEGOTIATED
          - CONSUMER_DISPUTED_AMOUNT
          - OTHER
          x-ion-conditional: true
          x-ion-condition: Required when collectionAmountCollected < collectionAmount
    CreditTerms:
      type: object
      title: Credit Terms
      description: 'Credit-based payment terms (B2B-CR spine, FWA-governed logistics, any deferred-payment scenario).
        Populated on PaymentDeclaration when method=CREDIT_FACILITY or when an active FWA grants credit terms to
        this transaction. ION Central validates credit availability at /init.

        '
      additionalProperties: false
      properties:
        creditTermsDays:
          type: integer
          description: Net payment terms in days from invoice date (e.g. 30 for NET-30, 60 for NET-60)
          example: 30
        paymentDueDate:
          type: string
          format: date
          description: Computed due date for this specific invoice
        creditLimit:
          type: number
          description: Total credit limit extended to buyer under the governing FWA / contract
        creditAvailable:
          type: number
          description: Credit currently available after open invoices — for ION Central validation at /init
        dunningSchedule:
          type: array
          description: Reminder schedule leading up to and past due date
          items:
            type: object
            properties:
              daysRelativeToDueDate:
                type: integer
                description: Negative before due, positive after
              channel:
                type: string
                enum:
                - EMAIL
                - SMS
                - WHATSAPP
                - VOICE_CALL
                - IN_APP
    EWallet:
      type: object
      title: Indonesia E-Wallet
      additionalProperties: false
      properties:
        provider:
          type: string
          enum:
          - OVO
          - DANA
          - GOPAY
          - LINKAJA
          - SHOPEEPAY
          - ASTRAPAY
          - SAKUKU
          - JENIUS
          - ISAKU
          - FLIP
          - ALLOBANK
          - SEABANK_WALLET
          - BLU
          - LIVIN
          - FLIP
          - ISAKU
          description: E-wallet provider identifier
        accountRef:
          type: string
          description: Consumer's wallet account reference (phone or wallet ID)
        amount:
          type: number
        currency:
          type: string
          const: IDR
        expiresAt:
          type: string
          format: date-time
        deepLink:
          type: string
          format: uri
          description: Deep link to open wallet app for payment
      x-ion-regulatory: PBI 23/6/PBI/2021 tentang Penyedia Jasa Pembayaran
      required:
      - provider
    InvoiceReference:
      type: object
      title: Invoice Reference
      description: 'Invoice document references. A transaction may have a proforma (issued at /init for credit-term
        scenarios) and a final invoice (issued at /on_confirm or later). Faktur Pajak tax-invoice references live
        in core/tax/v1 — this block is for commercial invoices.

        '
      additionalProperties: false
      properties:
        invoiceReference:
          type: string
          description: Seller-issued commercial invoice number
        invoiceIssuedAt:
          type: string
          format: date-time
        proformaInvoiceReference:
          type: string
          description: Proforma invoice number (pre-shipment, for credit terms)
        invoiceUrl:
          type: string
          format: uri
          description: URL to PDF invoice (access-controlled, time-limited)
    PaymentDeclaration:
      type: object
      title: Payment Declaration
      description: 'Contents of a Beckn Settlement''s settlementAttributes bag for a buyer-facing payment event.
        Binds a payment method to a transaction and carries method-specific instrument details in methodDetail.

        '
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:PaymentDeclaration
      x-beckn-attaches-to: Settlement.settlementAttributes
      properties:
        method:
          type: string
          enum:
          - QRIS
          - VIRTUAL_ACCOUNT
          - EWALLET
          - COD
          - BANK_TRANSFER
          - BI_FAST
          - RTGS
          - SKN
          - BNPL
          - CREDIT_CARD
          - DEBIT_CARD
          - DIRECT_DEBIT
          - CREDIT_FACILITY
          - ESCROW
        collectedBy:
          type: string
          enum:
          - BAP
          - BPP
          - LSP
          description: Which network participant collects payment from consumer.
        timing:
          type: string
          enum:
          - ON_ORDER
          - PRE_FULFILLMENT
          - ON_FULFILLMENT
          - POST_FULFILLMENT
          description: When payment is collected relative to fulfilment.
        status:
          type: string
          enum:
          - PENDING
          - PAID
          - FAILED
          - REFUNDED
          - PARTIALLY_REFUNDED
        amount:
          type: number
          description: Payment amount in IDR
          x-ion-conditional: true
          x-ion-condition: Required when payment is confirmed
        currency:
          type: string
          const: IDR
          default: IDR
        paidAt:
          type: string
          format: date-time
          description: Timestamp of successful payment confirmation
          x-ion-conditional: true
          x-ion-condition: Required after payment is confirmed
        gatewayRef:
          type: string
          description: Payment gateway transaction reference ID
          x-ion-conditional: true
          x-ion-condition: Required when payment gateway is used
        methodDetail:
          oneOf:
          - $ref: '#/components/schemas/QRIS'
          - $ref: '#/components/schemas/VirtualAccount'
          - $ref: '#/components/schemas/EWallet'
          - $ref: '#/components/schemas/CashOnDelivery'
          - $ref: '#/components/schemas/BankTransfer'
          - $ref: '#/components/schemas/BISettlement'
          - $ref: '#/components/schemas/BNPL'
          - $ref: '#/components/schemas/CardPayment'
          x-ion-conditional: true
          x-ion-condition: Required when method requires instrument-specific fields
        paymentRail:
          type: string
          description: 'Specific rail used for this payment. Enables downstream routing and reconciliation regardless
            of higher-level method. Example: method=BANK_TRANSFER with paymentRail=BI_FAST.

            '
          enum:
          - QRIS
          - BI_FAST
          - RTGS
          - SKN
          - VIRTUAL_ACCOUNT
          - EWALLET_OVO
          - EWALLET_DANA
          - EWALLET_GOPAY
          - EWALLET_SHOPEEPAY
          - EWALLET_LINKAJA
          - EWALLET_ASTRAPAY
          - CARD_VISA
          - CARD_MASTERCARD
          - CARD_JCB
          - CARD_AMEX
          - CARD_UNIONPAY
          - BILYET_GIRO
          - DIRECT_DEBIT
          - SWIFT_TT
          - LETTER_OF_CREDIT
          - COD_CASH
          - COD_CARD_TAP
        paymentGatewayProvider:
          type: string
          description: 'Payment gateway aggregator used to route this payment. Declared per transaction. Implementations
            may use one or more of these aggregators or direct bank/ewallet APIs.

            '
          enum:
          - DOKU
          - XENDIT
          - MIDTRANS
          - FINPAY
          - FASPAY
          - ESPAY
          - IPAY88
          - FINNET
          - LINKQU
          - DIRECT
          - OTHER
        creditTerms:
          $ref: '#/components/schemas/CreditTerms'
          x-ion-condition: Required when method=CREDIT_FACILITY or credit terms apply (B2B, FWA)
        refund:
          $ref: '#/components/schemas/Refund'
          x-ion-condition: Required when status=REFUNDED or PARTIALLY_REFUNDED
        invoice:
          $ref: '#/components/schemas/InvoiceReference'
        processingFee:
          $ref: '#/components/schemas/ProcessingFee'
      required:
      - method
      - collectedBy
      - timing
      - status
      - currency
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            method:
              const: CREDIT_FACILITY
          required:
          - method
        then:
          required:
          - creditTerms
      - if:
          properties:
            status:
              const: REFUNDED
          required:
          - status
        then:
          required:
          - refund
      x-ion-closed-extensions: false
    ProcessingFee:
      type: object
      title: Payment Processing Fee
      description: 'Per-transaction processing fee charged by the payment gateway or collecting party. Carried on
        the PaymentDeclaration so both parties see the fee split.

        '
      additionalProperties: false
      properties:
        amount:
          type: number
          description: Processing fee amount in IDR
        currency:
          type: string
          const: IDR
        borneBy:
          type: string
          enum:
          - BUYER
          - SELLER
          - LSP
          - NETWORK
          - SPLIT
          description: Which party bears this fee
        splitDetail:
          type: array
          description: When borneBy=SPLIT, how the fee is split
          items:
            type: object
            properties:
              party:
                type: string
                enum:
                - BUYER
                - SELLER
                - LSP
                - NETWORK
              amount:
                type: number
    QRIS:
      type: object
      title: QRIS Payment
      description: Quick Response Code Indonesian Standard payment
      additionalProperties: false
      properties:
        qrisType:
          type: string
          enum:
          - STATIC
          - DYNAMIC
          description: 'STATIC: single fixed QR, same for all transactions. DYNAMIC: per-transaction QR with embedded
            amount.

            '
        merchantId:
          type: string
          description: QRIS merchant identifier from acquiring bank
          example: ID1023456789012345678
        nmid:
          type: string
          description: National Merchant ID assigned by Bank Indonesia
        terminalId:
          type: string
          description: Terminal/POS identifier for multi-terminal merchants
        qrisString:
          type: string
          description: Full QRIS string for QR code rendering
          x-ion-conditional: true
          x-ion-condition: Required for DYNAMIC QRIS returned at on_init
        expiresAt:
          type: string
          format: date-time
          description: Expiry for DYNAMIC QRIS. UTC (ISO 8601).
      x-ion-regulatory: PBI 21/18/PBI/2019 tentang Implementasi Standar Nasional Quick Response Code
      required:
      - qrisType
      - merchantId
    Refund:
      type: object
      title: Refund
      description: 'Refund record attached to a PaymentDeclaration when a settlement is fully or partially refunded.
        Default destination is the original payment instrument (MATI — refund to original); fallbacks are declared
        explicitly.

        '
      additionalProperties: false
      properties:
        refundAmount:
          type: number
          description: Refunded amount in IDR
        refundReason:
          type: string
          enum:
          - BUYER_CANCELLATION
          - SELLER_CANCELLATION
          - ITEM_RETURNED
          - ITEM_UNAVAILABLE
          - ITEM_DEFECTIVE
          - DELIVERY_FAILED
          - WRONG_ITEM_DELIVERED
          - PARTIAL_FULFILMENT
          - SLA_BREACH_REBATE
          - WEIGHT_DISPUTE_RESOLVED
          - CUSTOMS_REJECTED
          - OTHER
        refundTimeline:
          type: string
          format: duration
          description: Expected time-to-land (ISO 8601 duration, e.g. PT24H, P7D)
        refundMethod:
          type: string
          enum:
          - REFUND_TO_ORIGINAL
          - REFUND_TO_VA
          - REFUND_TO_BANK
          - REFUND_AS_CREDIT
          - REFUND_AS_VOUCHER
          description: 'REFUND_TO_ORIGINAL is the default (MATI — Merchant Automatically To Instrument). Fallbacks
            apply when original instrument is unavailable (e.g. expired card).

            '
        refundInitiatedAt:
          type: string
          format: date-time
        refundSettledAt:
          type: string
          format: date-time
      required:
      - refundAmount
      - refundMethod
    VirtualAccount:
      type: object
      title: Bank Virtual Account
      additionalProperties: false
      properties:
        bankCode:
          type: string
          enum:
          - BCA
          - BRI
          - MANDIRI
          - BNI
          - CIMB
          - PERMATA
          - BTN
          - DANAMON
          - MAYBANK
          - BSI
          description: Bank issuing the virtual account
        vaNumber:
          type: string
          description: Virtual account number to be paid to
        amount:
          type: number
          description: Amount encoded in VA (for fixed-amount VA)
        currency:
          type: string
          const: IDR
        expiresAt:
          type: string
          format: date-time
          description: VA expiry timestamp in UTC
      required:
      - bankCode
      - vaNumber
    IONProductCertifications:
      type: object
      title: Indonesia Product Certifications
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:ProductCertifications
      properties:
        halalStatus:
          type: string
          enum:
          - HALAL
          - HALAL_PENDING
          - NON_HALAL
          - NOT_APPLICABLE
          description: 'Halal certification status. MANDATORY for all food and beverage products. Strongly recommended
            for cosmetics and pharmaceuticals. HALAL: MUI-certified halal. halalCertNumber required. HALAL_PENDING:
            certification in process. halalCertNumber optional. NON_HALAL: explicitly non-halal (e.g. pork products).
            NOT_APPLICABLE: non-food product where halal is not relevant.

            '
          example: HALAL
          x-ion-regulatory: UU 33/2014 tentang Jaminan Produk Halal; PP 39/2021
        halalCertNumber:
          type: string
          description: 'MUI (Majelis Ulama Indonesia) halal certificate number. Format varies by certification period.

            '
          example: ID38010000151020
          x-ion-regulatory: UU 33/2014 tentang Jaminan Produk Halal
          x-ion-condition: Required when halalStatus is HALAL
        bpomRegNumber:
          type: string
          description: 'BPOM registration number for food, cosmetics, and pharmaceuticals. BPOM_MD: domestic product
            (e.g. MD-123456789012). BPOM_ML: imported product (e.g. ML-123456789012).

            '
          example: MD-263510000567
          x-ion-regulatory: PerBPOM 27/2017 tentang Pendaftaran Pangan Olahan
        sniCertNumber:
          type: string
          description: 'SNI (Standar Nasional Indonesia) compliance certificate number. Required for products with
            mandatory SNI (electronics, PPE, toys).

            '
          example: SNI-01-3553-2006
          x-ion-regulatory: PP 34/2018 tentang Sistem Standardisasi dan Penilaian Kesesuaian Nasional
        spPIRTNumber:
          type: string
          description: 'SP-P-IRT small-scale home food production license. For UMKM food sellers without full BPOM
            registration.

            '
          example: SPIRT.2064701011023
          x-ion-regulatory: PerBPOM 22/2018
        ageRestricted:
          type: boolean
          description: 'Whether this product requires age verification at point of purchase. True for tobacco, alcohol,
            adult content, and certain pharmaceuticals.

            '
          default: false
          x-ion-regulatory: PP 109/2012 tentang Pengamanan Bahan yang Mengandung Zat Adiktif
        minAge:
          type: integer
          minimum: 0
          maximum: 21
          description: 'Minimum purchaser age in years when ageRestricted is true. Indonesia: 18 for tobacco and
            alcohol, 21 for certain substances.

            '
          example: 18
          x-ion-conditional: true
          x-ion-condition: Required when ageRestricted is true
      allOf:
      - if:
          properties:
            halalStatus:
              enum:
              - HALAL
          required:
          - halalStatus
        then:
          required:
          - halalCertNumber
      - if:
          properties:
            ageRestricted:
              const: true
          required:
          - ageRestricted
        then:
          required:
          - minAge
      - if:
          properties:
            halalStatus:
              const: HALAL
          required:
          - halalStatus
        then:
          required:
          - halalCertNumber
      required:
      - halalStatus
      - ageRestricted
    IONTicket:
      type: object
      title: ION Issue Ticket
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:Ticket
      x-beckn-attaches-to: (off-Beckn — ION-only object, carried in /raise message body)
      properties:
        id:
          type: string
          description: Ticket ID assigned by ION ticketing system.
          example: TKT-2026-00001234
        externalRef:
          type: string
          description: Reference ID in external ticketing system (Freshdesk/Jira/Zendesk ticket number)
          example: FD-98765
        title:
          type: string
          description: Short subject line for this ticket.
          maxLength: 200
          example: BPP not responding to on_confirm for 48 hours
        description:
          type: string
          description: Full description of the issue.
          example: 'sellerapp.ion.id has not responded to our on_confirm callback for transaction 9fdb667c. We have
            retried 3 times within the TTL window.

            '
        type:
          type: string
          enum:
          - NP_DISPUTE
          - POLICY_VIOLATION
          - SETTLEMENT_DISPUTE
          - TECHNICAL_FAILURE
          - FRAUD
          - NETWORK_ISSUE
          - RECON_DISPUTE
          - SLA_BREACH
          - CATALOG_VIOLATION
          - COUNTERFEIT_FLAG
          - OTHER
          description: "NP_DISPUTE: BAP/BPP disagreement on transaction terms. POLICY_VIOLATION: participant violating\
            \ ION network policy. SETTLEMENT_DISPUTE: financial settlement disagreement (escalated from recon).\
            \ TECHNICAL_FAILURE: system or API failures affecting transactions. FRAUD: suspected fraudulent activity.\
            \ NETWORK_ISSUE: ION infrastructure or registry issue. RECON_DISPUTE: reconciliation status mismatch.\
            \ SLA_BREACH: participant failing to meet mandated SLAs. COUNTERFEIT_FLAG: authenticity challenge against\
            \ a product listing.\n  Raised by brand owner, consumer, or marketplace. Triggers\n  auto-delist pending\
            \ investigation; ION Central arbitrates.\n"
          example: TECHNICAL_FAILURE
        priority:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
          description: 'CRITICAL: network-wide impact or financial fraud. Escalated immediately. HIGH: significant
            impact on transactions. Response within 2 hours. MEDIUM: operational issue. Response within 24 hours.
            LOW: general query or minor issue. Response within 72 hours.

            '
          example: HIGH
        raisedBy:
          type: string
          description: Subscriber ID of the network participant raising the ticket.
          example: buyerapp.ion.id
        assignedTo:
          type: string
          description: 'Subscriber ID of counterparty NP, or "ION" if raised to network operator.

            '
          example: ION
          x-ion-conditional: true
          x-ion-condition: Required when ticket is assigned to counterparty or ION
        contractId:
          type: string
          description: Related trade contract ID, if issue is transaction-specific.
          example: ORD-2026-00012345
          x-ion-conditional: true
          x-ion-condition: Required for transaction-specific tickets
        reconId:
          type: string
          description: Related reconciliation session ID, if issue is settlement-related.
          example: RECON-2026-00001234
        status:
          type: string
          enum:
          - OPEN
          - ACKNOWLEDGED
          - IN_PROGRESS
          - PENDING_INFO
          - RESOLVED
          - CLOSED
          - ESCALATED
          description: 'OPEN: ticket created, not yet acknowledged. ACKNOWLEDGED: assigned party has received and
            acknowledged. IN_PROGRESS: actively being worked on. PENDING_INFO: waiting for additional information
            from raiser. RESOLVED: issue resolved, awaiting raiser confirmation. CLOSED: fully resolved and closed.
            ESCALATED: escalated to ION governance or external authority.

            '
          example: OPEN
        thread:
          type: array
          description: Complete conversation trail for this ticket.
          items:
            type: object
            additionalProperties: false
            properties:
              messageId:
                type: string
              from:
                type: string
                description: Subscriber ID or "ION"
              message:
                type: string
              attachments:
                type: array
                items:
                  type: string
                  format: uri
                description: Evidence URLs
              timestamp:
                type: string
                format: date-time
            required:
            - messageId
            - from
            - message
            - timestamp
        resolution:
          type: object
          additionalProperties: false
          properties:
            description:
              type: string
              description: How the issue was resolved
            actionTaken:
              type: string
              enum:
              - WARNING_ISSUED
              - PENALTY_APPLIED
              - SUSPENSION
              - REFUND_MANDATED
              - POLICY_CLARIFICATION
              - TECHNICAL_FIX_CONFIRMED
              - NO_ACTION
              - ESCALATED_TO_ODR
            penaltyAmount:
              type: number
              description: Penalty amount in IDR if actionTaken=PENALTY_APPLIED
            resolvedAt:
              type: string
              format: date-time
        sla:
          type: object
          additionalProperties: false
          properties:
            expectedResponseTime:
              type: string
              description: ISO 8601 duration for first response
              example: PT2H
            expectedResolutionTime:
              type: string
              description: ISO 8601 duration for full resolution
              example: P3D
            responseDeadline:
              type: string
              format: date-time
            resolutionDeadline:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
      required:
      - id
      - title
      - description
      - type
      - priority
      - raisedBy
      - status
      - createdAt
      - updatedAt
    IONRatingAttributes:

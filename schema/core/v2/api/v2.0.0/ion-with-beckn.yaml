          content:
            application/json:
              schema:
                $ref: beckn.yaml#/components/schemas/Ack
components:
  schemas:
    CancelAction:
      title: Cancel Action
      description: 'Beckn /beckn/cancel message payload. Sent by a BAP to a BPP to request

        cancellation of an active contract. Set context.try to true to first

        retrieve cancellation terms and fees before committing.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      properties:
        contract:
          allOf:
          - $ref: '#/components/schemas/Contract'
          - required:
            - id
      required:
      - contract
    CatalogPublishAction:
      description: Catalog publish request payload.
      required:
      - catalogs
      type: object
      properties:
        catalogs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Catalog'
    ConfirmAction:
      title: Confirm Action
      description: 'Beckn /beckn/confirm message payload. Sent by a BAP to a BPP to confirm

        a contract, finalising the transaction terms agreed during the

        select-init negotiation cycle.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    DiscoverAction:
      title: Discover Action (External)
      description: 'Beckn /beckn/discover message payload as published at schema.beckn.io.

        Requires all discover qualifiers to be nested inside an `intent`

        container object.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      properties:
        intent:
          $ref: '#/components/schemas/Intent'
        text_search:
          type: string
          description: Legacy flat free-text discover query
        textSearch:
          type: string
          description: Flat free-text discover query
      additionalProperties: false
      required:
      - intent
    InitAction:
      title: Init Action
      description: 'Beckn /beckn/init message payload. Sent by a BAP to a BPP to initialise

        a contract with consumer details (billing address, fulfillment preferences, etc.).

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnCancelAction:
      title: On Cancel Action
      description: 'Beckn /beckn/on_cancel message payload. Sent by a BPP to a BAP in

        response to a /beckn/cancel call, returning the contract with status

        set to CANCELLED and any applicable cancellation outcome.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnConfirmAction:
      title: OnConfirmAction
      description: 'Beckn /beckn/on_confirm message payload. Sent by a BPP to a BAP in

        response to a /beckn/confirm call, returning the confirmed contract

        with status set to CONFIRMED.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnDiscoverAction:
      description: The on_discover response payload containing matching catalogs.
      type: object
      required:
      - catalogs
      properties:
        catalogs:
          type: array
          description: 'Array of catalogs matching the discovery request.

            Array of catalogs matching the discovery request.'
          items:
            $ref: '#/components/schemas/Catalog'
      additionalProperties: false
    OnInitAction:
      title: On Init Action
      description: 'Beckn /beckn/on_init message payload. Sent by a BPP to a BAP in response

        to a /beckn/init call, with the updated contract including payment terms

        and billing confirmation.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnRateAction:
      title: On Rate Action
      description: 'Beckn /beckn/on_rate message payload. Sent by a BPP to a BAP in

        response to a /beckn/rate call, optionally returning rating forms

        to collect structured feedback from the consumer.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      additionalProperties: false
      properties:
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/RatingInput'
      required:
      - ratings
    OnSelectAction:
      title: On Select Action
      description: 'Beckn /beckn/on_select message payload. Sent by a BPP to a BAP in

        response to a /beckn/select call, with updated contract terms.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnStatusAction:
      title: On Status Action
      description: 'Beckn /beckn/on_status message payload. Sent by a BPP to a BAP in

        response to a /beckn/status call (or as an unsolicited status push),

        returning the current state of the contract.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    OnSupportAction:
      title: On Support Action
      description: 'Beckn /beckn/on_support message payload. Sent by a BPP to a BAP in

        response to a /beckn/support call, returning support contact details

        and available channels.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        support:
          $ref: '#/components/schemas/Support'
      required:
      - support
    OnTrackAction:
      title: On Track Action
      description: 'Beckn /beckn/on_track message payload. Sent by a BPP to a BAP in

        response to a /beckn/track call, returning a Tracking handle with

        the URL and/or WebSocket endpoint for real-time fulfillment tracking.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      additionalProperties: false
      properties:
        tracking:
          $ref: '#/components/schemas/Tracking'
      required:
      - tracking
    OnUpdateAction:
      title: On Update Action
      description: 'Beckn /beckn/on_update message payload. Sent by a BPP to a BAP in

        response to a /beckn/update call (or as an unsolicited update push),

        returning the updated contract state.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    RateAction:
      title: RateAction
      description: 'Beckn /beckn/rate message payload. Sent by a BAP to a BPP to submit

        one or more rating inputs for entities in a completed contract

        (order, fulfillment, item, provider, agent, support).

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      additionalProperties: false
      properties:
        ratingInputs:
          type: array
          items:
            $ref: '#/components/schemas/RatingInput'
      required:
      - ratingInputs
    SelectAction:
      title: Select Action
      description: 'Beckn /beckn/select message payload. Sent by a BAP to a BPP to select

        items and offers from a catalog, initiating the negotiation cycle.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    StatusAction:
      title: Status Action
      description: 'Beckn /beckn/status message payload. Sent by a BAP to a BPP to query

        the current state of a contract/order by its identifier.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      properties:
        contract:
          allOf:
          - $ref: '#/components/schemas/Contract'
          - required:
            - id
      required:
      - contract
    SupportAction:
      title: Support Action
      description: 'Beckn /beckn/support message payload. Sent by a BAP to a BPP to request

        support contact information or to open a support ticket for an existing

        order/contract.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      additionalProperties: false
      properties:
        support:
          $ref: '#/components/schemas/Support'
      required:
      - support
    TrackAction:
      type: object
      description: Details required to initiate real-time tracking (if relevant) for an ongoing transaction
      additionalProperties: false
      properties:
        tracking:
          $ref: '#/components/schemas/Tracking'
      required:
      - tracking
    UpdateAction:
      title: Update Action
      description: 'Beckn /beckn/update message payload. Sent by a BAP to a BPP to request

        changes to an active contract (e.g., update fulfillment address, add items,

        change quantities). The context.try flag must be true during negotiation.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      additionalProperties: false
      properties:
        contract:
          $ref: '#/components/schemas/Contract'
      required:
      - contract
    AddOn:
      description: Add-on to a catalog resource
      oneOf:
      - $ref: '#/components/schemas/Resource'
      - $ref: '#/components/schemas/Offer'
    Address:
      description: '**Postal address** aligned with schema.org `PostalAddress`. Use for human-readable addresses.
        Geometry lives in `Location.geo` as GeoJSON.'
      title: Address
      type: object
      properties:
        addressCountry:
          description: Country name or ISO-3166-1 alpha-2 code.
          type: string
          example: IN
        addressLocality:
          description: City/locality.
          type: string
          example: Bengaluru
        addressRegion:
          description: State/region/province.
          type: string
          example: Karnataka
        extendedAddress:
          description: Address extension (apt/suite/floor, C/O).
          type: string
          example: Apt 4B
        postalCode:
          description: Postal/ZIP code.
          type: string
          example: '560001'
        streetAddress:
          description: Street address (building name/number and street).
          type: string
          example: 123 Tech Street
      additionalProperties: false
    AsyncError:
      title: Asynchronous Error
      description: Error returned asynchronously during a callback. Wraps the base `Error` schema with JSON-LD type
        annotations to allow linked-data processing.
      allOf:
      - $ref: '#/components/schemas/Error'
      - type: object
        properties: {}
        additionalProperties: true
    Attributes:
      description: JSON-LD aware container for domain-specific attributes of an Item. MUST include @context (URI)
        and @type (compact or full IRI). Any additional properties are allowed and interpreted per the provided
        JSON-LD context.
      title: Attributes
      type: object
      properties:
        '@context':
          description: Use case specific JSON-LD context URI
          type: string
        '@type':
          description: JSON-LD type defined within the context
          type: string
      required:
      - '@context'
      - '@type'
      additionalProperties: true
    Catalog:
      description: Catalog schema for Beckn Protocol v2.0.0
      title: Catalog
      type: object
      properties:
        bppId:
          description: BPP (Beckn Protocol Provider) identifier that publishes this catalog
          type: string
          example: bpp.example.com
        bppUri:
          description: Beckn Protocol API base URL of the BPP
          type: string
          format: uri
        publishDirectives:
          deprecated: true
          description: Directives controlling publish behavior for master/regular catalog flow. Deprecated and planned
            for removal in a future release.
          type: object
          additionalProperties: false
          required:
          - catalogType
          properties:
            catalogType:
              type: string
              enum:
              - master
              - regular
              description: master = canonical source catalog; regular = seller/provider extension catalog
            updateMode:
              type: string
              enum:
              - FULL
              - MERGE
              default: FULL
              description: Used for regular updates. FULL replaces overlay; MERGE applies JSON Merge Patch semantics.
            resourceDirectives:
              description: Optional per-resource extension mapping for regular catalogs
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                - resourceId
                - extends
                properties:
                  resourceId:
                    type: string
                    description: Seller/provider resource identifier in this catalog
                  extends:
                    type: object
                    additionalProperties: false
                    required:
                    - masterResourceId
                    properties:
                      masterResourceId:
                        type: string
                        description: Canonical master resource identifier being extended
        descriptor:
          description: Human / Agent-readable description of this catalog
          allOf:
          - $ref: '#/components/schemas/Descriptor'
        id:
          description: Unique identifier for the catalog
          type: string
          example: catalog-electronics-001
        isActive:
          description: Whether the catalog is active
          type: boolean
          default: true
        offers:
          description: Array of offers optionally linked to resources
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        resources:
          description: Array of generalized Resource entities in this catalog (new model)
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        provider:
          $ref: '#/components/schemas/Provider'
        validity:
          description: The time period during which this catalog is valid
          $ref: '#/components/schemas/TimePeriod'
      required:
      - id
      - descriptor
      - provider
      anyOf:
      - required:
        - resources
      - required:
        - offers
      additionalProperties: false
    CatalogOnPublishAction:
      description: Catalog publish processing results from CDS to BPP.
      type: object
      required:
      - results
      properties:
        results:
          type: array
          description: Per-catalog processing results
          items:
            $ref: '#/components/schemas/CatalogProcessingResult'
    CatalogProcessingResult:
      description: Processing result for a single catalog submission.
      type: object
      required:
      - catalogId
      - status
      properties:
        catalogId:
          type: string
          description: Identifier of the submitted catalog
        status:
          description: 'Processing outcome. Using oneOf [string, object] to allow domain-specific

            status objects (e.g. beckn:CatalogAccepted) alongside standard string codes.'
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - PARTIAL
        errors:
          type: array
          description: Per-item or per-catalog errors (present when REJECTED or PARTIAL)
          items:
            $ref: '#/components/schemas/Error'
        stats:
          type: object
          description: Optional statistics about the processed catalog
          properties:
            itemCount:
              type: integer
              description: Number of items accepted
            providerCount:
              type: integer
              description: Number of providers in the catalog
            categoryCount:
              type: integer
              description: Number of distinct categories
    Consideration:
      type: object
      description: 'Generalized representation of value exchanged under a Contract.


        Consideration is domain-neutral and may represent:

        - Monetary value

        - Credits / tokens

        - Asset transfer

        - Service exchange

        - Compliance artifact'
      required:
      - id
      - status
      properties:
        id:
          description: Identifier of this consideration
          type: string
        status:
          description: The status of this consideration
          $ref: '#/components/schemas/Descriptor'
        considerationAttributes:
          description: 'Domain-specific attributes of this consideration. For monetary considerations,

            use the PriceSpecification schema to capture total value with breakup.

            For other consideration types, use a generic Attributes bag.


            ION packs attached to this slot: TradeConsiderationAttributes, LogisticsConsiderationAttributes.'
          $ref: '#/components/schemas/Attributes'
          x-ion-attached-packs:
          - TradeConsiderationAttributes
          - LogisticsConsiderationAttributes
    Context:
      description: 'Base context schema for all Beckn API calls. Contains addressing information

        (BAP/BPP identifiers and API URLs), protocol version, the action being called,

        transaction and message IDs, timestamp, TTL, and optional encryption key.

        This schema defines all possible properties but imposes NO required-field

        constraints. Endpoint-specific validation is defined inline in operation request schemas.'
      type: object
      title: Context
      properties:
        domain:
          description: Domain code that is relevant to this transaction context
          type: string
        location:
          description: The location where the transaction is intended to be fulfilled.
          type: object
          properties:
            city:
              description: The city code where this transaction is restricted to
              type: object
              properties:
                code:
                  type: string
            country:
              description: The country code this transaction is restricted to
              type: object
              properties:
                code:
                  type: string
        action:
          description: The Beckn protocol method being called by the sender and executed at the receiver.
          type: string
        version:
          type: string
          description: Version of transaction protocol being used by the sender.
          const: 2.0.0
        bapId:
          description: Subscriber ID of the BAP as registered on dedi.global
          type: string
        bapUri:
          description: 'The callback URL of the BAP.


            REQUIRED: This should necessarily contain the same domain name as verified in its namespace under dedi.global,
            and MUST have the same URL as registered in its subscriber registry on dedi.global'
          type: string
          format: uri
        bppId:
          description: Subscriber ID of the BPP as registered on dedi.global
          type: string
        bppUri:
          description: 'The request URL of the BPP.


            REQUIRED: This MUST contain the same domain name as verified in its namespace under dedi.global, and
            MUST have the same URL as registered in its subscriber registry on dedi.global'
          type: string
          format: uri
        transactionId:
          description: This is a unique value which persists across all API calls from `search` through `confirm`.
            This is done to indicate an active user session across multiple requests. The BPPs can use this value
            to push personalized recommendations, and dynamic offerings related to an ongoing transaction despite
            being unaware of the user active on the BAP.
          type: string
          format: uuid
        messageId:
          description: This is a unique value which persists during a request / callback cycle. Since beckn protocol
            APIs are asynchronous, BAPs need a common value to match an incoming callback from a BPP to an earlier
            call. This value can also be used to ignore duplicate messages coming from the BPP. It is recommended
            to generate a fresh message_id for every new interaction. When sending unsolicited callbacks, BPPs must
            generate a new message_id.
          type: string
          format: uuid
        networkId:
          description: 'Unique identifier of a network. This identifier ALWAYS represents a specific beckn registry
            in a specific namespace on dedi.global. Format : `{namespace_id}/{registry_id}@{dedi-host}`. The `@{dedi-host}`
            suffix is optional. If it is not present, the network is assumed to be registered on dedi.glounique
            Example: Assuming acmenet.org is the namespace, and registry_name = charge-net, so networkId should
            be `acmenet.org/charge-net`'
          type: string
        timestamp:
          description: Time of request generation in RFC3339 format
          type: string
          format: date-time
        key:
          description: The encryption public key of the sender
          type: string
        ttl:
          description: The duration in ISO8601 format after timestamp for which this message holds valid
          type: string
        schemaContext:
          description: Array of JSON-LD context urls representing the schemas relevant to the request in which this
            context object is transported.
          type: array
          items:
            type: string
            format: uri
        requestDigest:
          $ref: '#/components/schemas/RequestDigest'
    Contract:
      type: object
      description: "This is a JSON-LD compliant, linked-data schema that specifies a generic multi-party, digitally\
        \ signed Contract between a set of participants. based on the vocabulary defined in the @context. By default,\
        \ it is the most generic form of contract i.e beckn:Contract. However, based on the mapping being used in\
        \ @context, it could take values like retail:Order, mobility:Reservation, healthcare:Appointment, and so\
        \ on, which will be defined as sub-classes of beckn:Contract.\nAlternate description A digitally agreed\
        \ commitment between two or more participants\ngoverning the exchange of economic or non-economic value.\n\
        \nContract is the canonical contract object in the generalized\nBeckn v2.1 protocol. It replaces the commerce-specific\
        \ Order construct\nas the canonical transaction object at the API layer.\n\nA Contract binds:\n - Commitments\
        \ (what is agreed)\n - Consideration (value promised)\n - Performance (how execution occurs)\n - Settlements\
        \ (how consideration is discharged)\n\nThe model is domain-neutral and supports commerce, hiring,\nenergy\
        \ markets, carbon exchanges, data access, mobility,\nsubscriptions, and other use cases."
      title: Contract
      properties:
        id:
          description: A UUID string generated at the BPP endpoint at any stage before the confirmation of the order
            i.e before `/on_confirm` callback. This value is intended typically for indexing or filtering. While
            the chances of a UUID collision are rare, it is recommended to use a combination of `bppId`, `providerId`
            and `id` to allow for global uniqueness.
          type: string
          format: uuid
        descriptor:
          description: Describes the nature of the contract in human / agent readable terms
          $ref: '#/components/schemas/Descriptor'
        commitments:
          type: array
          description: Structured commitments governed by this contract.
          minItems: 1
          items:
            $ref: '#/components/schemas/Commitment'
        consideration:
          type: array
          description: Value agreed to be exchanged under this contract.
          items:
            $ref: '#/components/schemas/Consideration'
        participants:
          description: 'The participants involved in the contract. Contracts are not always between two individuals.


            Several entities may play a specific role in the creation, fulfillment, and post-fulfillment of

            the contract.'
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        performance:
          type: array
          description: "Execution units of the contract.\n\nPerformance is the generalized fulfillment abstraction.\n\
            Each Performance instance represents a structured execution\nplan or delivery mechanism, including:\n\
            \n - Physical delivery\n - Service provisioning\n - API access\n - Subscription activation\n - Carbon\
            \ credit transfer\n - Capacity allocation\n - Workforce onboarding\n\nTracking and Support interactions\
            \ may be linked to\nindividual Performance units."
          items:
            $ref: '#/components/schemas/Performance'
        settlements:
          type: array
          description: Records representing discharge of agreed consideration.
          items:
            $ref: '#/components/schemas/Settlement'
        status:
          description: The current state of the contract expressed as a Descriptor whose code MUST be one of the
            standard contract state values.
          allOf:
          - $ref: '#/components/schemas/Descriptor'
          - type: object
            properties:
              code:
                enum:
                - DRAFT
                - ACTIVE
                - CANCELLED
                - COMPLETE
        contractAttributes:
          description: 'Domain-specific extension attributes for this contract.


            ION packs attached to this slot: TradeContractAttributes, LogisticsContractAttributes.'
          allOf:
          - $ref: '#/components/schemas/Attributes'
          - {}
          - properties: {}
          x-ion-attached-packs:
          - TradeContractAttributes
          - LogisticsContractAttributes
      additionalProperties: false
      required:
      - commitments
    Commitment:
      type: object
      required:
      - status
      - resources
      - offer
      properties:
        id:
          type: string
        status:
          type: object
          properties:
            descriptor:
              allOf:
              - $ref: '#/components/schemas/Descriptor'
              - properties:
                  code:
                    enum:
                    - DRAFT
                    - ACTIVE
                    - CLOSED
        resources:
          type: array
          items:
            required:
            - id
            - quantity
            $ref: '#/components/schemas/Resource'
        offer:
          required:
          - id
          - resourceIds
          $ref: '#/components/schemas/Offer'
        commitmentAttributes:
          description: 'Domain-specific extension attributes for this commitment.


            ION packs attached to this slot: TradeCommitmentAttributes, LogisticsCommitmentAttributes.'
          allOf:
          - $ref: '#/components/schemas/Attributes'
          - properties: {}
          x-ion-attached-packs:
          - TradeCommitmentAttributes
          - LogisticsCommitmentAttributes
    CounterSignature:
      title: Beckn HTTP Counter-Signature
      description: 'A signed receipt transmitted in the synchronous `Ack` response body, proving that the

        receiver authenticated, received, and processed the inbound request.


        `CounterSignature` shares the same wire format as `Signature` but differs:

        - **Signer**: the response receiver (not the request sender)

        - **Location**: transmitted in the `Ack` response body (not in the `Authorization` header)

        - **`digest`**: covers the Ack response body (not the inbound request body)

        - **`(request-digest)`** and **`(message-id)`** MUST be included in the signing string


        Signing string format:

        ```

        (created): {unixTimestamp}

        (expires): {unixTimestamp}

        digest: BLAKE-512={base64DigestOfAckBody}

        (request-digest): BLAKE-512={base64DigestOfInboundRequestBody}

        (message-id): {messageId}

        ```'
      allOf:
      - $ref: '#/components/schemas/Signature'
    Descriptor:
      $schema: https://json-schema.org/draft/2020-12/schema
      description: Schema definition for Descriptor in the Beckn Protocol v2.0.1
      title: Descriptor
      type: object
      properties:
        code:
          description: A machine-readable code identifying the state or type of the entity being described. The
            valid values for this field are defined by the context in which the Descriptor is used (e.g. DRAFT,
            ACTIVE, CANCELLED, COMPLETE for a Contract status).
          type: string
        longDesc:
          description: Detailed description of the item
          type: string
          example: Powerful gaming laptop with NVIDIA RTX graphics, fast SSD storage, and high-refresh display
        shortDesc:
          description: Short description of the item
          type: string
          example: High-performance gaming laptop with RTX graphics
        name:
          description: Name of the entity being described
          type: string
          example: Premium Gaming Laptop Pro
        thumbnailImage:
          description: Name of the entity being described
          type: string
          format: uri
        docs:
          description: Links to downloadable business/supporting documents
          type: array
          items:
            $ref: '#/components/schemas/Document'
        mediaFile:
          description: Links to multimedia files and images
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
      additionalProperties: false
    Document:
      description: A document, that can be parsed, printed, download or displayed. This has intentionally been kept
        separate from MediaFile as they may contain additional attributes like signature, schema etc.
      title: Document
      x-tags:
      - common
      type: object
      properties:
        label:
          description: The display name of the media file
          type: string
        mimeType:
          description: MIME type if 'data' is provided (application/pdf, image/png, application/json).
          type: string
        standard:
          description: Describes the schema type in case the document follows a standard schema like a verifiableCredential
          type: string
        url:
          description: URL to the document
          type: string
          format: uri
        security:
          type: object
          properties:
            checksum:
              type: string
            checksumAlgorithm:
              type: string
              enum:
              - SHA256
              - SHA512
              - OTHER
            signature:
              type: string
            signatureAlgorithm:
              type: string
              description: e.g., Ed25519, ES256
            keyId:
              type: string
      required:
      - label
      - url
      - mimeType
      additionalProperties: false
    Error:
      title: Error
      description: 'Base error container returned in NACK responses and async error callbacks.

        Domain-specific error codes SHOULD follow the Beckn error code registry

        (see response definitions in this specification). Custom error objects may be expressed as

        `oneOf [string, object]` payloads via the `errorDetails` field.'
      type: object
      properties:
        errorCode:
          type: string
        errorMessage:
          type: string
    FormSubmission:
      title: FormSubmission
      x-tags:
      - common
      description: A user's submitted response to a Beckn form. Captures the filled-in field values keyed by form
        field names. Typically attached to a RatingInput to convey feedback form answers alongside a rating.
      type: object
      properties:
        id:
          description: Identifier of the form that was submitted. Typically the form's URL or the value of the form's
            url field.
          type: string
          format: uri
        submissionId:
          description: Unique identifier for this form submission instance.
          type: string
          format: uuid
        data:
          description: Key-value map of form field names to submitted values. Keys correspond to the field identifiers
            defined in the form; values are the user's responses as strings.
          type: object
          additionalProperties:
            type: string
        submittedAt:
          description: Timestamp at which the form was submitted, in RFC 3339 / ISO 8601 format.
          type: string

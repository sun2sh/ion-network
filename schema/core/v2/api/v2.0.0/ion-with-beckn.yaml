              - context
              - message
              properties:
                context:
                  allOf:
                  - $ref: '#/components/schemas/Context'
                  - type: object
                    properties:
                      action:
                        type: string
                        const: catalog/master_search
                message:
                  $ref: '#/components/schemas/MasterSearchAction'
      responses:
        '200':
          description: Master search results
          content:
            application/json:
              schema:
                type: object
                required:
                - context
                - message
                properties:
                  context:
                    allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          const: on_catalog_master_search
                  message:
                    type: object
                    required:
                    - catalogs
                    - pagination
                    properties:
                      catalogs:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /catalog/master/schemaTypes:
    get:
      summary: List distinct schema types
      operationId: listMasterSchemaTypes
      tags:

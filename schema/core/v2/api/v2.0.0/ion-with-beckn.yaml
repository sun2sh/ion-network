          - APARTMENT
          - BOARDING_HOUSE
          - WAREHOUSE
          - PO_BOX
          - PICKUP_POINT
          - OTHER
          description: 'Address classification. Affects delivery SLA and surcharges — offices have restricted delivery hours,
            apartments require lobby/concierge handling, warehouses accept larger shipments. BOARDING_HOUSE (kost) is common
            in Indonesian urban delivery.

            '
          example: HOME

                accountNumber:
                  type: string
                accountName:
                  type: string
              description: Required when method=BANK_TRANSFER
            loyaltyMultiplier:
              type: number
              description: Bonus multiplier when redeeming to loyalty points e.g. 1.1 = 10% bonus
        subscriptionTrialDays:
          type: integer
          minimum: 0
          description: First N days free. Billing starts on day N+1.
        subscriptionPauseType:
          type: string
          enum:
          - ACTIVE
          - PAUSED_UNTIL_DATE
          - PAUSED_INDEFINITE
          description: Current pause state for B2C-SUB orders
        subscriptionPauseUntil:
          type: string
          format: date-time
          description: Date to automatically resume. Required when pauseType=PAUSED_UNTIL_DATE
          x-ion-condition: Required when subscriptionPauseType=PAUSED_UNTIL_DATE
        giftingDetails:
          type: object
          additionalProperties: false
          description: Structured gifting details replacing the simple gift flag.
          properties:
            isGift:
              type: boolean
            recipientName:
              type: string
            recipientPhone:
              type: string
            giftMessage:
              type: string
              maxLength: 280
              description: Message printed on gift card / packing slip
            hideSenderInfo:
              type: boolean
              default: false
              description: Anonymous gift — omit buyer details from all visible surfaces
            priceDisplayOnPackage:
              type: boolean
              default: false
              description: Whether to show prices on packing slip
            giftWrapOfferId:
              type: string
              description: Reference to the gift-wrap offer in consideration breakup
        paymentSchedule:
          type: array
          description: 'Multi-milestone payment schedule for partial-payment offers (down-payment + balance, milestone-based
            for services, etc.). Used when paymentTermsPolicy references a schedule-based IRI. Single-payment orders
            do not require this field. Contract moves to COMPLETE only when all milestones are PAID.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              milestone:
                type: string
                enum:
                - AT_CONFIRM
                - ON_DISPATCH
                - ON_DELIVERY
                - POST_DELIVERY
                - ON_MILESTONE_EVENT
                description: Event that triggers this payment
              milestoneLabel:
                type: string
                description: Human-readable milestone label (e.g. "30% down-payment")
              amount:
                type: number
                description: IDR amount due at this milestone
              currency:
                type: string
                const: IDR
                default: IDR
              dueAt:
                type: string
                format: date-time
                description: Absolute datetime when payment is due
              status:
                type: string
                enum:
                - PENDING
                - PAID
                - OVERDUE
                - WAIVED
                - FAILED
              paidAt:
                type: string
                format: date-time
              paymentMethod:
                type: string
                description: Method used for this specific milestone (may differ across milestones)
              gatewayRef:
                type: string
                description: Gateway transaction reference for this milestone
              graceDays:
                type: integer
                minimum: 0
                description: Grace period before status becomes OVERDUE
            required:
            - milestone
            - amount
            - dueAt
            - status
          x-ion-conditional: true
          x-ion-condition: Required when paymentTermsPolicy is schedule-based
      allOf:
      - $ref: beckn.yaml#/components/schemas/Attributes
      - if:

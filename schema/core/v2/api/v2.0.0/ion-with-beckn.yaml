      properties:
        provinsiCode:
          type: string
          enum:
          - BPS-11
          - BPS-12
          - BPS-13
          - BPS-14
          - BPS-15
          - BPS-16
          - BPS-17
          - BPS-18
          - BPS-19
          - BPS-21
          - BPS-31
          - BPS-32
          - BPS-33
          - BPS-34
          - BPS-35
          - BPS-36
          - BPS-51
          - BPS-52
          - BPS-53
          - BPS-61
          - BPS-62
          - BPS-63
          - BPS-64
          - BPS-65
          - BPS-71
          - BPS-72
          - BPS-73
          - BPS-74
          - BPS-75
          - BPS-76
          - BPS-81
          - BPS-82
          - BPS-91
          - BPS-92
          - BPS-94
          description: 'Indonesian province code using BPS 2-digit numeric codes prefixed with BPS-. 34 provinces. Used for

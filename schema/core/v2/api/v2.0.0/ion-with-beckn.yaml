      description: 'ION EXTENSION. Not in Beckn 2.0 core. BAP initiates reconciliation of settlement amounts after
        contract COMPLETE. Covers final amount with all adjustments (weight disputes, SLA rebates, COD remittance,
        FWA rebates, tax).

        Supports context.try=true (ION-extended use of the Beckn try pattern) for preview without committing Settlement
        state transition.

        '

              description: Target identifier for delivery
              properties:
                type:
                  type: string
                  enum:
                  - MOBILE_NUMBER
                  - CUSTOMER_ID
                  - ACCOUNT_ID
                  - EMAIL
                  - METER_NUMBER
                  - GAME_USER_ID
                value:
                  type: string
                operatorValidationRequired:
                  type: boolean
                  description: Whether BPP must verify target exists before accepting (e.g. mobile number inquiry)
            redemptionCode:
              type: string
              description: 'Redemption code or voucher code. Returned in on_status[DELIVERED] for CODE_TO_BUYER delivery.
                Must be encrypted in transit.

                '
            redemptionUrl:
              type: string
              format: uri
              description: URL for redemption (streaming service activation, game code page)
            expiryAfterPurchase:
              type: string
              description: ISO 8601 duration — how long the voucher is valid from purchase
              example: P30D
            refundable:
              type: boolean
              default: false
              description: 'Whether the digital good is refundable. Most pulsa/top-up is non-refundable once delivered to
                target. Vouchers may be refundable if unredeemed.

                '
            cancellable:
              type: boolean
              default: false
              description: Whether cancellation is possible before delivery
          x-ion-mandatory: conditional
          x-ion-condition: Required when resourceTangibility IN [DIGITAL_VOUCHER, DIGITAL_TOP_UP, DIGITAL_SUBSCRIPTION]
        dataResidency:
          type: string
          enum:
          - DOMESTIC_ONLY
          - INTERNATIONAL_ALLOWED
          description: 'Data residency requirement for this resource. DOMESTIC_ONLY means all PII and transaction data must
            be processed and stored within Indonesia; BAPs with foreign data processing must skip or refuse transactions for
            this resource. Required for pharmacy, health data, financial services, and regulated biometric categories.

            '
          example: DOMESTIC_ONLY
          x-ion-mandatory: conditional
          x-ion-condition: Required for pharmacy, health-data, financial-services categories
          x-ion-regulatory: UU 27/2022 tentang Pelindungan Data Pribadi (PDP Law)
      allOf:
      - if:
          properties:
            resourceStructure:
              enum:
              - VARIANT
          required:
          - resourceStructure
        then:
          required:
          - parentResourceId
          - isDefaultVariant
          - variantGroup
      - if:
          properties:
            resourceStructure:
              enum:
              - COMPOSED
              - WITH_EXTRAS
          required:
          - resourceStructure
        then:
          required:
          - customisationGroups
      - if:
          properties:
            ageRestricted:
              const: true
          required:
          - ageRestricted
        then:
          required:
          - minAge
  responses:
    Ack:
      description: Synchronous receipt acknowledgement returned for every accepted Beckn request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Ack'
    AckNoCallback:
      description: Request received but no callback will follow (e.g. agents not found, inventory unavailable, provider closed,
        context.try preview complete).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckNoCallback'
    NackBadRequest:
      description: 'NACK — Bad Request: Malformed or invalid request; the server could not parse or validate the payload.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackBadRequest'
    NackUnauthorized:
      description: Invalid or missing authentication credentials; signature could not be verified.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NackUnauthorized'
    ServerError:
      description: Internal failure on the network participant's application; the request could not be processed. The response
        body MAY contain an `error` object with additional details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerError'

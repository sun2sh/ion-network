openapi: 3.1.1
info:
  title: ION Logistics Commitment Extension (v1)
  description: 'Logistics sector commitment attributes. Defines line-item level details within a logistics transaction
    — specific items, quantities, handling instructions, and line identifiers. Attaches to: beckn:Commitment.commitmentAttributes

    '
  version: 1.0.0
components:
  schemas:
    LogisticsCommitmentAttributes:
      type: object
      title: Logistics Commitment Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:LogisticsCommitmentAttributes
      x-beckn-attaches-to: Commitment.commitmentAttributes
      properties:
        lineId:
          type: string
          description: Unique identifier for this commitment line
        resourceId:
          type: string
          description: Reference to the resource (shipment, SKU, vehicle) in this line
        offerId:
          type: string
          description: Offer this commitment is placed against
        packageCount:
          type: integer
          description: Number of packages in this commitment line
        totalWeight:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
              enum:
              - gram
              - kilogram
              - tonne
        totalVolume:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
              enum:
              - cbm
              - liter
        specialInstructions:
          type: string
          description: 'Free-text handling instructions for this shipment line. Examples: "Do not stack", "This
            side up", "Refrigerate on arrival"

            '
        containerReference:
          type: string
          description: Container number for FCL freight commitments
        sealNumber:
          type: string
          description: Container seal number
        skuId:
          type: string
          description: SKU identifier for warehouse commitment lines
        quantity:
          type: integer
          description: Quantity committed for this SKU
        lotNumber:
          type: string
          description: Lot or batch number for traceability
        expiryDate:
          type: string
          format: date
          description: Expiry date for perishable or pharma inventory
        capacityUnits:
          type: number
          description: Committed capacity units (kg, cbm, containers, pallets)
        capacityUnitType:
          type: string
          enum:
          - kg
          - cbm
          - container
          - pallet
          - truck
        requestedDepartureDate:
          type: string
          format: date
          description: For freight — requested departure date for this commitment line
        vehicleRegistration:
          type: string
          description: Vehicle registration for LOG-RORO commitment lines
        parentCommitmentId:
          type: string
          description: Parent commitment reference for child transactions under a parent contract
      x-ion-closed-extensions: false
      allOf:
      - $ref: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/main/schema/core/v2/api/v2.0.0/beckn.yaml#/components/schemas/Attributes

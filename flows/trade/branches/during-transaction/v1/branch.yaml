# ION Trade Branch — During Transaction v1
# NOT OAS. ION flow specification document.
# All branches active between select and on_confirm.
# Multiple can be active simultaneously on the same transaction.

id: ion-trade-branch-during-transaction-v1
version: "1.0.0"
branchType: during-transaction
sectorCode: A
status: ready
description: >
  Ten sub-branches that activate between select and on_confirm.
  They shape the transaction before it is committed — determining
  fulfilment mode, payment method, multi-FC routing, and handling
  technical failures at the confirmation boundary.

attachmentWindow:
  earliest: select
  latest: on_confirm

subBranches:

  fulfillment-type:
    id: fulfillment-type
    window:
      earliest: select
      latest: on_confirm
    description: >
      Consumer chooses between DELIVERY and SELF_PICKUP at select time.
      BPP declares supportedPerformanceModes[] in on_select. BAP presents
      available modes to consumer. Mode is locked in fulfillment.type at init.
    steps:
      - step: select
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.performance[].performanceAttributes.performanceMode
      - step: on_select
        from: BPP
        to: BAP
        requiredFields:
          - message.contract.performance[].performanceAttributes.supportedPerformanceModes[]  # BPP returns all supported modes. If only one mode is supported, BAP does not show a choice to consumer — it is implicit.
      - step: init
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.performance[].performanceAttributes.performanceMode
    businessRules:
      - If SELF_PICKUP: performance[].performanceAttributes.stops is consumer pickup location, not delivery address
      - If SELF_PICKUP: no delivery address or provinsiCode required at init
      - selfPickupCode is generated by BPP at on_confirm, returned to BAP
      - DINE_IN and CURBSIDE require provider to declare them in providerAttributes

  payment-prepaid-BAP-collected:
    id: payment-prepaid-BAP-collected
    window:
      earliest: init
      latest: on_confirm
    description: >
      BAP collects payment from consumer before confirm. Most common for
      QRIS, EWallet, and Virtual Account. Consumer pays in BAP's UI.
      BPP receives settled funds from BAP after delivery.
    steps:
      - step: init
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.collectedBy
          - message.contract.settlements[].settlementAttributes.method
          - message.contract.settlements[].settlementAttributes.paymentRail
      - step: on_init
        from: BPP
        to: BAP
        description: >
          BPP acknowledges payment method. BAP now collects payment from
          consumer using on_init payment details.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.methodDetail[]
      - step: confirm
        from: BAP
        to: BPP
        description: BAP sends confirm after consumer payment is complete.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.paidAt
          - message.contract.settlements[].settlementAttributes.gatewayRef
      - step: on_confirm
        from: BPP
        to: BAP
        description: BPP confirms order. Payment already collected by BAP.
    schemaPacks:
      core: [payment/v1]

  payment-prepaid-BPP-collected:
    id: payment-prepaid-BPP-collected
    window:
      earliest: init
      latest: confirm
    description: >
      BPP collects payment directly from consumer — e.g. via seller's own
      payment gateway. BPP sends an unsolicited on_init when payment is
      confirmed. BAP must listen for unsolicited on_init callbacks.
    steps:
      - step: init
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.collectedBy
          - message.contract.settlements[].settlementAttributes.paymentRail
      - step: on_init
        stepContext: "solicited"
        from: BPP
        to: BAP
        description: BPP returns payment link or QR for consumer to pay directly.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.methodDetail.paymentLink
      - step: on_init
        stepContext: "unsolicited — payment confirmation"
        from: BPP
        to: BAP
        direction: unsolicited
        description: >
          After consumer pays on BPP's payment page, BPP sends a second
          unsolicited on_init to BAP confirming payment status.
          BAP must handle this callback and update order state.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.paidAt
          - message.contract.settlements[].settlementAttributes.gatewayRef
      - step: confirm
        from: BAP
        to: BPP
        description: BAP sends confirm after receiving unsolicited on_init PAID.
    schemaPacks:
      core: [payment/v1]

  payment-COD-BAP-collected:
    id: payment-COD-BAP-collected
    window:
      earliest: init
      latest: on_status[DELIVERED]
    description: >
      Cash on Delivery where BAP (marketplace) arranges cash collection
      through its own delivery agents. BAP's LSP collects cash and remits
      to BAP. BAP settles to BPP via reconcile after delivery.
    steps:
      - step: init
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.collectedBy
          - message.contract.settlements[].settlementAttributes.paymentRail
      - step: on_init
        from: BPP
        to: BAP
        requiredFields:
          - message.contract.contractAttributes.codAmount
      - step: confirm
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
      - step: on_status[DELIVERED]
        from: BPP
        to: BAP
        description: Cash collected at delivery. BAP's agent confirms collection.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.paidAt
    businessRules:
      - codAmount is the exact amount the delivery agent must collect
      - BAP settles to BPP via reconcile after return window closes
      - COD not available if offer.availableOnCod=false
    schemaPacks:
      trade: [contract/v1]
      core: [payment/v1]

  payment-COD-BPP-collected:
    id: payment-COD-BPP-collected
    window:
      earliest: init
      latest: on_status[DELIVERED]
    description: >
      Cash on Delivery where BPP's own delivery agent collects cash
      directly from consumer. BPP manages cash and remits finder fee
      to BAP via reconcile after delivery.
    steps:
      - step: init
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.collectedBy
          - message.contract.settlements[].settlementAttributes.paymentRail
      - step: on_init
        from: BPP
        to: BAP
        requiredFields:
          - message.contract.contractAttributes.codAmount
      - step: confirm
        from: BAP
        to: BPP
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
      - step: on_status[DELIVERED]
        from: BPP
        to: BAP
        direction: unsolicited
        description: BPP's agent confirms cash collected at doorstep.
        requiredFields:
          - message.contract.settlements[].settlementAttributes.status
          - message.contract.settlements[].settlementAttributes.paidAt
    businessRules:
      - BPP's agent must carry exact change
      - BPP remits BAP's finder fee within settlement window
    schemaPacks:
      trade: [contract/v1]
      core: [payment/v1]

  multi-fulfillment:
    id: multi-fulfillment
    window:
      earliest: select
      latest: init
    description: >
      Order split across multiple fulfilment centres — e.g. consumer orders
      from two different brands in one basket, or provider has items across
      multiple FCs. Each split creates a separate Performance record.
      BAP sends a single select; BPP returns multiple fulfillment objects.
    steps:
      - step: select
        from: BAP
        to: BPP
        description: BAP sends a single order with all items, possibly from multiple FCs.
        requiredFields:
          - message.contract.commitments[]
          - message.contract.performance[].performanceAttributes.performanceMode
      - step: on_select
        from: BPP
        to: BAP
        description: >
          BPP returns multiple fulfillment objects — one per split.
          Each has its own SLA, performance mode, and consideration breakup.
        requiredFields:
          - message.contract.performance[]
          - message.contract.performance[].id
          - message.contract.performance[].performanceAttributes.sla
          - message.contract.consideration.considerationAttributes.breakup[]
      - step: init
        from: BAP
        to: BPP
        description: BAP provides one delivery address per fulfillment (or shared).
        requiredFields:
          - message.contract.performance[].stops[]
    businessRules:
      - Each fulfillment has its own cancellation window
      - Partial cancellation of one fulfillment is allowed if partialCancellationAllowed=true
      - Each fulfillment generates its own performance state updates
      - Quote breakup must have separate DELIVERY line per fulfillment ID
    schemaPacks:
      trade: [performance/v1, consideration/v1, contract/v1]

  cancellation-terms:
    id: cancellation-terms
    window:
      earliest: on_init
      latest: on_confirm
    description: >
      Used when the offer declares a cancellationFee that applies from
      certain states. BAP must show the cancellation fee terms to consumer
      before they confirm. Consumer explicitly acknowledges terms.
      Only triggers when cancellationFee is present on the offer.
    steps:
      - step: on_init
        from: BPP
        to: BAP
        description: on_init includes cancellation fee terms for BAP to display.
        conditionalFields:
          - field: message.contract.performance[].performanceAttributes.tags.cancellation_terms.fee_type
          - field: message.contract.performance[].performanceAttributes.tags.cancellation_terms.fee_amount
          - field: message.contract.performance[].performanceAttributes.tags.cancellation_terms.applicable_after_state
      - step: confirm
        from: BAP
        to: BPP
        description: BAP confirms only after consumer has acknowledged fee terms.
        conditionalFields:
          - field: message.contract.tags.cancellation_terms.consumer_acknowledged
    businessRules:
      - BAP must not send confirm without consumer acknowledgment
      - If consumer rejects terms, BAP abandons transaction (no cancel needed, no contract exists)

  on-network-LSP:
    id: on-network-LSP
    window:
      earliest: on_confirm
      latest: on_confirm
    description: >
      BPP triggers a separate on-network Logistics transaction after the
      trade contract is confirmed. The Logistics contract is a separate
      ION transaction between BPP (acting as BAP in the logistics flow)
      and the LSP (BPP in the logistics flow).
      The BAP is not involved in the logistics transaction.
      The link is maintained via contractAttributes.linkedContractId.
    steps:
      - step: on_confirm
        stepContext: "trade"
        from: BPP
        to: BAP
        description: Trade contract confirmed. BPP then independently initiates logistics.
        requiredFields:
          - message.contract.contractAttributes.fulfillingLocationId
      - step: logistics_sequence
        stepContext: "select → on_select → init → on_init → confirm → on_confirm (separate logistics transaction)"
        participants:
          initiator: BPP (acting as BAP in logistics flow)
          responder: LSP (BPP in logistics flow)
        linkedVia:
          - trade.contractAttributes.linkedContractId
          - performance.lspSubscriberId
    businessRules:
      - Logistics transaction uses ION Logistics sector (Sector F)
      - BAP does not receive on_status from logistics directly
      - BPP aggregates logistics state into trade performance.status
      - If logistics confirm fails, BPP may fall back to off-network logistics

    # Op-12 (v0.5) — Logistics-domain events not modelled on Trade protocol
    logisticsDomainEvents:
      description: |
        The following events occur entirely within the Logistics sector
        transaction and are NOT represented on the Trade protocol. BPP
        aggregates the net effect (e.g. state transitions, SLA breach flags)
        into the Trade performance record but does not surface the raw events.
        Trade-side BAPs should not expect these in on_status payloads.
      notHandledOnTrade:
        - Agent reassignment (rider #1 → rider #2). Handled in Logistics on_status.
        - Pickup failure (rider arrived at seller, seller unprepared). Handled in Logistics RTO-pickup.
        - Inter-hub handoffs, sort-centre transitions. Internal to LSP.
        - LSP-side SLA clock breaches (pickup-to-dispatch, hub-to-hub). Settled in Logistics reconcile.
        - Cold-chain excursion events (temperature breach at sort centre). Logistics coldChainLog.
        - Multi-package tracking internal to a single LSP fulfillment.
      whenBpfMustCascadeToTrade:
        - Final DELIVERED event (Trade performance moves to DELIVERED)
        - Final RTO event (Trade performance moves to RTO_INITIATED)
        - SLA breach affecting consumer-facing ETA (Trade fulfillment-delay sub-branch fires)
        - Insurance claim event if consumer compensation needed
    schemaPacks:
      trade: [performance/v1, contract/v1]

  technical-cancellation-confirm-failure-BAP:
    id: technical-cancellation-confirm-failure-BAP
    window:
      earliest: confirm
      latest: confirm
    description: >
      BAP sent /confirm but received a NACK (negative acknowledgment) from
      BPP, or did not receive on_confirm within the message TTL.
      BAP must cancel with code 999 and not assume a contract was created.
      If payment was initiated by BAP, BAP must refund the consumer.
    triggerCondition: BPP NACKs /confirm OR on_confirm not received within context.ttl
    cancellationCode: 999
    steps:
      - step: cancel
        from: BAP
        to: BPP
        description: >
          BAP sends /cancel with reason code 999 to signal technical failure.
          This is a signal only — BPP may have already rolled back.
        requiredFields:
          - message.contract.id
          - message.contract.contractAttributes.cancellationReason.id
          - message.contract.contractAttributes.cancellationReason.descriptor.code
      - step: on_cancel
        from: BPP
        to: BAP
        description: BPP acknowledges and confirms no contract was created.
    businessRules:
      - No contract exists — cancellation is informational cleanup only
      - BAP must refund consumer immediately if payment was collected
      - BAP should raise to ION via raise/on_raise if BPP does not respond to /cancel
    errors:
      - ION-9002  # BPP callback timeout

  technical-cancellation-confirm-failure-BPP:
    id: technical-cancellation-confirm-failure-BPP
    window:
      earliest: on_confirm
      latest: on_confirm
    description: >
      BPP received /confirm but experienced an internal failure and cannot
      create the contract. BPP NACKs on_confirm with code 998.
      BPP must roll back any reserved inventory. BAP must refund consumer.
    triggerCondition: BPP internal failure at contract creation
    cancellationCode: 998
    steps:
      - step: on_confirm
        stepContext: "NACK"
        from: BPP
        to: BAP
        direction: nack
        description: BPP returns NACK with error code 998.
        requiredFields:
          - error.code
          - error.message
      - step: cancel
        from: BAP
        to: BPP
        description: BAP sends /cancel to formally close the transaction.
        requiredFields:
          - message.contract.contractAttributes.cancellationReason.id
    businessRules:
      - BPP must release reserved inventory immediately on NACK
      - BAP must refund consumer if payment was collected
      - BAP must not retry confirm for the same messageId

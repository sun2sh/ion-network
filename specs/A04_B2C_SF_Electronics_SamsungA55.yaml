validation:
  bpp_rules:
  - rule: postel_registration is mandatory for all mobile devices and telecommunications equipment
    error: ION-5030 — Missing POSTEL registration
    regulatory: PM Kominfo No. 16/2018 tentang Persyaratan dan Tata Cara Pengujian Perangkat Telekomunikasi
  - rule: Warranty duration must be minimum P1Y for electronics. Shorter warranty is a regulatory violation.
    error: ION-5031 — Warranty below legal minimum
    regulatory: UU Perlindungan Konsumen No. 8/1999 Pasal 25; PP 36/2023
  - rule: warranty_policy IRI must be consistent with declared warranty.duration
    error: ION-5032 — Inconsistent warranty policy and duration
  - rule: return_evidence_required must be VIDEO_UNBOXING for electronics unless seller declares otherwise
    note: Industry standard in Indonesia — all major platforms enforce this
  - rule: available_on_cod must be false for electronics above Rp 2,000,000 at authorised stores
    note: Store policy — not a protocol constraint
  bap_rules:
  - rule: BAP must display POSTEL registration number on product detail page
    note: Consumer information — allows verification via cek-postel.kominfo.go.id
  - rule: BAP must display return policy clearly including evidence requirements and window
    note: UU Perlindungan Konsumen requirement
  - rule: BAP must display warranty duration and SEIN coverage prominently
    note: Consumer trust signal
_resources_role:
  declared_by: BPP
  consumed_by: BAP
  appears_in:
  - on_discover
  note: BPP declares all available resources. BAP renders the catalog/menu.
_offers_role:
  declared_by: BPP
  consumed_by:
  - BAP
  - ION
  appears_in:
  - on_discover
  note: BPP declares prices and policy IRIs. ION enforces policy. BAP renders price and policy UI.
_resource_attribute_field_roles:
  _description: Role metadata for every field in resourceAttributes. All declared by BPP in on_discover, consumed by BAP for
    rendering.

meta:
  id: ion-trade-b2c-sf-electronics-samsung-a55-v1
  sector: trade
  sector_code: A
  resource_type: TradeResource
  resource_type_code: A04
  commerce_pattern: B2C Single Fulfilment
  resource_shape: VARIANT
  priority: core
  status: ready-to-spec
  ion_spec_version: '1.0'
  beckn_version: 2.0.1
  domain: ion:trade:electronics
  categories:
  - electronics
  - consumer-durables
  reference_product: Samsung Galaxy A55 5G (SM-A556E)
  reference_seller: Samsung Authorized Store — Mall Ambassador, Jakarta Pusat
  roles_covered:
  - BAP
  - BPP
  role_guide:
    BAP: Buyer Application — consumer-facing app. Reads on_* callbacks, sends forward calls.
    BPP: Buyer-Provided Participant — seller app. Reads forward calls, sends on_* callbacks.
    ION: ION Central platform — enforces policy IRIs, validates mandatory fields, routes catalog.
    field_tag_legend:
      declared_by: Which role sets this field value
      consumed_by: Which role(s) read and act on this field
      enforced_by: Which system enforces correctness of this field
      appears_at: Which API call this field first appears in
      bap_action: 'What BAP does with this API call: SEND | RECEIVE | NONE'
      bpp_action: 'What BPP does with this API call: SEND | RECEIVE | NONE'
participants:
  bap:
    role: Buyer App (e.g. electronics marketplace)
    responsibilities:
    - Display POSTEL registration number on product page
    - Display TKDN percentage as trust signal
    - Display warranty details prominently (1 year SEIN)
    - Enforce return policy — show 2-day return window and unboxing evidence requirement
    - Render variant selector (RAM / storage / colour combinations)
    - Surface SNI compliance badge for consumer confidence
    must_not:
    - Allow return claims after 2-day window without seller approval
    - Cache catalog beyond declared TTL (electronics prices change frequently)
    role_tag: BAP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - status
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - discover
    - select
    - init
    - confirm
    - status
    - update
    - cancel
  bpp:
    role: Seller App (Samsung Authorized Store)
    responsibilities:
    - Declare POSTEL registration as mandatory regulatory field
    - Declare TKDN percentage on resource
    - Declare manufacturer warranty duration (P1Y minimum under Indonesian law)
    - Set returnable=true with 2-day window and evidence conditions
    - Compute PPN 11% at on_select
    - Check PPnBM applicability (Samsung A55 — not luxury tier, PPnBM not applicable)
    must_not:
    - Omit POSTEL registration — devices without valid registration cannot be sold
    - Declare warranty below 1 year (UU Perlindungan Konsumen No. 8/1999 minimum)
    role_tag: BPP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - on_discover
    - on_select
    - on_init
    - on_confirm
    - on_status
    - on_update
    - on_cancel

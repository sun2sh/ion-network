consideration:
  currency: IDR
  ppn_rate: 0.11
  ppn_basis: ITEM_SUBTOTAL
  regulatory_source: UU HPP No. 7/2021; PMK 60/2022
  line_types:
  - type: ITEM
    mandatory: true
    who_absorbs: SELLER
    example:
      title: Indomie Goreng Spesial 85g × 10
      value: 31000
  - type: DELIVERY
    mandatory: conditional
    condition: Present when fulfillment.type = DELIVERY
    who_absorbs: BUYER
    example:
      title: Biaya Pengiriman
      value: 12000
  - type: TAX_PPN
    mandatory: true
    rate: 0.11
    who_absorbs: BUYER
    example:
      title: PPN 11%
      value: 3410
  - type: PROVIDER_BENEFIT
    mandatory: false
    description: Seller promotional discount — e.g. buy 10 get 5% off
    who_absorbs: SELLER
  - type: BUYER_BENEFIT
    mandatory: false
    description: BAP voucher or promo. Hidden from seller unless COD.
    who_absorbs: BAP
  _role:
    declared_by: BPP
    consumed_by:
    - BAP
    - ION
    appears_in:
    - on_select
    - on_init
    - on_confirm
    note: BPP computes and declares price breakup. ION validates PPN declaration. BAP renders to consumer.
performance:
  fulfillment_type: LSP_PARTNER
  lsp_involved: true
  states:
  - state: PENDING
    when: Immediately after on_confirm
  - state: PACKED
    when: Items packed, awaiting pickup by logistics partner
    added_fields:
    - performanceAttributes.awbNumber
  - state: DISPATCHED
    when: Logistics partner picked up
    added_fields:
    - performanceAttributes.trackingUrl
  - state: OUT_FOR_DELIVERY
    when: Out for last-mile delivery
  - state: DELIVERED
    when: Delivered to consumer
    added_fields:
    - performanceAttributes.deliveryProofUrl
  _role:
    declared_by: BPP
    consumed_by: BAP
    appears_in:
    - on_status
    - on_update
    note: BPP updates performance state. BAP renders tracking UI to consumer.

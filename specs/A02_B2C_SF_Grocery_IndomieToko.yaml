validation:
  bpp_rules:
  - rule: bpom_registration_number is mandatory for all packaged food resources
    error: ION-5020 — Missing BPOM registration
  - rule: halal_cert_number is mandatory when dietary_classification=HALAL
    error: ION-5021 — Missing halal cert for HALAL classified resource
  - rule: 'allergens[] must be declared if the product contains any of: GLUTEN, CRUSTACEAN, EGG, FISH, PEANUT, SOY, MILK,
      TREE_NUT, SESAME'
    error: ION-5022 — Missing mandatory allergen declaration
    regulatory: PerBPOM No. 22/2019
  - rule: net_quantity must be declared for all packaged FMCG and grocery resources
    error: ION-5023 — Missing net quantity declaration
  - rule: PPN 11% must be declared as separate TAX_PPN line in quote.breakup. Applied on item subtotal only.
    error: ION-5010 — Missing or incorrect PPN declaration
  bap_rules:
  - rule: BAP must display HALAL badge when resource dietary_classification=HALAL
    note: UX requirement — not a protocol error
  - rule: BAP must display allergen warning when allergens[] is non-empty
    note: UX requirement per consumer protection standards
  - rule: BAP must display bpom_registration_number on product detail page
    note: Consumer information requirement

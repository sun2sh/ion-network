meta:
  id: ion-trade-b2c-sf-grocery-indomie-v1
  sector: trade
  sector_code: A
  resource_type: TradeResource
  resource_type_code: A02
  commerce_pattern: B2C Single Fulfilment
  resource_shape: VARIANT
  priority: core
  status: ready-to-spec
  ion_spec_version: '1.0'
  beckn_version: 2.0.1
  domain: ion:trade:grocery
  categories:
  - grocery
  - fmcg
  reference_product: Indomie Mi Instan Goreng Spesial 85g
  reference_seller: Toko Sembako Abadi Jaya — Tebet, Jakarta Selatan
  roles_covered:
  - BAP
  - BPP
  role_guide:
    BAP: Buyer Application — consumer-facing app. Reads on_* callbacks, sends forward calls.
    BPP: Buyer-Provided Participant — seller app. Reads forward calls, sends on_* callbacks.
    ION: ION Central platform — enforces policy IRIs, validates mandatory fields, routes catalog.
    field_tag_legend:
      declared_by: Which role sets this field value
      consumed_by: Which role(s) read and act on this field
      enforced_by: Which system enforces correctness of this field
      appears_at: Which API call this field first appears in
      bap_action: 'What BAP does with this API call: SEND | RECEIVE | NONE'
      bpp_action: 'What BPP does with this API call: SEND | RECEIVE | NONE'
  architecture_note: 'Phase 1 (catalog): BPP publishes to Catalogue Service (Beckn Fabric). Discover Service (ION or BAP-hosted)
    delivers to subscribed BAPs via /on_discover. Phase 2 (transaction): BAP talks directly to BPP from /select onwards. This
    YAML covers Phase 2 in full and shows the Phase 1 payload structure in examples[].'
participants:
  bap:
    role: Buyer App (e.g. grocery delivery super-app)
    responsibilities:
    - Send /discover with consumer GPS
    - Render variant selector (single pack vs multipack)
    - Display HALAL badge and BPOM registration number
    - Display allergen warning (GLUTEN, SOY) on product detail
    - Send /select with chosen variant and quantity
    - Handle COD or prepaid payment at /init
    must_not:
    - Display seller NPWP to consumer
    - Cache catalog beyond BPP-declared TTL
    role_tag: BAP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - status
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - discover
    - select
    - init
    - confirm
    - status
    - update
    - cancel
  bpp:
    role: Seller App (Toko Sembako Abadi Jaya)
    responsibilities:
    - Return catalog only when consumer GPS is inside serviceability polygon
    - Declare BPOM registration, halal cert, SNI on resource
    - Compute PPN 11% at on_select and declare as TAX_PPN line
    - Declare stock_count — deduct on confirm
    - Ship within time_to_ship = P1D (1 day)
    must_not:
    - Apply PPN on delivery charge
    - Return catalog when storeStatus is TEMPORARILY_CLOSED or DISABLED
    role_tag: BPP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - on_discover
    - on_select
    - on_init
    - on_confirm
    - on_status
    - on_update
    - on_cancel
  catalogue_service:
    role_tag: CDS
    hosted_by: Beckn Fabric
    description: Central catalog store for the ION network. BPPs publish catalogs here via /publish_catalog. Beckn Fabric
      owns and operates this service.
    responsibilities:
    - Receive and store BPP catalog publications
    - Serve catalog data to the Discover Service
    - Maintain incremental catalog update history
    bpp_interaction: BPP calls /publish_catalog on this service — not on individual BAPs
    bap_interaction: BAP does not interact with Catalogue Service directly
  discover_service:
    role_tag: DS
    hosted_by: ION Network (Option 1 — shared) | BAP themselves (Option 2 — self-hosted) | BAP/BPP integrated (Option 3)
    description: 'Three options: Option 1 — ION shared DS (no infrastructure, simplest way to understand the flow). Option
      2 — BAP-hosted DS (full control over filtering, ranking, caching). Option 3 — Integrated (BAP and BPP same organisation,
      own DS). All three are valid ION configurations. In all cases the BAP formally subscribes and delivery follows the standard
      /on_discover API. Option 1 is the fastest path to understanding the flow end-to-end.'
    responsibilities:
    - Receive BAP subscriptions (sector, category, location context)
    - Pull matching catalogs from Catalogue Service
    - Deliver catalogs to subscribed BAPs via /on_discover
    - Handle incremental updates as BPPs republish
    open_question: 'OQ-DS-01: GeoJSON polygon matching — does serviceability polygon filtering (which BPP catalogs reach which
      BAPs based on consumer GPS) happen in the Catalogue Service, the Discover Service, or both? Pending ION Council decision.'
flow:
  pattern: async_callback
  entry_point: /discover
  apis:
  - api: discover
    direction: BAP → Discover Service
    mandatory: true
    description: 'BAP sends consumer intent with GPS location. BPP evaluates which Dominos stores have a serviceability polygon
      containing that point and returns only those stores'' catalogs.

      '
    bap_sends:
      required:
      - context.domain
      - context.location.gps
      - context.location.country.code
      - context.timestamp
      - context.bap_id
      - context.transaction_id
      - context.message_id
      optional:
      - message.intent.textSearch
      - message.intent.category
    bap_notes:
    - 'GPS must be WGS-84, format: ''-6.2615,106.8106'' (lat,lon)'
    - BAP must not send expected FC or store preference
    - context.currency must be IDR for domestic ION Trade transactions
    consumer: BAP
    producer: DS
    bap_action: SUBSCRIBE
    bpp_action: NONE
    bap_reads_this: true
    bpp_reads_this: true
    ds_action: RECEIVE_SUBSCRIPTION
    corrected_description: 'BAP subscribes to the Discover Service declaring intent: sector, category, location context. This
      is a one-time setup call (or updated when search context changes). BAP does NOT query individual BPPs for catalog.'
    bap_note: 'Send /subscribe to the Discover Service (ION-hosted endpoint or your own DS). Declare: domain, location.gps,
      category. You will receive /on_discover callbacks as matching BPP catalogs arrive.'
  - api: on_discover
    direction: Discover Service → BAP
    mandatory: true
    description: 'BPP returns multi-provider catalog. Each provider record represents one Dominos store (FC). Only stores
      whose GeoJSON Polygon (providerAttributes.serviceabilityPolygon) contains the consumer GPS are returned. BAP renders
      ALL returned stores'' menus.

      '
    bpp_returns:
    - context (mirrored)
    - message.catalogs[]
    catalog_structure:
    - Provider record (one per FC)
    - Provider.availableAt[].geo
    - Provider.providerAttributes
    - Resource records (menu items)
    - Offer records (prices + policy)
    bap_notes:
    - BAP must respect storeStatus — TEMPORARILY_CLOSED stores should not be orderable
    - BAP must render customisationGroups in sequence order
    - BAP must enforce SINGLE_REQUIRED groups — consumer cannot proceed without selection
    - BAP must show halalCertNumber or halal badge when dietaryClassification=HALAL
    - BAP must NOT show fulfillingLocationId — it is not present yet
    consumer: DS
    producer: BAP
    bap_action: RECEIVE
    bpp_action: NONE
    bap_reads_this: true
    bpp_reads_this: true
    ds_action: SEND
    corrected_description: Discover Service pushes matching BPP catalogs to the BAP. Triggered when a BPP publishes or updates
      their catalog on the Catalogue Service and the update matches an active BAP subscription. BAP receives this and updates
      its local catalog store / search index.
    bap_note: You receive this at your /on_discover callback URL. Parse the catalog, update your local index, make it searchable
      for consumers. This is NOT a response to a consumer search — it is a push from the network.
    bpp_note: BPP does NOT send /on_discover. BPP publishes to the Catalogue Service via /publish_catalog. The Discover Service
      handles delivery to BAPs automatically.
  - api: select
    direction: BAP → BPP
    mandatory: true
    description: 'Consumer has completed customisation choices. BAP sends selected resource ID + complete customisation selections.
      BPP computes final price including PPN 11%.

      '
    bap_sends:
      required:
      - context (with same transaction_id)
      - message.order.provider.id
      - message.order.items[]
      - message.order.fulfillments[].type
      - message.order.fulfillments[].end.location.gps
      optional:
      - message.order.items[].customisations[]
    select_notes:
    - Each item must carry the complete customisation path — parent resource ID + all group selections
    - Addon quantities declared here — e.g. 2× extra cheese
    - BAP does not declare which FC fulfils — that is BPP-internal
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_select
    direction: BPP → BAP
    mandatory: true
    description: 'BPP returns quoted price breakup. PPN 11% computed and declared as a separate consideration line. Preparation
      time estimated. Cancellation policy IRI included.

      '
    bpp_returns:
    - message.order.quote.price
    - message.order.quote.breakup[]
    - message.order.items[]
    - message.order.fulfillments[]
    - message.order.cancellation_terms
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: init
    direction: BAP → BPP
    mandatory: true
    description: 'Consumer confirms intent to order. BAP sends delivery address, consumer identity (NIK optional, phone mandatory),
      and declares payment method.

      '
    bap_sends:
      required:
      - message.order.billing
      - message.order.fulfillments[].end.location
      - message.order.fulfillments[].end.contact
      - message.order.payment.type
      optional:
      - message.order.billing.tax_number
      - message.order.fulfillments[].end.instructions
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_init
    direction: BPP → BAP
    mandatory: true
    description: 'BPP confirms order can proceed. Returns payment terms including payment gateway URL or COD declaration.
      Final consideration locked.

      '
    bpp_returns:
    - message.order.payment
    - message.order.quote
    - message.order.fulfillments[]
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: confirm
    direction: BAP → BPP
    mandatory: true
    description: 'BAP confirms payment was committed (prepaid) or declares COD. Sends payment transaction reference for prepaid
      orders. This triggers FC assignment on the BPP side.

      '
    bap_sends:
      required:
      - message.order.payment.status
      - message.order.payment.transaction_id
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_confirm
    direction: BPP → BAP
    mandatory: true
    description: 'Contract created. BPP reveals fulfillingLocationId for the first time — which Dominos store will prepare
      and deliver this order. Central invoicing entity declared. Order ID assigned.

      '
    bpp_returns:
    - message.order.id
    - message.order.state
    - message.order.contractAttributes.fulfillingLocationId
    - message.order.contractAttributes.invoicingEntity
    - message.order.fulfillments[].state
    on_confirm_notes:
    - fulfillingLocationId appears HERE for the first time — never before
    - 'invoicingEntity carries {id: ''PT Sarimelati Kencana Tbk'', en: ''PT Sarimelati Kencana Tbk''}'
    - BAP should now display which store will fulfil (using store name from catalog)
    - Contract is now immutable — price and items locked
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: status
    direction: BAP → BPP
    mandatory: false
    description: 'BAP polls for order state. BAP may call repeatedly. BPP returns current performance state. Rider details
      added at DISPATCHED.

      '
    bap_sends:
      required:
      - message.order_id
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: false
  - api: on_status
    direction: BPP → BAP
    mandatory: false
    description: 'BPP reports current performance state. State machine is Dominos-specific: PREPARING → QUALITY_CHECK → DISPATCHED
      → OUT_FOR_DELIVERY → DELIVERED. Rider identity added at DISPATCHED. Delivery proof URL added at DELIVERED.

      '
    performance_states:
    - state: PREPARING
      description: Store is making the order
      added_fields: []
    - state: QUALITY_CHECK
      description: Order boxed and quality-checked before dispatch
      added_fields: []
    - state: DISPATCHED
      description: Rider has picked up the order
      added_fields:
      - performanceAttributes.agentName
      - performanceAttributes.agentPhone
      - performanceAttributes.agentPhoto
      - performanceAttributes.trackingUrl
    - state: OUT_FOR_DELIVERY
      description: Rider is approaching consumer address
      added_fields:
      - performanceAttributes.estimatedDeliveryTime
    - state: DELIVERED
      description: Order delivered to consumer
      added_fields:
      - performanceAttributes.deliveryProofUrl
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true

meta:
  id: ion-trade-b2c-sf-grocery-indomie-v1
  sector: trade
  sector_code: A
  resource_type: TradeResource
  resource_type_code: A02
  commerce_pattern: B2C Single Fulfilment
  resource_shape: VARIANT
  priority: core
  status: ready-to-spec
  ion_spec_version: '1.0'
  beckn_version: 2.0.1
  domain: ion:trade:grocery
  categories:
  - grocery
  - fmcg
  reference_product: Indomie Mi Instan Goreng Spesial 85g
  reference_seller: Toko Sembako Abadi Jaya — Tebet, Jakarta Selatan
  roles_covered:
  - BAP
  - BPP
  role_guide:
    BAP: Buyer Application — consumer-facing app. Reads on_* callbacks, sends forward calls.
    BPP: Buyer-Provided Participant — seller app. Reads forward calls, sends on_* callbacks.
    ION: ION Central platform — enforces policy IRIs, validates mandatory fields, routes catalog.
    field_tag_legend:
      declared_by: Which role sets this field value
      consumed_by: Which role(s) read and act on this field
      enforced_by: Which system enforces correctness of this field
      appears_at: Which API call this field first appears in
      bap_action: 'What BAP does with this API call: SEND | RECEIVE | NONE'
      bpp_action: 'What BPP does with this API call: SEND | RECEIVE | NONE'
participants:
  bap:
    role: Buyer App (e.g. grocery delivery super-app)
    responsibilities:
    - Send /discover with consumer GPS
    - Render variant selector (single pack vs multipack)
    - Display HALAL badge and BPOM registration number
    - Display allergen warning (GLUTEN, SOY) on product detail
    - Send /select with chosen variant and quantity
    - Handle COD or prepaid payment at /init
    must_not:
    - Display seller NPWP to consumer
    - Cache catalog beyond BPP-declared TTL
    role_tag: BAP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - status
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - discover
    - select
    - init
    - confirm
    - status
    - update
    - cancel
  bpp:
    role: Seller App (Toko Sembako Abadi Jaya)
    responsibilities:
    - Return catalog only when consumer GPS is inside serviceability polygon
    - Declare BPOM registration, halal cert, SNI on resource
    - Compute PPN 11% at on_select and declare as TAX_PPN line
    - Declare stock_count — deduct on confirm
    - Ship within time_to_ship = P1D (1 day)
    must_not:
    - Apply PPN on delivery charge
    - Return catalog when storeStatus is TEMPORARILY_CLOSED or DISABLED
    role_tag: BPP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - on_discover
    - on_select
    - on_init
    - on_confirm
    - on_status
    - on_update
    - on_cancel
flow:
  pattern: async_callback
  entry_point: /discover
  apis:
  - api: discover
    direction: BAP → BPP
    mandatory: true
    bap_sends:
      required:
      - context.domain
      - context.location.gps
      - context.location.country.code
      - context.timestamp
      - context.bap_id
      - context.transaction_id
      - context.message_id
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_discover
    direction: BPP → BAP
    mandatory: true
    description: 'BPP returns catalog. Consumer GPS -6.2305,106.8485 (Tebet) is inside the seller''s serviceability polygon.
      Catalog includes both variants: single 85g pack and multipack 5×85g.

      '
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: select
    direction: BAP → BPP
    mandatory: true
    bap_sends:
      required:
      - message.order.provider.id
      - message.order.items[].resource_id
      - message.order.items[].offer_id
      - message.order.items[].quantity.count
      - message.order.fulfillments[].type
      - message.order.fulfillments[].end.location.gps
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_select
    direction: BPP → BAP
    mandatory: true
    description: 'BPP returns quoted price with PPN 11% computed on item subtotal. Delivery charge added separately.

      '
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: init
    direction: BAP → BPP
    mandatory: true
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_init
    direction: BPP → BAP
    mandatory: true
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: confirm
    direction: BAP → BPP
    mandatory: true
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_confirm
    direction: BPP → BAP
    mandatory: true
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: status
    direction: BAP → BPP
    mandatory: false
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: false
  - api: on_status
    direction: BPP → BAP
    mandatory: false
    performance_states:
    - PENDING
    - PACKED
    - DISPATCHED
    - OUT_FOR_DELIVERY
    - DELIVERED
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true

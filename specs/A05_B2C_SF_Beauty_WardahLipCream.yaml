meta:
  id: ion-trade-b2c-sf-beauty-wardahlip-v1
  sector: trade
  sector_code: A
  resource_type: TradeResource
  resource_type_code: A05
  commerce_pattern: B2C Single Fulfilment
  resource_shape: VARIANT
  priority: core
  status: ready-to-spec
  ion_spec_version: '1.0'
  beckn_version: 2.0.1
  domain: ion:trade:beauty
  categories:
  - beauty
  - personal-care
  - cosmetics
  reference_product: Wardah Exclusive Lip Cream
  reference_seller: Beauty Hub Bandung — Bandung, Jawa Barat
  roles_covered:
  - BAP
  - BPP
  role_guide:
    BAP: Buyer Application — consumer-facing app. Reads on_* callbacks, sends forward calls.
    BPP: Buyer-Provided Participant — seller app. Reads forward calls, sends on_* callbacks.
    ION: ION Central platform — enforces policy IRIs, validates mandatory fields, routes catalog.
    field_tag_legend:
      declared_by: Which role sets this field value
      consumed_by: Which role(s) read and act on this field
      enforced_by: Which system enforces correctness of this field
      appears_at: Which API call this field first appears in
      bap_action: 'What BAP does with this API call: SEND | RECEIVE | NONE'
      bpp_action: 'What BPP does with this API call: SEND | RECEIVE | NONE'
  architecture_note: 'Phase 1 (catalog): BPP publishes to Catalogue Service (Beckn Fabric). Discover Service (ION or BAP-hosted) delivers to subscribed BAPs via /on_discover. Phase 2 (transaction): BAP
    talks directly to BPP from /select onwards. This YAML covers Phase 2 in full and shows the Phase 1 payload structure in examples[].'
participants:
  bap:
    role: Buyer App (e.g. beauty marketplace or multi-brand platform)
    responsibilities:
    - Display HALAL badge prominently (Wardah brand identity)
    - Display BPOM NA registration number on product detail
    - Render shade variant selector with hex colour preview
    - Display active ingredients and skin type suitability
    - Show non-returnable policy clearly (hygiene — cosmetics)
    - Display expiry date information
    must_not:
    - Allow returns for cosmetics unless defective or wrong item
    role_tag: BAP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - status
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - discover
    - select
    - init
    - confirm
    - status
    - update
    - cancel
  bpp:
    role: Seller App (Beauty Hub Bandung)
    responsibilities:
    - Declare BPOM NA registration for each shade variant
    - Declare halal cert number (BPJPH)
    - Declare skin type, active ingredients, finish on resource
    - Declare shade name with hex code for BAP rendering
    - Return only products within consumer GPS serviceability polygon
    - Compute PPN 11% on item subtotal
    must_not:
    - List cosmetics without valid BPOM NA registration
    role_tag: BPP
    reads_apis:
    - discover
    - on_discover
    - select
    - on_select
    - init
    - on_init
    - confirm
    - on_confirm
    - on_status
    - update
    - on_update
    - cancel
    - on_cancel
    sends_apis:
    - on_discover
    - on_select
    - on_init
    - on_confirm
    - on_status
    - on_update
    - on_cancel
  catalogue_service:
    role_tag: CDS
    hosted_by: Beckn Fabric
    description: Central catalog store for the ION network. BPPs publish catalogs here via /publish_catalog. Beckn Fabric owns and operates this service.
    responsibilities:
    - Receive and store BPP catalog publications
    - Serve catalog data to the Discover Service
    - Maintain incremental catalog update history
    bpp_interaction: BPP calls /publish_catalog on this service — not on individual BAPs
    bap_interaction: BAP does not interact with Catalogue Service directly
  discover_service:
    role_tag: DS
    hosted_by: ION Network (Option 1 — shared) | BAP themselves (Option 2 — self-hosted) | BAP/BPP integrated (Option 3)
    description: 'Three options: Option 1 — ION shared DS (no infrastructure, simplest way to understand the flow). Option 2 — BAP-hosted DS (full control over filtering, ranking, caching). Option 3 — Integrated
      (BAP and BPP same organisation, own DS). All three are valid ION configurations. In all cases the BAP formally subscribes and delivery follows the standard /on_discover API. Option 1 is the fastest
      path to understanding the flow end-to-end.'
    responsibilities:
    - Receive BAP subscriptions (sector, category, location context)
    - Pull matching catalogs from Catalogue Service
    - Deliver catalogs to subscribed BAPs via /on_discover
    - Handle incremental updates as BPPs republish
    open_question: 'OQ-DS-01: GeoJSON polygon matching — does serviceability polygon filtering (which BPP catalogs reach which BAPs based on consumer GPS) happen in the Catalogue Service, the Discover Service,
      or both? Pending ION Council decision.'

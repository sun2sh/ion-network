validation:
  bpp_rules:
  - rule: bpom_na_registration is mandatory for all cosmetic products
    error: ION-5040 — Missing BPOM NA registration
    regulatory: PerBPOM No. 12/2020 tentang Tata Cara Pengajuan Notifikasi Kosmetika
  - rule: 'BPOM NA format must match: NA followed by 11 digits'
    error: ION-5041 — Invalid BPOM NA format
  - rule: halal_cert_number mandatory when dietary_classification=HALAL
    error: ION-5021 — Missing halal cert
  - rule: Cosmetics must declare application_area and skin_type
    error: ION-5042 — Missing cosmetics mandatory attributes
  - rule: Cosmetics return_policy must be return.none unless defective
    note: Hygiene standard — returns not permitted for cosmetics
  bap_rules:
  - rule: BAP must display bpom_na_registration on product detail
    note: Allows consumer verification at cekbpom.pom.go.id
  - rule: BAP must display shade hex colour as swatch in variant selector
    note: UX requirement for cosmetics — consumers need colour preview
  - rule: BAP must show non-returnable badge for cosmetics
_resources_role:
  declared_by: BPP
  consumed_by: BAP
  appears_in:
  - on_discover
  note: BPP declares all available resources. BAP renders the catalog/menu.
_offers_role:
  declared_by: BPP
  consumed_by:
  - BAP
  - ION
  appears_in:

      declared_by: BPP
      consumed_by:
      - BAP
      - ION
      enforced_by: ION
      note: IRI — machine-enforced by ION Central
    return_policy:
      declared_by: BPP
      consumed_by:
      - BAP
      - ION
      enforced_by: ION
      note: IRI — machine-enforced by ION Central
    warranty_policy: *id001
    dispute_policy:
      declared_by: BPP
      consumed_by:
      - BAP
      - ION
      enforced_by: ION
    display_language:
      declared_by: BPP
      consumed_by: BAP
    available_on_cod:
      declared_by: BPP
      consumed_by: BAP
    fulfillment_types_supported:
      declared_by: BPP
      consumed_by: BAP
_contract_attribute_field_roles:
  _description: Role metadata for contractAttributes fields. All created by BPP at on_confirm.
  fields:
    fulfilling_location_id:
      declared_by: BPP
      consumed_by: BAP
      appears_at: on_confirm
      note: CRITICAL — first and only appearance is in on_confirm. BPP selects internally.
    invoicing_model:
      declared_by: BPP
      consumed_by:
      - BAP
      - ION
    invoicing_entity:
      declared_by: BPP
      consumed_by: BAP
    nib:
      declared_by: BPP
      consumed_by:
      - ION
      - BAP
      mandatory_for: BPP
    npwp:
      declared_by: BPP
      consumed_by:
      - ION
      - BAP
      mandatory_for: BPP
_performance_attribute_field_roles:
  _description: Role metadata for performanceAttributes fields. All updated by BPP via on_status as order progresses.
  fields:
    agent_name:
      declared_by: BPP
      consumed_by: BAP
      appears_at: DISPATCHED
    agent_phone:
      declared_by: BPP
      consumed_by: BAP
      appears_at: DISPATCHED
    agent_photo:
      declared_by: BPP
      consumed_by: BAP
      appears_at: DISPATCHED
    tracking_url:
      declared_by: BPP
      consumed_by: BAP
      appears_at: DISPATCHED
    estimated_delivery_time:
      declared_by: BPP
      consumed_by: BAP
    delivery_proof_url:
      declared_by: BPP
      consumed_by: BAP
      appears_at: DELIVERED
flow:
  pattern: async_callback
  entry_point: /discover
  apis:
  - api: discover
    direction: BAP → Discover Service
    mandatory: true
    description: 'BAP sends consumer intent with GPS location. BPP evaluates which Dominos stores have a serviceability polygon containing that point and returns only those stores'' catalogs.

      '
    bap_sends:
      required:
      - context.domain
      - context.location.gps
      - context.location.country.code
      - context.timestamp
      - context.bap_id
      - context.transaction_id
      - context.message_id
      optional:
      - message.intent.textSearch
      - message.intent.category
    bap_notes:
    - 'GPS must be WGS-84, format: ''-6.2615,106.8106'' (lat,lon)'
    - BAP must not send expected FC or store preference
    - context.currency must be IDR for domestic ION Trade transactions
    consumer: BAP
    producer: DS
    bap_action: SUBSCRIBE
    bpp_action: NONE
    bap_reads_this: true
    bpp_reads_this: true
    ds_action: RECEIVE_SUBSCRIPTION
    corrected_description: 'BAP subscribes to the Discover Service declaring intent: sector, category, location context. This is a one-time setup call (or updated when search context changes). BAP does
      NOT query individual BPPs for catalog.'
    bap_note: 'Send /subscribe to the Discover Service (ION-hosted endpoint or your own DS). Declare: domain, location.gps, category. You will receive /on_discover callbacks as matching BPP catalogs arrive.'
  - api: on_discover
    direction: Discover Service → BAP
    mandatory: true
    description: 'BPP returns multi-provider catalog. Each provider record represents one Dominos store (FC). Only stores whose GeoJSON Polygon (providerAttributes.serviceabilityPolygon) contains the consumer
      GPS are returned. BAP renders ALL returned stores'' menus.

      '
    bpp_returns:
    - context (mirrored)
    - message.catalogs[]
    catalog_structure:
    - Provider record (one per FC)
    - Provider.availableAt[].geo
    - Provider.providerAttributes
    - Resource records (menu items)
    - Offer records (prices + policy)
    bap_notes:
    - BAP must respect storeStatus — TEMPORARILY_CLOSED stores should not be orderable
    - BAP must render customisationGroups in sequence order
    - BAP must enforce SINGLE_REQUIRED groups — consumer cannot proceed without selection
    - BAP must show halalCertNumber or halal badge when dietaryClassification=HALAL
    - BAP must NOT show fulfillingLocationId — it is not present yet
    consumer: DS
    producer: BAP
    bap_action: RECEIVE
    bpp_action: NONE
    bap_reads_this: true
    bpp_reads_this: true
    ds_action: SEND
    corrected_description: Discover Service pushes matching BPP catalogs to the BAP. Triggered when a BPP publishes or updates their catalog on the Catalogue Service and the update matches an active BAP
      subscription. BAP receives this and updates its local catalog store / search index.
    bap_note: You receive this at your /on_discover callback URL. Parse the catalog, update your local index, make it searchable for consumers. This is NOT a response to a consumer search — it is a push
      from the network.
    bpp_note: BPP does NOT send /on_discover. BPP publishes to the Catalogue Service via /publish_catalog. The Discover Service handles delivery to BAPs automatically.
  - api: select
    direction: BAP → BPP
    mandatory: true
    description: 'Consumer has completed customisation choices. BAP sends selected resource ID + complete customisation selections. BPP computes final price including PPN 11%.

      '
    bap_sends:
      required:
      - context (with same transaction_id)
      - message.order.provider.id
      - message.order.items[]
      - message.order.fulfillments[].type
      - message.order.fulfillments[].end.location.gps
      optional:
      - message.order.items[].customisations[]
    select_notes:
    - Each item must carry the complete customisation path — parent resource ID + all group selections
    - Addon quantities declared here — e.g. 2× extra cheese
    - BAP does not declare which FC fulfils — that is BPP-internal
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_select
    direction: BPP → BAP
    mandatory: true
    description: 'BPP returns quoted price breakup. PPN 11% computed and declared as a separate consideration line. Preparation time estimated. Cancellation policy IRI included.

      '
    bpp_returns:
    - message.order.quote.price
    - message.order.quote.breakup[]
    - message.order.items[]
    - message.order.fulfillments[]
    - message.order.cancellation_terms
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: init
    direction: BAP → BPP
    mandatory: true
    description: 'Consumer confirms intent to order. BAP sends delivery address, consumer identity (NIK optional, phone mandatory), and declares payment method.

      '
    bap_sends:
      required:
      - message.order.billing
      - message.order.fulfillments[].end.location
      - message.order.fulfillments[].end.contact
      - message.order.payment.type
      optional:
      - message.order.billing.tax_number
      - message.order.fulfillments[].end.instructions
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_init
    direction: BPP → BAP
    mandatory: true
    description: 'BPP confirms order can proceed. Returns payment terms including payment gateway URL or COD declaration. Final consideration locked.

      '
    bpp_returns:
    - message.order.payment
    - message.order.quote
    - message.order.fulfillments[]
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: confirm
    direction: BAP → BPP
    mandatory: true
    description: 'BAP confirms payment was committed (prepaid) or declares COD. Sends payment transaction reference for prepaid orders. This triggers FC assignment on the BPP side.

      '
    bap_sends:
      required:
      - message.order.payment.status
      - message.order.payment.transaction_id
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: true
  - api: on_confirm
    direction: BPP → BAP
    mandatory: true
    description: 'Contract created. BPP reveals fulfillingLocationId for the first time — which Dominos store will prepare and deliver this order. Central invoicing entity declared. Order ID assigned.

      '
    bpp_returns:
    - message.order.id
    - message.order.state
    - message.order.contractAttributes.fulfillingLocationId
    - message.order.contractAttributes.invoicingEntity
    - message.order.fulfillments[].state
    on_confirm_notes:
    - fulfillingLocationId appears HERE for the first time — never before
    - 'invoicingEntity carries {id: ''PT Sarimelati Kencana Tbk'', en: ''PT Sarimelati Kencana Tbk''}'
    - BAP should now display which store will fulfil (using store name from catalog)
    - Contract is now immutable — price and items locked
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true
  - api: status
    direction: BAP → BPP
    mandatory: false
    description: 'BAP polls for order state. BAP may call repeatedly. BPP returns current performance state. Rider details added at DISPATCHED.

      '
    bap_sends:
      required:
      - message.order_id
    consumer: BAP
    producer: BPP
    bap_action: SEND
    bpp_action: RECEIVE
    bap_reads_this: true
    bpp_reads_this: false
  - api: on_status
    direction: BPP → BAP
    mandatory: false
    description: 'BPP reports current performance state. State machine is Dominos-specific: PREPARING → QUALITY_CHECK → DISPATCHED → OUT_FOR_DELIVERY → DELIVERED. Rider identity added at DISPATCHED. Delivery
      proof URL added at DELIVERED.

      '
    performance_states:
    - state: PREPARING
      description: Store is making the order
      added_fields: []
    - state: QUALITY_CHECK
      description: Order boxed and quality-checked before dispatch
      added_fields: []
    - state: DISPATCHED
      description: Rider has picked up the order
      added_fields:
      - performanceAttributes.agentName
      - performanceAttributes.agentPhone
      - performanceAttributes.agentPhoto
      - performanceAttributes.trackingUrl
    - state: OUT_FOR_DELIVERY
      description: Rider is approaching consumer address
      added_fields:
      - performanceAttributes.estimatedDeliveryTime
    - state: DELIVERED
      description: Order delivered to consumer
      added_fields:
      - performanceAttributes.deliveryProofUrl
    consumer: BPP
    producer: BAP
    bap_action: RECEIVE
    bpp_action: SEND
    bap_reads_this: true
    bpp_reads_this: true

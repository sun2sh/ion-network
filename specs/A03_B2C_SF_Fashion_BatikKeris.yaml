resources:
- id: RES-FAS-KERIS-PARANG-S
  type: VARIANT
  descriptor:
    name: Batik Keris Kemeja Parang Kusumo Sogan — S
  resource_attributes:
    name:
      id: Kemeja Batik Parang Kusumo Sogan — Ukuran S
      en: Batik Keris Parang Kusumo Sogan Shirt — Size S
    short_desc:
      id: Kemeja batik pria motif parang kusumo dengan kain katun primisima
      en: Men's batik shirt with parang kusumo motif in primisima cotton
    long_desc:
      id: Kemeja batik pria Batik Keris bermotif Parang Kusumo Sogan, kain katun primisima merserize berkualitas tinggi. Motif
        parang adalah motif batik klasik Jawa yang melambangkan kekuatan dan ketangkasan. Warna sogan (cokelat keemasan) adalah
        warna khas batik Solo.
      en: Batik Keris men's batik shirt in Parang Kusumo Sogan motif, premium merserized primisima cotton. The Parang motif
        is a classic Javanese batik pattern symbolising strength and agility. Sogan (golden brown) is the signature colour
        of Solo batik.
    images:
    - https://cdn.batikkeris.co.id/parang-kusumo-sogan-s.jpg
    - https://cdn.batikkeris.co.id/parang-kusumo-sogan-detail.jpg
    sku: KERIS-PARANG-SOG-S
    resource_type: VARIANT
    parent_resource_id: RES-FAS-KERIS-PARANG-BASE
    is_default_variant: false
    gender: MALE
    category: APPAREL
    sub_category: KEMEJA_BATIK
    country_of_origin: IDN
    maker_city: Surakarta
    batik_motif:
      name:
        id: Parang Kusumo Sogan
        en: Parang Kusumo Sogan
      description:
        id: Motif parang klasik Jawa dengan pewarna sogan khas Solo. Parang melambangkan keteguhan dan keberanian.
        en: Classic Javanese parang motif with Solo's signature sogan dye. Parang symbolises steadfastness and courage.
      technique: CAP_TULIS
    fabric_composition: 100% Katun Primisima Merserize
    care_instructions:
      id: Cuci manual dengan air dingin menggunakan lerak atau detergen batik. Jangan merendam. Hindari pemutih. Jemur dalam
        keadaan terbalik dan hindari sinar matahari langsung.
      en: Hand wash in cold water with batik-specific detergent. Do not soak. No bleach. Hang inside-out away from direct
        sunlight.
    fit_type: REGULAR

validation:
  bpp_rules:
  - rule: kementan_pd_registration must be declared for agricultural produce
    error: ION-5050 — Missing Kementan PD registration for agricultural product
    regulatory: Permentan No. 56/2015 tentang Produksi, Sertifikasi dan Peredaran Benih
  - rule: 'produce_grade must be one of: PREMIUM, GRADE_I, GRADE_II'
    error: ION-5051 — Invalid produce grade
  - rule: milling_date must be declared for rice and grain products (freshness signal)
    error: ION-5052 — Missing milling date
  - rule: unit_of_measure is mandatory for weight-based agricultural products
    error: ION-5053 — Missing unit of measure
  - rule: PPN must be declared at 0% for sembako items (beras, jagung, kedelai, gula, dll) per PP 49/2022. TAX_PPN line must be omitted or declared at 0.
    error: ION-5054 — Incorrect PPN applied to PPN-exempt agricultural produce
    regulatory: PP 49/2022 tentang PPN atas Barang Kebutuhan Pokok
  bap_rules:
  - rule: BAP must display milling_date as freshness indicator for rice products
    note: Consumer trust signal — stale milling date reduces purchase confidence
  - rule: BAP must display produce_grade prominently
  - rule: BAP must display origin_region — Cianjur Pandan Wangi has GI significance
_resources_role:
  declared_by: BPP
  consumed_by: BAP
  appears_in:
  - on_discover
  note: BPP declares all available resources. BAP renders the catalog/menu.
_offers_role:
  declared_by: BPP
  consumed_by:
  - BAP
  - ION
  appears_in:

consideration:
  currency: IDR
  ppn_rate: 0.11
  ppn_basis: ITEM_SUBTOTAL
  line_types:
  - type: ITEM
    mandatory: true
    description: Base price of ordered resource + sum of priceDelta values for all customisation selections
    who_absorbs: SELLER
    example_value: 159000
  - type: DELIVERY
    mandatory: conditional
    condition: Present when fulfillment.type = DELIVERY. Absent for SELF_PICKUP.
    description: Delivery charge computed by BPP from consumer distance. Dominos charges flat Rp 15,000 within 3km, Rp 20,000
      beyond 3km.
    who_absorbs: BUYER
    example_value: 15000
  - type: HANDLING
    mandatory: false
    description: Packaging or handling surcharge — Dominos does not currently charge separately
    who_absorbs: SELLER
  - type: TAX_PPN
    mandatory: true
    description: 'PPN 11% on item subtotal. Computed at on_select. Declared as separate line. Regulatory basis: UU 7/2021
      Harmonisasi Perpajakan.'
    rate: 0.11
    regulatory_source: UU HPP No. 7/2021; PMK 60/2022
    who_absorbs: BUYER
    example_value: 22990
  - type: PROVIDER_BENEFIT
    mandatory: false
    description: Seller-funded discount — e.g. promotional pizza at special price. Reduces item line value.
    who_absorbs: SELLER
  - type: BUYER_BENEFIT
    mandatory: false
    description: BAP-funded voucher or promo. Hidden from seller unless collectedBy=SELLER (COD). Reduces consumer-facing
      total.
    who_absorbs: BAP
  _role:
    declared_by: BPP
    consumed_by:
    - BAP
    - ION
    appears_in:
    - on_select
    - on_init
    - on_confirm
    note: BPP computes and declares price breakup. ION validates PPN declaration. BAP renders to consumer.
performance:
  fulfilment_type: BPP_SELF_FULFILMENT
  lsp_involved: false
  rider_type: Dominos own delivery staff
  states:
  - state: PENDING
    when: Immediately after on_confirm. Order received, not yet started.
    required_fields: []
    optional_fields: []
  - state: PREPARING
    when: Store has started making the order.
    required_fields: []
    optional_fields:
    - performanceAttributes.estimatedDeliveryTime
  - state: QUALITY_CHECK
    when: Order complete, being boxed and checked.
    required_fields: []
    optional_fields: []
  - state: DISPATCHED
    when: Rider has picked up the order and left the store.
    required_fields:
    - performanceAttributes.agentName
    - performanceAttributes.agentPhone
    - performanceAttributes.trackingUrl
    optional_fields:
    - performanceAttributes.agentPhoto
    - performanceAttributes.estimatedDeliveryTime
  - state: OUT_FOR_DELIVERY
    when: Rider approaching consumer address.
    required_fields:
    - performanceAttributes.estimatedDeliveryTime
    optional_fields: []
  - state: DELIVERED
    when: Order handed to consumer.
    required_fields:
    - performanceAttributes.deliveryProofUrl
    optional_fields:
    - performanceAttributes.deliveryOtp
  _role:
    declared_by: BPP
    consumed_by: BAP
    appears_in:
    - on_status
    - on_update
    note: BPP updates performance state. BAP renders tracking UI to consumer.
contract:
  created_at: on_confirm
  immutable_after: on_confirm
  attributes:
  - name: fulfillingLocationId
    description: ID of the Dominos store that will fulfil this order. BPP selects internally based on consumer GPS. First
      appears in on_confirm only.
    example: STORE-JKT-KEMANG-01
    mandatory: true
    appears_at: on_confirm
  - name: invoicingModel
    value: CENTRAL
    description: All Dominos Indonesia orders invoiced centrally by PT Sarimelati Kencana regardless of which store fulfils.
    mandatory: true
  - name: invoicingEntity
    description: Legal entity issuing the tax invoice (Faktur Pajak).
    value:
      id: PT Sarimelati Kencana Tbk
      en: PT Sarimelati Kencana Tbk
    mandatory: true
  - name: nib
    value: '9120105811526'
    description: Nomor Induk Berusaha — PT Sarimelati Kencana. 13-digit OSS registration.
    mandatory: true
  - name: npwp
    value: 01234567891234
    description: NPWP 16-digit post-2024 format — PT Sarimelati Kencana.
    regulatory_source: PMK 136/2023 — 16-digit NPWP format effective 1 July 2024
    mandatory: true
  _role:
    declared_by: BPP
    consumed_by:
    - BAP
    - ION
    appears_in:
    - on_confirm
    note: BPP creates contract at on_confirm. Contains fulfillingLocationId (first appearance here).
settlement:
  basis: AFTER_DELIVERY
  window: PT24H
  payment_rails_supported:
  - BI_FAST
  - QRIS
  - VIRTUAL_ACCOUNT
  - COD
  reconciliation:
    method: ION_CENTRAL
    batch: DAILY
    _status: v0.2-in-development
  _role:
    declared_by: BPP
    consumed_by: ION
    appears_in:
    - on_confirm
    note: BPP declares settlement terms. ION Central orchestrates the money movement.

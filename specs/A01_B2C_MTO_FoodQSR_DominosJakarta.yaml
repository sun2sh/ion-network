field_reference:
  context_fields:
  - field: context.domain
    value: ion:trade:food-qsr
    layer: tier-1-transport
    note: ION domain code for food and QSR
  - field: context.location.gps
    format: lat,lon decimal — e.g. -6.261000,106.815000
    layer: tier-1-transport
    note: Consumer GPS for BPP polygon matching
  - field: context.currency
    value: IDR
    layer: tier-1-transport
    mandatory: always
  provider_fields:
  - field: Provider.id
    description: Unique store identifier — one per FC
    example: STORE-JKT-KEMANG-01
    layer: tier-2-core
  - field: Provider.availableAt[].geo
    type: GeoJSONGeometry (RFC 7946)
    valid_types:
    - Polygon
    - MultiPolygon
    layer: tier-2-core
    note: Beckn v2.0 NATIVE field. Use Polygon not Point.
  - field: providerAttributes.storeStatus
    type: enum
    values:
    - OPEN
    - TEMPORARILY_CLOSED
    - DISABLED
    layer: tier-3-sector
  - field: providerAttributes.operatingHours
    type: array of {type, dayFrom, dayTo, timeFrom, timeTo}
    note: 1=Monday 7=Sunday. Time in HHMM 24h.
    layer: tier-3-sector
  - field: providerAttributes.averagePreparationTime
    type: ISO 8601 duration
    example: PT25M
    layer: tier-3-sector
  - field: providerAttributes.invoicingModel
    type: enum
    values:
    - CENTRAL
    - PER_FULFILMENT_CENTRE
    layer: tier-3-sector
    note: CENTRAL = one invoice from brand entity for all stores
  - field: providerAttributes.invoicingEntity
    type: language object {id, en}
    example: '{"id": "PT Sarimelati Kencana Tbk", "en": "PT Sarimelati Kencana Tbk"}'
    layer: tier-3-sector
  - field: providerAttributes.nibRegistered
    type: boolean
    layer: tier-3-sector
    note: Trust signal — NIB validated at ION onboarding
  resource_fields:
  - field: descriptor.name
    description: Bahasa Indonesia primary string — BAP renders this
    layer: tier-2-core
    note: MUST match resourceAttributes.name.id exactly
  - field: resourceAttributes.name
    type: language object {id, en, ...}
    layer: tier-3-ion-core
    note: id key mandatory. en mandatory for export. id MUST match descriptor.name.
  - field: resourceAttributes.resourceType
    type: enum
    values:
    - PLAIN
    - VARIANT
    - WITH_EXTRAS
    - COMPOSED
    layer: tier-3-sector
    note: COMPOSED = assembled at order time from mandatory choices (pizza)
  - field: resourceAttributes.dietaryClassification
    type: enum
    values:
    - VEG
    - NON_VEG
    - HALAL
    - VEGAN
    layer: tier-3-sector
    regulatory: BPOM PerBPOM No. 22/2019
  - field: resourceAttributes.allergens
    type: array of enum
    values:
    - GLUTEN
    - CRUSTACEAN
    - EGG
    - FISH
    - PEANUT
    - SOY
    - MILK
    - TREE_NUT
    - SESAME
    layer: tier-3-sector
    regulatory: BPOM PerBPOM No. 22/2019 — mandatory declaration if present
  - field: resourceAttributes.halalCertNumber
    type: string
    example: ID00110002981021
    layer: tier-3-ion-core
    regulatory: MUI (Majelis Ulama Indonesia) halal certification
    mandatory: conditional — required when dietaryClassification=HALAL
  - field: resourceAttributes.customisationGroups
    type: array of customisation group objects
    layer: tier-3-sector
    note: Typed array — BAP renders directly without tag parsing
  - field: customisationGroups[].selectionType
    type: enum
    values:
    - SINGLE_REQUIRED
    - SINGLE_OPTIONAL
    - MULTIPLE_OPTIONAL
    - FIXED
    note: SINGLE_REQUIRED = mandatory — BAP must enforce before /select
  - field: customisationGroups[].options[].priceDelta
    type: integer (IDR)
    note: Final item price = base_offer_price + sum(all selected priceDelta values)
  offer_fields:
  - field: offerAttributes.cancellationPolicy
    type: IRI string
    example: ion://policy/cancel.none
    layer: tier-3-ion-core
    note: Machine-enforceable — ION Central enforces from IRI
  - field: offerAttributes.returnPolicy
    type: IRI string
    example: ion://policy/return.none
    layer: tier-3-ion-core
  - field: offerAttributes.disputePolicy
    type: IRI string
    example: ion://policy/dispute.consumer.bpsk
    layer: tier-3-ion-core
    note: BPSK = Badan Penyelesaian Sengketa Konsumen
  - field: offerAttributes.cancellable
    type: boolean
    layer: tier-3-sector
    note: UI HINT ONLY for BAP show/hide cancel button. Must be consistent with cancellationPolicy IRI.
  - field: offerAttributes.displayLanguage
    type: array of ISO 639-1 codes
    example: '["id", "en"]'
    layer: tier-3-ion-core
  contract_fields:
  - field: contractAttributes.fulfillingLocationId
    type: string
    example: STORE-JKT-KEMANG-01
    mandatory: true
    appears_at: on_confirm
    layer: tier-3-sector
    note: 'CRITICAL: First and only appearance is in on_confirm. Never in catalog, never in on_select, never in on_init.'
  - field: contractAttributes.invoicingModel
    type: enum
    values:
    - CENTRAL
    - PER_FULFILMENT_CENTRE
    layer: tier-3-sector
  - field: contractAttributes.invoicingEntity
    type: language object {id, en}
    layer: tier-3-sector
  - field: contractAttributes.nib
    type: string
    pattern: ^[0-9]{13}$
    example: '9120105811526'
    layer: tier-3-ion-core
    regulatory: PP 5/2021 — OSS NIB
  - field: contractAttributes.npwp
    type: string
    pattern: ^[0-9]{16}$
    example: 01234567891234
    layer: tier-3-ion-core
    regulatory: PMK 136/2023 — 16-digit NPWP format
  performance_fields:
  - field: performanceAttributes.agentName
    type: string
    appears_at: DISPATCHED state
    layer: tier-3-sector
  - field: performanceAttributes.agentPhone
    type: string
    format: ^[0-9]{10,13}$
    appears_at: DISPATCHED state
    layer: tier-3-sector
  - field: performanceAttributes.trackingUrl
    type: string (URI)
    appears_at: DISPATCHED state
    layer: tier-3-sector
  - field: performanceAttributes.deliveryProofUrl
    type: string (URI)
    appears_at: DELIVERED state
    layer: tier-3-sector
  consideration_fields:
  - field: quote.breakup[].type
    type: enum
    values:
    - ITEM
    - DELIVERY
    - HANDLING
    - TAX_PPN
    - PROVIDER_BENEFIT
    - BUYER_BENEFIT
    layer: tier-3-sector
    note: TAX_PPN = PPN 11% on item subtotal. Declared as a typed consideration line.
validation:
  bap_rules:
  - rule: BAP must not send provider preference or FC preference in /discover
    error: ION-4001 — Invalid field in discover intent
  - rule: BAP must send complete customisation path for COMPOSED resources in /select. Missing SINGLE_REQUIRED group = NACK
    error: ION-4010 — Missing mandatory customisation group selection
  - rule: All customisation group selections must reference valid option IDs from the catalog
    error: ION-4011 — Invalid customisation option ID
  - rule: BAP must not display or use fulfillingLocationId before receiving on_confirm
    error: Guidance only — not a protocol error but a BAP UX violation
  - rule: Consumer GPS in /discover and /select must be WGS-84 format [lat,lon] with minimum 6 decimal places
    error: ION-4002 — Invalid GPS format
  - rule: Currency in context must be IDR for domestic ION Trade transactions
    error: ION-4003 — Unsupported currency for domestic transaction
  bpp_rules:
  - rule: BPP must perform point-in-polygon check. Only return providers whose serviceability polygon contains consumer GPS.
    error: ION-5001 — Provider returned outside serviceability polygon
  - rule: BPP must not include fulfillingLocationId in on_discover, on_select, or on_init responses
    error: ION-5002 — Premature FC disclosure
  - rule: fulfillingLocationId in on_confirm must be a valid store ID that was present in the on_discover response
    error: ION-5003 — Unknown fulfillingLocationId
  - rule: BPP must compute PPN 11% at on_select and declare as a separate TAX_PPN line in quote.breakup
    error: ION-5010 — Missing PPN declaration
  - rule: PPN is computed on item subtotal only — not on delivery charge
    error: ION-5011 — Incorrect PPN basis
  - rule: halalCertNumber is mandatory on all resources where dietaryClassification=HALAL
    error: ION-5020 — Missing halal cert for HALAL classified resource
  - rule: storeStatus=TEMPORARILY_CLOSED stores must not appear in on_discover responses unless temporaryClosureEnd has passed
    error: ION-5030 — Closed store returned in catalog
  - rule: invoicingModel=CENTRAL requires invoicingEntity to be present in both on_discover providerAttributes and on_confirm
      contractAttributes
    error: ION-5040 — Missing invoicingEntity for CENTRAL invoicing model

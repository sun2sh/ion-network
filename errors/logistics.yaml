    sender: BPP
    usedIn: on_init
    recovery: Provide valid fumigation certificate from ISPM 15 registered facility

  ION-LOG-6408:
    type: FUMIGATION_CERTIFICATE_INVALID
    message: Fumigation certificate fails ISPM 15 validation
    sender: BPP
    usedIn: on_init
    recovery: Re-fumigate at registered facility; obtain new certificate

  ION-LOG-6409:
    type: INATRADE_PERMIT_REQUIRED
    message: Regulated product requires INATRADE permit not declared
    sender: BPP
    usedIn: on_init
    recovery: Obtain permit from relevant ministry; resubmit with permit reference

  ION-LOG-6410:
    type: LARTAS_RESTRICTED_GOODS
    message: Goods are on LARTAS restricted list; additional permits required
    sender: BPP
    usedIn: on_select, on_init
    recovery: Review LARTAS requirements; obtain permits before proceeding

  ION-LOG-6411:
    type: PHYTOSANITARY_CERTIFICATE_REQUIRED
    message: Agricultural product requires phytosanitary certificate from Karantina
    sender: BPP
    usedIn: on_init
    recovery: Obtain phytosanitary certificate; resubmit

  # RORO (additional)
  ION-LOG-6505:
    type: VEHICLE_OVERWEIGHT_REFUSED
    message: Vehicle weight exceeds vessel/trailer capacity; boarding refused at port
    sender: BPP
    usedIn: on_status[CHECKED_IN]
    recovery: Transfer to larger vessel sailing or cancel

  # WAREHOUSE (additional)
  ION-LOG-6605:
    type: BONDED_WAREHOUSE_TRANSFER_PENDING
    message: Inventory is in bonded warehouse awaiting customs clearance before transfer-out
    sender: BPP
    usedIn: on_status, on_update
    recovery: Wait for clearance or initiate bonded-zone transfer

  ION-LOG-6606:
    type: INVENTORY_EXPIRED
    message: Inventory in storage has passed its expiry date and cannot be shipped
    sender: BPP
    usedIn: on_update (fulfilment request)
    recovery: Dispose of expired inventory; ship only unexpired stock

  ION-LOG-6607:
    type: INVENTORY_DISCREPANCY_UNRESOLVED
    message: Inbound discrepancy from prior receipt is unresolved
    sender: BPP
    usedIn: on_status
    recovery: Resolve discrepancy via exception branch before new operations

  # INCIDENT (7xxx domain — NEW)
  ION-LOG-7001:
    type: INCIDENT_REPORTED
    message: Incident in transit; resolution pending
    sender: BPP
    usedIn: on_update
    recovery: See incident branch for resolution options

  ION-LOG-7002:
    type: DRIVER_SAFETY_STATUS_OVERDUE
    message: Driver safety status not reported within PT15M of incident
    sender: ION_NETWORK
    usedIn: internal
    recovery: BPP must report driver safety status immediately

  ION-LOG-7003:
    type: POLICE_REPORT_REQUIRED
    message: Incident type requires police report reference within P1D
    sender: BPP
    usedIn: on_update
    recovery: Obtain police report; update with reference

  ION-LOG-7004:
    type: FORCE_MAJEURE_DECLARED
    message: Force majeure declared; SLA penalties waived
    sender: BPP
    usedIn: on_update
    description: Informational — affects SLA rebate calculations

  # PARTICIPANT AND ROLE (6800 domain — NEW)
  ION-LOG-6801:
    type: REQUIRED_ROLE_MISSING
    message: Spine requires a participant role that was not provided
    sender: BPP
    usedIn: on_init, on_confirm
    recovery: Add required participant with appropriate role per spine spec

  ION-LOG-6802:
    type: ROLE_SUBSCRIBER_MISMATCH
    message: Participant role and subscriber type are inconsistent
    sender: BPP
    usedIn: on_init
    recovery: Ensure subscriber registered type matches declared role

  ION-LOG-6803:
    type: CUSTOMS_BROKER_REQUIRED
    message: LOG-XB requires CUSTOMS_BROKER participant
    sender: BPP
    usedIn: on_init
    recovery: Add PPJK-licensed customs broker to participants

  ION-LOG-6804:
    type: PPJK_LICENCE_INVALID
    message: Customs broker's PPJK licence is invalid or expired
    sender: BPP
    usedIn: on_init
    recovery: Renew PPJK licence with Bea Cukai; or use different broker

  ION-LOG-6805:
    type: DRIVER_DETAILS_REQUIRED
    message: LOG-RORO requires DRIVER participant with SIM details
    sender: BPP
    usedIn: on_init
    recovery: Add driver details including SIM number and category

  ION-LOG-6806:
    type: UNDERWRITER_REQUIRED
    message: Insurance premium declared but no UNDERWRITER participant provided
    sender: BPP
    usedIn: on_init
    recovery: Add UNDERWRITER participant with insurer details

  # AUTH AND REGISTRY (93xx domain — NEW)
  ION-LOG-9301:
    type: SUBSCRIBER_NOT_REGISTERED
    message: Subscriber ID not found in ION Registry
    sender: ION_NETWORK
    usedIn: any request
    recovery: Complete ION subscriber registration

  ION-LOG-9302:
    type: SUBSCRIBER_SUSPENDED
    message: Subscriber is suspended; transactions blocked
    sender: ION_NETWORK
    usedIn: any request
    recovery: Contact ION support to resolve suspension

  ION-LOG-9303:
    type: KEY_ROTATION_OVERLAP_INSUFFICIENT
    message: Signing key rotation overlap less than required 30 days
    sender: ION_NETWORK
    usedIn: key publication
    recovery: Extend overlap period before invalidating old key

  ION-LOG-9304:
    type: CALLBACK_URL_UNREACHABLE
    message: Callback URL in subscriber record is not reachable
    sender: ION_NETWORK
    usedIn: health check
    recovery: Update callback URL in subscriber registry

  # PAYMENT (new domain additions)
  ION-LOG-6901:
    type: PAYMENT_METHOD_NOT_SUPPORTED
    message: Declared payment method not supported by this BPP for this offer
    sender: BPP
    usedIn: on_init
    recovery: Check offer payment methods; choose supported method

  ION-LOG-6902:
    type: COD_LIMIT_EXCEEDED_SHIPMENT
    message: COD amount exceeds per-shipment limit declared in offer
    sender: BPP
    usedIn: on_select, on_init
    recovery: Reduce COD amount or split into multiple shipments

  ION-LOG-6903:
    type: COD_LIMIT_EXCEEDED_DAILY
    message: Consignee daily COD limit would be exceeded
    sender: BPP
    usedIn: on_init
    recovery: Wait for next day or use prepaid method

  ION-LOG-6904:
    type: PAYMENT_GATEWAY_FAILURE
    message: Payment gateway declined the transaction
    sender: BPP
    usedIn: on_init, on_confirm
    recovery: Retry or use alternative payment method

  ION-LOG-6905:
    type: PAYMENT_VERIFICATION_TIMEOUT
    message: Payment verification did not complete within window
    sender: BPP
    usedIn: on_confirm
    recovery: Payment is held; check status and retry confirm

  ION-LOG-6906:
    type: CREDIT_LIMIT_EXCEEDED
    message: FWA credit limit would be exceeded by this transaction
    sender: BPP
    usedIn: on_init
    recovery: Settle pending invoices; wait for credit to free; or amend FWA

  # SUSTAINABILITY (informational)
  ION-LOG-8001:
    type: CARBON_REPORTING_REQUIRED
    message: FWA requires carbon reporting but report missing from on_status[DELIVERED]
    sender: ION_NETWORK
    usedIn: validation
    recovery: Ensure sustainabilityReport is populated per FWA scope

  # AUTH / SIGNATURE (additional Beckn 2.0 conformance)
  ION-LOG-9006:
    type: COUNTER_SIGNATURE_MISSING_OR_INVALID
    message: Ack response body missing valid CounterSignature (Beckn 2.0 mandatory)
    sender: ANY
    usedIn: Ack response
    recovery: Include valid CounterSignature per Beckn 2.0 CounterSignature schema

  ION-LOG-9007:
    type: KEYID_FORMAT_INVALID
    message: keyId does not follow Beckn 2.0 format {subscriberId}|{uniqueKeyId}|{algorithm}
    sender: ANY
    usedIn: NACK on any endpoint
    recovery: Use pipe-separated triple keyId format

  ION-LOG-9008:
    type: CONTEXT_VERSION_INVALID
    message: context.version is not exactly "2.0.0" (Beckn 2.0 const requirement)
    sender: ANY
    usedIn: NACK on any endpoint
    recovery: Set context.version to "2.0.0"

  ION-LOG-9009:
    type: JSONLD_MISSING_IN_ATTRIBUTES
    message: Extension Attributes payload missing required @context or @type
    sender: ANY
    usedIn: NACK on any endpoint
    recovery: Include @context (URI) and @type (IRI) in every Attributes block

  # ION EXTENSION ENDPOINT MARKERS (informational)
  ION-LOG-9101:
    type: ION_EXTENSION_ENDPOINT_CALLED
    message: "Informational: /raise or /reconcile is an ION protocol extension, not Beckn 2.0 core"
    sender: ION_GATEWAY
    usedIn: documentation
    description: Non-error informational code to mark extension endpoint usage

  # RTS HANDOFF (cross-BPP warehouse-to-transport)
  ION-LOG-6108:
    type: RTS_HANDOFF_TIMEOUT
    message: Transport BPP did not acknowledge RTS signal within policy window (default PT15M)
    sender: ION_GATEWAY
    usedIn: on_update, on_status
    recovery: Warehouse BPP and BAP notified; manual intervention may be required; check transport BPP availability

  ION-LOG-6109:
    type: UNAUTHORISED_CROSS_BPP_RTS
    message: Warehouse BPP is not registered as dispatch origin for this transport contract
    sender: ION_GATEWAY
    usedIn: on_status cross-BPP routing
    recovery: Register dispatch relationship between warehouse BPP and transport BPP via FWA or ION Registry

  ION-LOG-6110:
    type: RTS_HANDOFF_EVIDENCE_MISMATCH
    message: Transport BPP denies receipt of RTS signal despite warehouse BPP confirmation
    sender: TRANSPORT_BPP
    usedIn: on_status, /raise
    recovery: Escalate via /raise with category ESCALATION_GENERAL_COMMERCIAL; evidence determines liability

  # CUT-OFF (new domain markers)
  ION-LOG-6111:
    type: CUTOFF_MISSED
    message: Cut-off deadline missed; late-acceptance policy applies
    sender: BPP
    usedIn: on_init, on_confirm, on_update
    recovery: Per offer.cutoffs[].lateAcceptancePolicy — REJECT, NEXT_SAILING_OR_FLIGHT, or accept with late fee

  ION-LOG-6112:
    type: CUTOFF_APPROACHING
    message: Approaching cut-off deadline; informational alert
    sender: BPP
    usedIn: on_status
    description: Informational. Raised when currentStateTimingStatus crosses alertThresholdDuration

  # STATE TIMING (new domain markers)
  ION-LOG-6121:
    type: STATE_DWELL_AT_RISK
    message: State dwell approaching commitment threshold
    sender: BPP
    usedIn: on_status
    description: Informational. For BAP dispatch dashboards

  ION-LOG-6122:
    type: STATE_DWELL_BREACHED
    message: State dwell exceeded maximum commitment
    sender: BPP
    usedIn: on_status, on_update
    recovery: Per offer.stateTimingCommitments[].alertPolicyIri; may trigger support or raise escalation

  ION-LOG-6123:
    type: STATE_CASCADE_BREACH_LIKELY
    message: Current state dwell breach will likely cascade to SLA breach
    sender: BPP
    usedIn: on_status
    recovery: BAP may proactively invoke cancellation or expedite alternatives

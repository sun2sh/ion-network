# ION Logistics Error Registry v1
# errors/logistics.yaml
# Machine-readable error codes for all logistics spines and branches.
# Structure mirrors Trade errors. Each code carries type, sender, description, and recovery path.

version: "1.0.0"
sector: B
lastUpdated: "2026-04-22"

errors:

  # ─── SERVICEABILITY ───────────────────────────────────────────
  ION-LOG-6001:
    type: SERVICEABILITY_PICKUP
    message: Pickup location not serviceable by this provider
    sender: BPP
    usedIn: on_select, on_init
    recovery: BAP must find alternative LSP or adjust pickup address

  ION-LOG-6002:
    type: SERVICEABILITY_DELIVERY
    message: Delivery location not serviceable by this provider
    sender: BPP
    usedIn: on_select, on_init
    recovery: BAP must find alternative LSP or adjust delivery address

  ION-LOG-6003:
    type: CAPACITY_UNAVAILABLE
    message: Capacity not available on requested date or route
    sender: BPP
    usedIn: on_select
    recovery: Retry with alternative date or alternative LSP

  ION-LOG-6004:
    type: QUOTE_EXPIRED
    message: Catalog quote validity window elapsed — re-quote required
    sender: BPP
    usedIn: on_init
    recovery: Call /select again to get fresh binding quote

  ION-LOG-6005:
    type: RATE_CHANGED
    message: Actual rate differs from catalog due to surge or zone change
    sender: BPP
    usedIn: on_init
    recovery: Call /select to get surge-adjusted rate; BAP must re-confirm

  ION-LOG-6006:
    type: WEIGHT_EXCEEDS_MAX
    message: Declared weight exceeds provider maximum for this service
    sender: BPP
    usedIn: on_select
    recovery: Use LOG-FREIGHT spine or find alternative LSP

  ION-LOG-6007:
    type: DIMENSIONS_EXCEEDS_MAX
    message: Declared dimensions exceed provider maximum for this service
    sender: BPP
    usedIn: on_select
    recovery: Use LOG-FREIGHT spine or find alternative LSP

  ION-LOG-6008:
    type: HAZMAT_NOT_SUPPORTED
    message: Provider does not support hazardous materials for this service
    sender: BPP
    usedIn: on_select
    recovery: Find a hazmat-certified LSP

  ION-LOG-6009:
    type: COLD_CHAIN_NOT_SUPPORTED
    message: Provider does not support cold chain for this service or corridor
    sender: BPP
    usedIn: on_select
    recovery: Find a cold-chain-certified LSP for this corridor

  ION-LOG-6010:
    type: COD_NOT_AVAILABLE
    message: COD not available for this corridor or service level
    sender: BPP
    usedIn: on_select
    recovery: Select prepaid payment method or find alternate LSP with COD

  ION-LOG-6011:
    type: DECLARED_VALUE_EXCEEDS_MAX
    message: Declared value exceeds provider maximum insurable value
    sender: BPP
    usedIn: on_select
    recovery: Reduce declared value or find provider with higher coverage

  # ─── eKYC ─────────────────────────────────────────────────────
  ION-LOG-6101:
    type: EKYC_NPWP_NOT_FOUND
    message: NPWP not found or inactive in DJP registry
    sender: BPP
    usedIn: on_init
    recovery: Verify NPWP with DJP; re-submit with valid NPWP

  ION-LOG-6102:
    type: EKYC_NIB_INVALID
    message: NIB (Nomor Induk Berusaha) invalid or expired
    sender: BPP
    usedIn: on_init
    recovery: Renew NIB via OSS; re-submit

  ION-LOG-6103:
    type: EKYC_PENDING_MANUAL_REVIEW
    message: eKYC submitted; pending manual review by provider
    sender: BPP
    usedIn: on_init
    recovery: Await unsolicited on_init with final eKYC status

  ION-LOG-6104:
    type: EKYC_SIGNATORY_MISMATCH
    message: Authorised signatory does not match registered entity records
    sender: BPP
    usedIn: on_init
    recovery: Provide correct authorised signatory per entity registration

  ION-LOG-6105:
    type: EKYC_REJECTED
    message: eKYC verification failed — transaction cannot proceed
    sender: BPP
    usedIn: on_init
    recovery: Contact BPP for manual resolution or register FWA via governed process

  # ─── WEIGHT AND DIMENSIONS ────────────────────────────────────
  ION-LOG-6201:
    type: WEIGHT_DISCREPANCY_RAISED
    message: Actual weight differs from declared by more than policy tolerance
    sender: BPP
    usedIn: on_update
    recovery: BAP accepts, counters with evidence, or escalates via /raise

  ION-LOG-6202:
    type: DIMENSION_DISCREPANCY_RAISED
    message: Actual dimensions differ from declared by more than policy tolerance
    sender: BPP
    usedIn: on_update
    recovery: BAP accepts, counters with evidence, or escalates via /raise

  # ─── ATTEMPTS AND NDR ─────────────────────────────────────────
  ION-LOG-5001:
    type: NO_ATTEMPTS_REMAINING
    message: Maximum delivery attempts reached — cannot reschedule
    sender: BPP
    usedIn: on_update
    recovery: Auto-RTO initiated per re-attempt policy

  ION-LOG-5002:
    type: ADDRESS_OUTSIDE_COVERAGE
    message: New delivery address is outside provider coverage area
    sender: BPP
    usedIn: on_update
    recovery: Provide address within coverage or initiate cancellation

  ION-LOG-5003:
    type: ZONE_CHANGE_NOT_ACCEPTED
    message: New address changes the delivery zone; re-quote not accepted within window
    sender: BPP
    usedIn: on_update
    recovery: Accept the re-quoted amount or initiate cancellation

  ION-LOG-5004:
    type: RESOLUTION_WINDOW_EXPIRED
    message: Buyer did not respond within the resolution window; auto-RTO initiated
    sender: BPP
    usedIn: on_update
    recovery: No recovery — RTO in progress

  # ─── CANCELLATION ─────────────────────────────────────────────
  ION-LOG-5101:
    type: CANCELLATION_WINDOW_CLOSED
    message: Cancellation not permitted after current performance state
    sender: BPP
    usedIn: on_cancel
    recovery: Cannot cancel — raise dispute if seller fault

  ION-LOG-5102:
    type: CANCELLATION_REASON_INVALID
    message: Cancellation reason code not in the offer's allowed reasons
    sender: BPP
    usedIn: on_cancel
    recovery: Provide valid reason per offer.cancellationPolicy

  ION-LOG-5103:
    type: CANCELLATION_FEE_APPLIES
    message: Cancellation is permitted but a fee applies per the cancellation policy
    sender: BPP
    usedIn: on_cancel
    description: Not an error — informational. Returned with cancellation confirmation.

  # ─── COLD CHAIN ───────────────────────────────────────────────
  ION-LOG-6301:
    type: TEMPERATURE_EXCURSION_DETECTED
    message: Shipment temperature went outside the declared range in transit
    sender: BPP
    usedIn: on_update
    recovery: BAP chooses CONTINUE_AT_BUYER_RISK, HOLD_FOR_INSPECTION, or CANCEL_AND_RETURN

  ION-LOG-6302:
    type: COLD_CHAIN_INTEGRITY_FAILED
    message: Cold chain integrity could not be verified at delivery
    sender: BPP
    usedIn: on_status[DELIVERED]
    recovery: Damage claim branch automatically eligible

  # ─── CUSTOMS (LOG-XB) ─────────────────────────────────────────
  ION-LOG-6401:
    type: EXPORT_CUSTOMS_HELD
    message: Shipment held by export customs — documentation required
    sender: BPP
    usedIn: on_status
    recovery: BAP provides required documentation via /update

  ION-LOG-6402:
    type: IMPORT_CUSTOMS_HELD
    message: Shipment held by Bea Cukai — documentation or inspection required
    sender: BPP
    usedIn: on_status
    recovery: BAP resolves via customs-hold branch (/update with resolution path)

  ION-LOG-6403:
    type: IMPORT_CUSTOMS_REJECTED
    message: Shipment rejected by Bea Cukai — cannot be imported
    sender: BPP
    usedIn: on_status
    recovery: BAP must choose RETURN_TO_ORIGIN, DESTROY_IN_PLACE, or RE_EXPORT

  ION-LOG-6404:
    type: HS_CODE_INVALID
    message: HS code provided does not match declared product category
    sender: BPP
    usedIn: on_init
    recovery: Provide correct HS code per customs tariff schedule

  ION-LOG-6405:
    type: RESTRICTED_GOODS_DETECTED
    message: Declared goods require import/export licence not provided
    sender: BPP
    usedIn: on_init
    recovery: Provide relevant import or export licence

  # ─── RO-RO ────────────────────────────────────────────────────
  ION-LOG-6501:
    type: SAILING_FULLY_BOOKED
    message: Requested sailing has no available vehicle slots
    sender: BPP
    usedIn: on_select
    recovery: Select alternative sailing time

  ION-LOG-6502:
    type: VEHICLE_CATEGORY_NOT_ACCEPTED
    message: Vehicle category not accepted on this sailing/route
    sender: BPP
    usedIn: on_select
    recovery: Check vessel vehicle categories; select appropriate route

  ION-LOG-6503:
    type: MISSED_SAILING
    message: Vehicle did not board before sailing departure
    sender: BPP
    usedIn: on_update
    recovery: BAP may rebook on next available sailing per missed-sailing policy

  # ─── WAREHOUSE ────────────────────────────────────────────────
  ION-LOG-6601:
    type: STORAGE_CAPACITY_UNAVAILABLE
    message: Requested storage capacity not available at the requested location
    sender: BPP
    usedIn: on_select
    recovery: Reduce storage volume or select alternative warehouse location

  ION-LOG-6602:
    type: INBOUND_DISCREPANCY
    message: Received inventory quantity differs from declared manifest
    sender: BPP
    usedIn: on_status[INBOUND_RECEIVED]
    recovery: BAP acknowledges discrepancy via /update

  ION-LOG-6603:
    type: SKU_NOT_IN_STORAGE
    message: Requested SKU for fulfilment not found in storage
    sender: BPP
    usedIn: on_update
    recovery: Check stock availability; update fulfilment request

  ION-LOG-6604:
    type: INBOUND_REJECTED_QC
    message: Inbound goods failed QC inspection; cannot be accepted into storage
    sender: BPP
    usedIn: on_status
    recovery: Goods returned to sender; BAP arranges collection

  # ─── FWA ──────────────────────────────────────────────────────
  ION-LOG-6701:
    type: FWA_EXPIRED
    message: Referenced Framework Agreement is no longer active
    sender: BPP
    usedIn: on_select, on_init
    recovery: Register a new FWA or transact on public catalog terms

  ION-LOG-6702:
    type: FWA_SCOPE_MISMATCH
    message: Transaction parameters are outside the scope of the referenced FWA
    sender: BPP
    usedIn: on_select, on_init
    recovery: Check FWA scope (spine, corridor, mode); amend or use public terms

  ION-LOG-6703:
    type: FWA_VOLUME_COMMITMENT_BREACH
    message: Monthly volume commitment under FWA not met in previous period
    sender: BPP
    usedIn: on_update (settlement cycle)
    recovery: Settle shortfall per FWA terms or negotiate amendment

  # ─── SCHEMA AND TRANSPORT ─────────────────────────────────────
  ION-LOG-9001:
    type: INVALID_REQUEST
    message: Request does not comply with ION Logistics API contract
    sender: BPP
    usedIn: NACK on any endpoint
    recovery: Check required fields per spine definition

  ION-LOG-9002:
    type: INVALID_SIGNATURE
    message: Request signature verification failed
    sender: BPP
    usedIn: NACK on any endpoint
    recovery: Check signing key rotation; re-sign request

  ION-LOG-9003:
    type: FEATURE_NOT_SUPPORTED
    message: Requested feature not supported by this provider
    sender: BPP
    usedIn: on_select, on_init
    recovery: Check provider catalog for supported capabilities

  ION-LOG-9004:
    type: POLICY_IRI_NOT_RECOGNISED
    message: Policy IRI referenced does not resolve to a ratified ION policy
    sender: BPP or ION_NETWORK
    usedIn: any update
    recovery: Use a ratified policy IRI from the ION policy registry

  ION-LOG-9005:
    type: CALLBACK_FAILED
    message: BPP could not deliver callback to BAP endpoint within TTL
    sender: ION_NETWORK
    usedIn: any callback
    recovery: BAP checks endpoint availability; may poll via /status

  # ─── NEW ERRORS (v1.1 additions) ─────────────────────────────

  # TAX AND INVOICE
  ION-LOG-6012:
    type: NPWP_MISMATCH
    message: NPWP declared in participants does not match NPWP on submitted invoice
    sender: BPP
    usedIn: on_init
    recovery: Ensure consignor NPWP matches the tax invoice NPWP

  ION-LOG-6013:
    type: FAKTUR_PAJAK_GENERATION_FAILED
    message: Could not generate Faktur Pajak via e-Faktur or Coretax
    sender: BPP
    usedIn: on_confirm, on_status[DELIVERED]
    recovery: Retry or use consolidated-monthly invoicing model

  ION-LOG-6014:
    type: NIB_INACTIVE_OR_SUSPENDED
    message: NIB is present in OSS registry but status is inactive or suspended
    sender: BPP
    usedIn: on_init
    recovery: Renew NIB via OSS; resubmit

  ION-LOG-6015:
    type: PPH23_WITHHOLDING_REQUIRED
    message: PPh 23 withholding required but not declared in payment
    sender: BPP
    usedIn: on_init
    recovery: Declare withholdingTax object with bukti potong details

  # ATTEMPTS AND ADDRESS
  ION-LOG-5005:
    type: ADDRESS_CHANGE_EXCEEDS_ZONE_DELTA
    message: New address is in a different zone; re-quote required with new amount
    sender: BPP
    usedIn: on_update
    recovery: Accept re-quoted amount or cancel

  ION-LOG-5006:
    type: RESCHEDULE_WINDOW_EXCEEDED
    message: Requested reschedule date exceeds policy-permitted window
    sender: BPP
    usedIn: on_update
    recovery: Choose a reschedule date within the policy window

  # CUSTOMS (additional)
  ION-LOG-6406:
    type: HS_CODE_CHANGE_DETECTED_IN_TRANSIT
    message: HS code correction required after shipment in transit; re-declaration needed
    sender: BPP
    usedIn: on_update
    recovery: Submit corrected declaration via customs-hold branch

  ION-LOG-6407:
    type: FUMIGATION_CERTIFICATE_REQUIRED

openapi: 3.1.1
info:
  title: ION Localization Extension (v1)
  description: "Bilingual and multilingual text fields for ION catalog content. Defines the language object pattern\
    \ used across all sectors. \"id\" (Bahasa Indonesia) is always mandatory. \"en\" (English) is mandatory for\
    \ export commerce patterns (XB spine).\nRELATIONSHIP TO BECKN DESCRIPTOR — Beckn's `Descriptor.name`, `Descriptor.shortDesc`,\
    \ `Descriptor.longDesc` are flat strings. ION does NOT override these. Implementations populate Beckn's flat\
    \ fields with the default-locale value (Bahasa Indonesia, `id`), and carry the full multilingual map inside\
    \ `resourceAttributes.localization` and `providerAttributes.localization`. Consumers that only read Beckn-native\
    \ fields see sensible Indonesian text; ION-aware consumers read the full map from the Attributes bag.\nATTACH\
    \ POINTS — Resource.resourceAttributes.localization,\n                Provider.providerAttributes.localization,\n\
    \                Offer.offerAttributes.localization (where applicable).\n"
  version: 1.0.0
components:
  schemas:
    LocalisedText:
      type: object
      title: Localised Text Object
      description: 'Language-keyed text object. Keys are ISO 639-1 language codes. "id" is always mandatory per
        ION network policy. "en" is mandatory for export commerce (XB pattern). Additional languages optional: ms
        (Malay), zh (Chinese), ar (Arabic), ta (Tamil), ko (Korean), ja (Japanese).

        '
      minProperties: 1
      additionalProperties:
        type: string
      properties:
        id:
          type: string
          description: Bahasa Indonesia — always required
        en:
          type: string
          description: English — required for XB pattern
        ms:
          type: string
          description: Bahasa Melayu
        zh:
          type: string
          description: Mandarin Chinese (Simplified)
        ar:
          type: string
          description: Arabic
        ta:
          type: string
          description: Tamil
        ko:
          type: string
          description: Korean
        ja:
          type: string
          description: Japanese
      example:
        id: Nasi Goreng Spesial
        en: Special Fried Rice
      required:
      - id
    IONCatalogLocalization:
      type: object
      title: ION Catalog Localization
      description: 'Localised text fields for catalog content — name, short description, long description. All three
        use the LocalisedText pattern. These extend beckn:descriptor fields with proper multilingual support.

        '
      additionalProperties: false
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:CatalogLocalization
      properties:
        name:
          $ref: '#/components/schemas/LocalisedText'
          description: 'Product or service name as a language object. Supplements Beckn `Descriptor.name` (which
            carries the default-locale text, normally `id`). Consumers that read only Beckn-native fields see Indonesian;
            ION-aware consumers read the multilingual map here. "id" always mandatory.

            '
          x-ion-regulatory: ION Network Policy — Bahasa Indonesia localisation requirement
        shortDesc:
          $ref: '#/components/schemas/LocalisedText'
          description: 'Short description for catalog listings and search results. Max 150 characters per language.
            Supplements Beckn `Descriptor.shortDesc`. "id" mandatory.

            '
          x-ion-regulatory: ION Network Policy — bilingual catalog requirement
        longDesc:
          $ref: '#/components/schemas/LocalisedText'
          description: 'Full product description for product detail page. Supplements Beckn `Descriptor.longDesc`.
            "id" mandatory. "en" mandatory for XB pattern.

            '
          x-ion-regulatory: ION Network Policy — Bahasa Indonesia localisation requirement
      required:
      - name
      - shortDesc

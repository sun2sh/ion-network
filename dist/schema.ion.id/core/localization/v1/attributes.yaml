openapi: 3.1.1
info:
  title: ION Localization Extension (v1)
  description: >
    Bilingual and multilingual text fields for ION catalog content.
    Defines the language object pattern used across all sectors.
    "id" (Bahasa Indonesia) is always mandatory.
    "en" (English) is mandatory for export commerce patterns (XB spine).

    RELATIONSHIP TO BECKN DESCRIPTOR — Beckn's `Descriptor.name`,
    `Descriptor.shortDesc`, `Descriptor.longDesc` are flat strings. ION does
    NOT override these. Implementations populate Beckn's flat fields with the
    default-locale value (Bahasa Indonesia, `id`), and carry the full
    multilingual map inside `resourceAttributes.localization` and
    `providerAttributes.localization`. Consumers that only read Beckn-native
    fields see sensible Indonesian text; ION-aware consumers read the full
    map from the Attributes bag.

    ATTACH POINTS — Resource.resourceAttributes.localization,
                    Provider.providerAttributes.localization,
                    Offer.offerAttributes.localization (where applicable).
  version: 1.0.0

components:
  schemas:

    LocalisedText:
      type: object
      title: Localised Text Object
      description: >
        Language-keyed text object. Keys are ISO 639-1 language codes.
        "id" is always mandatory per ION network policy.
        "en" is mandatory for export commerce (XB pattern).
        Additional languages optional: ms (Malay), zh (Chinese), ar (Arabic),
        ta (Tamil), ko (Korean), ja (Japanese).
      minProperties: 1
      additionalProperties:
        type: string
      properties:
        id:
          x-ion-mandatory: optional
          type: string
          description: Bahasa Indonesia — always required
        en:
          x-ion-mandatory: optional
          type: string
          description: English — required for XB pattern
        ms:
          x-ion-mandatory: optional
          type: string
          description: Bahasa Melayu
        zh:
          x-ion-mandatory: optional
          type: string
          description: Mandarin Chinese (Simplified)
        ar:
          x-ion-mandatory: optional
          type: string
          description: Arabic
        ta:
          x-ion-mandatory: optional
          type: string
          description: Tamil
        ko:
          x-ion-mandatory: optional
          type: string
          description: Korean
        ja:
          x-ion-mandatory: optional
          type: string
          description: Japanese
      required: [id]
      example:
        id: Nasi Goreng Spesial
        en: Special Fried Rice

    IONCatalogLocalization:
      type: object
      title: ION Catalog Localization
      description: >
        Localised text fields for catalog content — name, short description,
        long description. All three use the LocalisedText pattern.
        These extend beckn:descriptor fields with proper multilingual support.
      additionalProperties: false
      x-jsonld:
        "@context": ./context.jsonld
        "@type": ion:CatalogLocalization

      properties:

        name:
          $ref: "#/components/schemas/LocalisedText"
          description: >
            Product or service name as a language object. Supplements Beckn
            `Descriptor.name` (which carries the default-locale text, normally
            `id`). Consumers that read only Beckn-native fields see Indonesian;
            ION-aware consumers read the multilingual map here.
            "id" always mandatory.
          x-ion-mandatory: always
          x-ion-regulatory: ION Network Policy — Bahasa Indonesia localisation requirement

        shortDesc:
          $ref: "#/components/schemas/LocalisedText"
          description: >
            Short description for catalog listings and search results.
            Max 150 characters per language. Supplements Beckn `Descriptor.shortDesc`.
            "id" mandatory.
          x-ion-mandatory: always
          x-ion-regulatory: ION Network Policy — bilingual catalog requirement

        longDesc:
          $ref: "#/components/schemas/LocalisedText"
          description: >
            Full product description for product detail page. Supplements Beckn
            `Descriptor.longDesc`. "id" mandatory. "en" mandatory for XB pattern.
          x-ion-mandatory: optional
          x-ion-regulatory: ION Network Policy — Bahasa Indonesia localisation requirement

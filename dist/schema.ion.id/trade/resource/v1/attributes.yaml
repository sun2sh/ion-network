openapi: 3.1.1
info:
  title: ION Trade Resource Extension (v1)
  description: 'Trade sector resource attributes. Covers all physical product types on ION. Category-specific fields
    are conditional properties within this single schema. Availability model: stock count is NEVER transmitted.
    Only availability signal.

    '
  version: 1.0.0
components:
  schemas:
    LocalisedText:
      type: object
      description: Language-keyed text. "id" always required. "en" required for XB pattern.
      minProperties: 1
      additionalProperties:
        type: string
      properties:
        id:
          type: string
        en:
          type: string
      example:
        id: Nasi Goreng Spesial
        en: Special Fried Rice
      required:
      - id
    TradeResourceAttributes:
      type: object
      title: Trade Resource Attributes
      additionalProperties: true
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:TradeResourceAttributes
      x-beckn-attaches-to: Resource.resourceAttributes
      properties:
        quantity:
          type: object
          title: Quantity of this resource on the order line
          additionalProperties: false
          properties:
            value:
              type: number
              minimum: 0
              description: Numeric quantity — may be fractional for weight-based goods
            unit:
              type: string
              enum:
              - piece
              - pack
              - box
              - carton
              - kilogram
              - gram
              - litre
              - millilitre
              - subscription
              - voucher
              - topup
              description: Unit of measure appropriate to what is being ordered
          required:
          - value
          - unit
        resourceStructure:
          type: string
          enum:
          - PLAIN
          - VARIANT
          - WITH_EXTRAS
          - COMPOSED
          - BUNDLE
          description: 'PLAIN: single SKU, no choices. VARIANT: one of several pre-defined options of a parent.
            WITH_EXTRAS: base item with optional add-ons. COMPOSED: base with mandatory and optional customisation
            groups. BUNDLE: composite of multiple component resources (see bundleComposition).

            '
          example: COMPOSED
        resourceTangibility:
          type: string
          enum:
          - PHYSICAL
          - DIGITAL_VOUCHER
          - DIGITAL_TOP_UP
          - DIGITAL_SUBSCRIPTION
          description: 'PHYSICAL: tangible goods requiring logistics fulfilment. DIGITAL_VOUCHER: voucher code,
            gift card, in-game currency (delivered electronically). DIGITAL_TOP_UP: mobile pulsa, data package,
            utility bill top-up. DIGITAL_SUBSCRIPTION: time-bound digital subscription access.

            '
          example: PHYSICAL
        parentResourceId:
          type: string
          description: ID of parent resource. Present on VARIANT and WITH_EXTRAS.
          example: PIZZA-MARGHERITA
          x-ion-conditional: true
          x-ion-condition: Required when resourceStructure IN [VARIANT, WITH_EXTRAS]
        isDefaultVariant:
          type: boolean
          description: Whether this is the default variant shown to consumer.
          example: true
        variantGroup:
          type: object
          additionalProperties: false
          required:
          - id
          - name
          - variantOn
          properties:
            id:
              type: string
              example: VG-SIZE
            name:
              $ref: '#/components/schemas/LocalisedText'
            variantOn:
              type: string
              description: The attribute that varies. e.g. size, colour, storage
              example: size
        variantMatrix:
          type: object
          additionalProperties: false
          description: 'Multi-axis variant declaration. Use instead of explicit VARIANT resources when combinations
            are derivable. BPP MUST resolve the specific variant at on_select and compute final price via priceDeltaByCombination
            or per-axis priceDelta. Only valid on parent resources with resourceStructure=PLAIN; child VARIANT resources
            are not needed when this is declared.

            '
          required:
          - axes
          - combinationRules
          properties:
            axes:
              type: array
              minItems: 1
              maxItems: 6
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                    description: Axis identifier (size, color, storage, model, etc.)
                  label:
                    $ref: '#/components/schemas/LocalisedText'
                  values:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: string
                        label:
                          $ref: '#/components/schemas/LocalisedText'
                        priceDelta:
                          type: number
                          description: IDR delta for this axis value (signed)
                        available:
                          type: boolean
                          default: true
                          description: Whether this specific axis value is currently sellable
                        resourceIdOverride:
                          type: string
                          description: Optional mapping to an explicit VARIANT resource ID if this combination has
                            its own SKU
                      required:
                      - id
                required:
                - id
                - values
            combinationRules:
              type: object
              additionalProperties: false
              properties:
                generateAllCombinations:
                  type: boolean
                  description: If true, all permutations are valid. If false, combinations must be listed explicitly.
                explicitCombinations:
                  type: array
                  description: Required when generateAllCombinations=false. Each entry names axis-value pairs and
                    the resulting final price.
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      axisValues:
                        type: object
                        description: Map of axisId to valueId
                        additionalProperties:
                          type: string
                      priceValue:
                        type: number
                        description: Absolute IDR price for this combination
                      available:
                        type: boolean
                        default: true
                    required:
                    - axisValues
                    - priceValue
                priceCalculationMode:
                  type: string
                  enum:
                  - SUM_AXIS_DELTAS
                  - EXPLICIT_PRICE
                  description: 'SUM_AXIS_DELTAS — final price = base offer price + sum of axis priceDeltas. EXPLICIT_PRICE
                    — final price = priceValue from matching explicitCombinations entry.

                    '
                  default: SUM_AXIS_DELTAS
              required:
              - generateAllCombinations
        customisationGroups:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
                example: CG-SIZE
              name:
                $ref: '#/components/schemas/LocalisedText'
              selectionType:
                type: string
                enum:
                - SINGLE_REQUIRED
                - SINGLE_OPTIONAL
                - MULTIPLE_OPTIONAL
                - FIXED
              minSelections:
                type: integer
                minimum: 0
              maxSelections:
                type: integer
                minimum: 1
              sequence:
                type: integer
              inputType:
                type: string
                enum:
                - select
                - text
                - number
                - date
                - boolean
                default: select
              options:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: string
                    label:
                      $ref: '#/components/schemas/LocalisedText'
                    resourceId:
                      type: string
                    priceDelta:
                      type: object
                      additionalProperties: false
                      required:
                      - type
                      - value
                      properties:
                        type:
                          type: string
                          enum:
                          - FIXED
                          - PERCENT
                        value:
                          type: number
                    available:
                      type: boolean
                      default: true
                  required:
                  - id
                  - label
            required:
            - id
            - name
            - selectionType
            - options
          x-ion-conditional: true
          x-ion-condition: Required when resourceStructure IN [COMPOSED, WITH_EXTRAS]
        menuCategory:
          type: object
          additionalProperties: false
          required:
          - id
          - name
          properties:
            id:
              type: string
            name:
              $ref: '#/components/schemas/LocalisedText'
            sequence:
              type: integer
            imageUrl:
              type: string
              format: uri
          x-ion-conditional: true
          x-ion-condition: Required for F&B providers
        preparationTime:
          type: string
          description: ISO 8601 duration. Time from order confirm to item ready.
          example: PT20M
          x-ion-conditional: true
          x-ion-condition: Required for F&B and made-to-order items
        productCode:
          type: object
          additionalProperties: false
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - GTIN
              - EAN
              - UPC
              - ISBN
              - ASIN
              - HSN
              - ION_SKU
            value:
              type: string
          example:
            type: GTIN
            value: '8999999123456'
          x-ion-conditional: true
          x-ion-condition: Required for FMCG, electronics, cross-border products
        images:
          type: array
          items:
            type: string
            format: uri
          description: First image is primary thumbnail. Additional images for gallery.
        itemRating:
          type: number
          minimum: 1
          maximum: 5
          description: Aggregate seller-maintained rating 1-5. Base items only.
          example: 4.3
        logisticsServiceType:
          type: string
          enum:
          - DOMESTIC_SURFACE
          - DOMESTIC_AIR
          - HYPERLOCAL
          - INTERNATIONAL_AIR
          - INTERNATIONAL_OCEAN
          description: Logistics service type. Determines flow and performance states.
          example: HYPERLOCAL
        availability:
          type: object
          additionalProperties: false
          required:
          - status
          properties:
            status:
              type: string
              enum:
              - IN_STOCK
              - LOW_STOCK
              - OUT_OF_STOCK
              - PREORDER
              - DISCONTINUED
              description: 'IN_STOCK: adequate quantity available. LOW_STOCK: limited — BAP may show urgency signal.
                OUT_OF_STOCK: not available, no backorder. PREORDER: can be pre-ordered before availability date.
                DISCONTINUED: permanently removed.

                '
            nextAvailableAt:
              type: string
              format: date-time
              description: When available again. For PREORDER and OUT_OF_STOCK.
            maxOrderQty:
              type: integer
              minimum: 1
              description: Per-order cap. Not actual stock count.
            backorderAllowed:
              type: boolean
              default: false
            preorderAllowed:
              type: boolean
              default: false
            substitutionAllowed:
              type: boolean
              description: Seller may substitute with equivalent if this item unavailable.
              default: false
        identity:
          type: object
          additionalProperties: false
          properties:
            brand:
              type: string
              example: Indofood
            model:
              type: string
              example: iPhone 14
            modelYear:
              type: integer
              example: 2024
            sku:
              type: string
              description: Seller internal SKU
              example: PIZ-PEP-MED-CHT
        physical:
          type: object
          additionalProperties: false
          properties:
            colour:
              type: string
              pattern: ^#[0-9A-Fa-f]{6}$
              example: '#FF5733'
            colourName:
              type: string
              description: Required when colour is specified
              example: Coral
            dimensions:
              type: object
              additionalProperties: false
              properties:
                lengthCm:
                  type: number
                  minimum: 0
                widthCm:
                  type: number
                  minimum: 0
                heightCm:
                  type: number
                  minimum: 0
            weightKg:
              type: number
              minimum: 0
              example: 0.5
        packaged:
          type: object
          additionalProperties: false
          properties:
            netQuantity:
              type: object
              additionalProperties: false
              properties:
                value:
                  type: number
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - MILLILITRE
                  - LITRE
                  - PIECE
                  - DOZEN
                  - METER
                  - CENTIMETER
              example:
                value: 85
                unit: GRAM
              required:
              - value
              - unit
            manufacturerOrPacker:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum:
                  - MANUFACTURER
                  - PACKER
                  - IMPORTER
                name:
                  type: string
                  example: PT Indofood CBP Sukses Makmur Tbk
                address:
                  type: string
                  example: Jl. Ancol Barat I No. 9-10, Jakarta Utara 14430
              required:
              - type
              - name
              - address
            manufacturePackingImportDate:
              type: object
              additionalProperties: false
              properties:
                month:
                  type: integer
                  minimum: 1
                  maximum: 12
                year:
                  type: integer
                  minimum: 2000
            monthYearOfManufacture:
              type: string
              pattern: ^[0-9]{2}/[0-9]{4}$
              example: 04/2026
            expiryDate:
              type: string
              format: date
              description: Required for food, beverage, pharma, cosmetics
              example: 2027-04-19
            commonOrGenericName:
              type: string
              example: Mie Instan
            hsnCode:
              type: string
              description: Harmonized System Nomenclature code
              example: '1902.30'
          x-ion-regulatory: PerBPOM 31/2018 tentang Label Pangan Olahan
          x-ion-conditional: true
          x-ion-condition: Required for packaged goods
        regulatory:
          type: object
          additionalProperties: false
          properties:
            registrations:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  scheme:
                    type: string
                    enum:
                    - BPOM_MD
                    - BPOM_ML
                    - BPOM_TR
                    - MUI_HALAL
                    - SNI
                    - SP_PIRT
                    - KEMENKES
                    - SIUP
                  id:
                    type: string
                  role:
                    type: string
                    enum:
                    - BRAND_OWNER
                    - MANUFACTURER
                    - IMPORTER
                    - PACKER
                  url:
                    type: string
                    format: uri
                  validUntil:
                    type: string
                    format: date
                required:
                - scheme
                - id
            foodRegulatoryDeclaration:
              type: object
              additionalProperties: false
              properties:
                nutritionalInfo:
                  type: string
                  example: Energi 350 kkal per 100g; Protein 10g; Lemak Total 5g
                additivesInfo:
                  type: string
                ingredientsInfo:
                  type: string
                brandOwnerBpomLicenseNo:
                  type: string
                importerBpomLicenseNo:
                  type: string
                mfgLicenseNo:
                  type: string
            nutrition:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  nutrient:
                    type: string
                    example: Protein
                  value:
                    type: object
                    additionalProperties: false
                    required:
                    - unitCode
                    - unitQuantity
                    properties:
                      unitCode:
                        type: string
                        enum:
                        - G
                        - MG
                        - MCG
                        - KCAL
                        - KJ
                        - IU
                        - PERCENT
                      unitQuantity:
                        type: number
                required:
                - nutrient
                - value
            additives:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  type:
                    type: string
                    enum:
                    - CONTAINS
                    - FREE_FROM
                  value:
                    type: string
            credentials:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  type:
                    type: string
                  uri:
                    type: string
                    format: uri
                  issuer:
                    type: string
                  validUntil:
                    type: string
                    format: date
                required:
                - type
                - uri
            backImage:
              type: string
              format: uri
              description: Back-of-pack statutory requirements image
        food:
          type: object
          additionalProperties: false
          properties:
            classification:
              type: string
              enum:
              - VEG
              - NON_VEG
              - HALAL
              - EGG
              example: HALAL
            allergens:
              type: array
              items:
                type: string
                enum:
                - GLUTEN
                - NUTS
                - DAIRY
                - EGGS
                - SOY
                - SHELLFISH
                - FISH
                - SESAME
                - SULPHITES
                - CELERY
                - MUSTARD
                - LUPIN
            cuisineType:
              type: string
              example: Padang
            spiceLevel:
              type: string
              enum:
              - NONE
              - LOW
              - MEDIUM
              - HIGH
              - EXTRA_HOT
            freshProduce:
              type: object
              additionalProperties: false
              properties:
                netQuantityDeclaration:
                  type: string
                  example: 1 kg
                harvestDate:
                  type: string
                  format: date
          x-ion-conditional: true
          x-ion-condition: Required for food and beverage resources
        preparation:
          type: object
          additionalProperties: false
          properties:
            instructions:
              type: string
              example: Panggang di oven 200°C selama 15 menit
            storage:
              type: string
              example: Simpan di tempat sejuk dan kering
            shelfLife:
              type: string
              description: ISO 8601 duration
              example: PT2H
          x-ion-conditional: true
          x-ion-condition: Required for F&B and perishable products
        fashion:
          type: object
          additionalProperties: false
          properties:
            gender:
              type: string
              enum:
              - MALE
              - FEMALE
              - UNISEX
              - BOYS
              - GIRLS
            size:
              type: string
              example: L
            sizeChart:
              type: string
              format: uri
            fabric:
              type: string
              example: Katun
            fabricComposition:
              type: string
              example: 100% Katun
              x-ion-regulatory: PerBSN SNI 0055:2009
            fitType:
              type: string
              enum:
              - SLIM
              - REGULAR
              - OVERSIZED
              - RELAXED
              - ATHLETIC
            sleeveType:
              type: string
              enum:
              - SLEEVELESS
              - SHORT
              - THREE_QUARTER
              - FULL
              - NONE
            collarType:
              type: string
              enum:
              - ROUND
              - V_NECK
              - POLO
              - SPREAD
              - MANDARIN
              - HOODIE
              - NONE
            occasion:
              type: string
              enum:
              - CASUAL
              - FORMAL
              - ETHNIC
              - SPORTS
              - PARTY
              - BEACH
              - WORKWEAR
            pattern:
              type: string
              enum:
              - SOLID
              - PRINTED
              - STRIPED
              - CHECKED
              - EMBROIDERED
              - TIE_DYE
              - BATIK
            careInstructions:
              type: string
              example: Cuci tangan, jangan diperas, jemur di tempat teduh
          x-ion-conditional: true
          x-ion-condition: Required for fashion and apparel products
        electronics:
          type: object
          additionalProperties: false
          properties:
            ram:
              type: integer
            ramUnit:
              type: string
              enum:
              - MB
              - GB
              default: GB
            rom:
              type: integer
            romUnit:
              type: string
              enum:
              - MB
              - GB
              - TB
              default: GB
            storage:
              type: integer
            storageUnit:
              type: string
              enum:
              - MB
              - GB
              - TB
              default: GB
            storageCapacity:
              type: integer
              description: Appliance capacity. Fridge=litres, Washer=kg load
            storageCapacityUnit:
              type: string
              enum:
              - LITRE
              - KG
              - CUBIC_FEET
            screenSize:
              type: number
              description: Screen size in inches
              example: 6.1
            primaryCamera:
              type: integer
              description: Megapixels
            secondaryCamera:
              type: integer
            cpu:
              type: string
              example: A15 Bionic
            gpu:
              type: string
            batteryCapacity:
              type: integer
              description: mAh
            osType:
              type: string
              enum:
              - IOS
              - ANDROID
              - WINDOWS
              - MACOS
              - LINUX
              - TIZEN
              - WEBOS
              - OTHER
            osVersion:
              type: string
              example: Android 14
            connectivity:
              type: array
              items:
                type: string
                enum:
                - WIFI
                - BLUETOOTH
                - NFC
                - USB_C
                - USB_A
                - HDMI
                - ETHERNET
                - LIGHTNING
                - MMWAVE_5G
                - SUB6_5G
                - 4G_LTE
                - 3G
                - IR_BLASTER
            wattage:
              type: integer
              description: Power consumption watts
            voltage:
              type: string
              example: 220V
            energyRating:
              type: integer
              minimum: 1
              maximum: 5
              description: BSN energy efficiency star rating
          x-ion-conditional: true
          x-ion-condition: Required for electronics and appliance products
        beauty:
          type: object
          additionalProperties: false
          properties:
            concern:
              type: string
              example: jerawat
            ingredient:
              type: string
              example: niacinamide
            conscious:
              type: string
              enum:
              - NATURAL
              - ORGANIC
              - VEGAN
              - CRUELTY_FREE
              - HALAL_COSMETICS
            preference:
              type: string
              enum:
              - HERBAL
              - AYURVEDIC
              - CHEMICAL_FREE
              - FRAGRANCE_FREE
              - ALCOHOL_FREE
            formulation:
              type: string
              enum:
              - LIQUID
              - CREAM
              - GEL
              - POWDER
              - SERUM
              - BALM
              - SPRAY
              - FOAM
              - STICK
              - SHEET
            skinType:
              type: string
              enum:
              - ALL
              - NORMAL
              - OILY
              - DRY
              - COMBINATION
              - SENSITIVE
            hairType:
              type: string
              enum:
              - ALL
              - NORMAL
              - OILY
              - DRY
              - DAMAGED
              - CURLY
              - STRAIGHT
            spf:
              type: integer
              minimum: 0
              example: 50
            gender:
              type: string
              enum:
              - MALE
              - FEMALE
              - UNISEX
            volume:
              type: object
              additionalProperties: false
              properties:
                value:
                  type: number
                unit:
                  type: string
                  enum:
                  - ML
                  - G
                  - OZ
          x-ion-regulatory: PerBPOM 23/2019 tentang Persyaratan Teknis Kosmetika
          x-ion-conditional: true
          x-ion-condition: Required for beauty and personal care products
        agritech:
          type: object
          additionalProperties: false
          properties:
            harvestDate:
              type: string
              format: date
            produceGrade:
              type: string
              enum:
              - PREMIUM
              - GRADE_A
              - GRADE_B
              - GRADE_C
            mandiReferencePrice:
              type: number
              description: Government mandi reference price IDR/kg
            pesticideDeclaration:
              type: string
              enum:
              - PESTICIDE_FREE
              - LOW_PESTICIDE
              - STANDARD
              - ORGANIC_CERTIFIED
            organicCertification:
              type: object
              additionalProperties: false
              properties:
                certBody:
                  type: string
                  example: Lembaga Sertifikasi Organik Seloliman
                certNumber:
                  type: string
            unitOfMeasure:
              type: object
              additionalProperties: false
              properties:
                unit:
                  type: string
                  enum:
                  - GRAM
                  - KILOGRAM
                  - LITRE
                  - MILLILITRE
                  - PIECE
                  - DOZEN
                  - BUNCH
                  - IKAT
                value:
                  type: number
              required:
              - unit
              - value
          x-ion-conditional: true
          x-ion-condition: Required for agritech and fresh produce
        pharmacy:
          type: object
          additionalProperties: false
          properties:
            prescriptionRequired:
              type: boolean
            dosageForm:
              type: string
              enum:
              - TABLET
              - CAPSULE
              - SYRUP
              - INJECTION
              - OINTMENT
              - DROPS
              - INHALER
              - SUPPOSITORY
              - PATCH
            strength:
              type: string
              example: 500 mg
            activeIngredients:
              type: array
              items:
                type: string
            coldChainRequired:
              type: boolean
          x-ion-regulatory: PerBPOM Nomor 4 Tahun 2018
          x-ion-conditional: true
          x-ion-condition: Required for pharmaceutical and OTC medicine
        installation:
          type: object
          additionalProperties: false
          properties:
            providedBySeller:
              type: boolean
            notes:
              type: string
              example: Memerlukan instalasi profesional. Membutuhkan arus 220V khusus.
            required:
            - type
          x-ion-conditional: true
          x-ion-condition: Required for appliances and furniture needing installation
        usage:
          type: object
          additionalProperties: false
          properties:
            indoorOnly:
              type: boolean
            compatibleWith:
              type: array
              items:
                type: string
              example:
              - 220V outlet
              - 36-inch doorway
        warranty:
          type: object
          additionalProperties: false
          properties:
            duration:
              type: string
              description: ISO 8601 duration. Minimum P1Y for electronics.
              example: P2Y
            type:
              type: string
              enum:
              - MANUFACTURER
              - SELLER
              - EXTENDED
              - NONE
            terms:
              type: string
              example: Garansi resmi 2 tahun. Tidak mencakup kerusakan fisik dan air.
            serviceCenter:
              type: string
          x-ion-regulatory: UU 8/1999 tentang Perlindungan Konsumen Pasal 25; PP 36/2023
          x-ion-conditional: true
          x-ion-condition: Required for electronics, appliances, consumer durables
        ageRestricted:
          type: boolean
          description: Whether product requires age verification at purchase
          default: false
        minAge:
          type: integer
          minimum: 0
          maximum: 21
          description: Minimum purchaser age when ageRestricted is true
          example: 18
          x-ion-conditional: true
          x-ion-condition: Required when ageRestricted is true
        countryOfOrigin:
          type: string
          pattern: ^[A-Z]{3}$
          description: ISO 3166-1 alpha-3 country code
          example: IDN
          x-ion-regulatory: PerBPOM 31/2018 Pasal 36; Permendag 36/2023
        canonicalId:
          type: string
          description: 'Cross-provider product identity. Multiple providers selling the same product share the same
            canonicalId. Enables Buy Box selection on BAP side and cross-seller price comparison. GTIN preferred
            when available; otherwise ION-assigned canonical ID via Atlas.

            '
          example: ION-CAN-ABC123XYZ
          x-ion-conditional: true
          x-ion-condition: Required for marketplace-eligible products (MP-IH, MP-IL)
        featuredOfferEligible:
          type: boolean
          description: 'Whether this offer is eligible for "featured offer" / Buy Box selection. BPP declares eligibility;
            BAP runs selection algorithm. Eligibility typically requires: verified seller, positive rating history,
            standard return policy, Prime-equivalent SLA.

            '
          default: false
        featuredOfferScore:
          type: number
          minimum: 0
          maximum: 1
          description: 'BPP-computed score used by BAP Buy Box algorithm. Factors in price competitiveness, rating,
            SLA reliability, stock depth. Decimal 0-1.

            '
        imageSet:
          type: array
          description: 'Structured images with role metadata. More expressive than the flat images[] array. BAPs
            can render appropriate images per surface. When imageSet is present, images[] may still exist for backward
            compatibility but imageSet is authoritative.

            '
          items:
            type: object
            additionalProperties: false
            properties:
              url:
                type: string
                format: uri
              role:
                type: string
                enum:
                - PRIMARY
                - GALLERY
                - SIZE_CHART
                - SPEC_SHEET
                - LIFESTYLE
                - UNBOXING
                - SIZE_FIT
                - USE_IN_CONTEXT
                - PACKAGING
                - BACK_OF_PACK
                - INGREDIENTS_LABEL
                - NUTRITION_FACTS
              altText:
                $ref: '#/components/schemas/LocalisedText'
              sequence:
                type: integer
              widthPx:
                type: integer
              heightPx:
                type: integer
            required:
            - url
            - role
        videos:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              url:
                type: string
                format: uri
              role:
                type: string
                enum:
                - PRIMARY
                - UNBOXING
                - USE_IN_CONTEXT
                - SIZE_FIT
                - INSTALLATION_GUIDE
                - 360_VIEW
                - LIVE_REPLAY
              durationSeconds:
                type: integer
              thumbnailUrl:
                type: string
                format: uri
            required:
            - url
            - role
        bundleComposition:
          type: array
          description: 'Components of a bundle SKU. Required for bundle offers where individual components carry
            their own regulatory registrations (BPOM, POSTEL, TKDN, warranty).

            '
          items:
            type: object
            additionalProperties: false
            properties:
              componentResourceId:
                type: string
                description: Resource ID of the component product
              quantity:
                type: integer
                minimum: 1
              individualWarrantyDuration:
                type: string
                description: ISO 8601 duration — per-component warranty if different from bundle
              individualBpomReg:
                type: string
                description: Component's own BPOM registration if distinct
              individualPostelReg:
                type: string
                description: Component's own POSTEL cert if distinct
              componentPrice:
                type: number
                description: Unbundled IDR price of component for break-up display
            required:
            - componentResourceId
            - quantity
          x-ion-conditional: true
          x-ion-condition: Required when offer.offerType=BUNDLE
        brandIdentity:
          type: object
          additionalProperties: false
          description: 'Structured brand identity. Replaces string-only identity.brand for Official Store / Brand
            Registry programmes.

            '
          properties:
            name:
              type: string
              example: Samsung
            brandOwnerLegalEntity:
              type: string
              example: PT Samsung Electronics Indonesia
            brandCertificationId:
              type: string
              description: OSS brand certification reference
              example: BRAND-CERT-SAMSUNG-2024
            officialStoreStatus:
              type: boolean
              description: 'Whether this seller is the officially authorised brand store on this marketplace. Validated
                against brand owner whitelist.

                '
            authorisedResellerOf:
              type: array
              items:
                type: string
              description: Brand names this seller is an authorised reseller for
        regionOfOrigin:
          type: string
          pattern: ^[A-Z]{3}-[A-Z0-9]{1,3}$
          description: 'ISO 3166-2 sub-national region code for geographic indication. Required when product claims
            origin-protected status (Kopi Gayo from Aceh IDN-AC, Beras Cianjur from West Java IDN-JB).

            '
          example: IDN-AC
          x-ion-regulatory: UU 20/2016 tentang Merek dan Indikasi Geografis
          x-ion-conditional: true
          x-ion-condition: Required when product claims Geographic Indication status
        geographicIndicationCert:
          type: string
          description: 'Geographic Indication certificate number from DJKI (Direktorat Jenderal Kekayaan Intelektual).

            '
          x-ion-conditional: true
          x-ion-condition: Required when regionOfOrigin is declared for GI products
        digital:
          type: object
          additionalProperties: false
          description: 'Digital goods attributes. Required for DIGITAL_VOUCHER, DIGITAL_TOP_UP, and DIGITAL_SUBSCRIPTION
            resource types.

            '
          properties:
            digitalCategory:
              type: string
              enum:
              - MOBILE_PULSA
              - MOBILE_DATA_PACKAGE
              - ELECTRICITY_TOKEN
              - WATER_BILL
              - INTERNET_BILL
              - PDAM_BILL
              - PBB_TAX
              - BPJS_PAYMENT
              - GIFT_CARD
              - GAME_VOUCHER
              - STREAMING_VOUCHER
              - FOOD_VOUCHER
              - EWALLET_TOP_UP
              - TRANSPORT_VOUCHER
              - EDUCATION_VOUCHER
              - OTHER
              description: 'Type of digital good. MOBILE_PULSA/DATA covered by Indonesian operator regulations;
                GAME_VOUCHER includes Mobile Legends, Free Fire, Valorant, Genshin currencies; STREAMING_VOUCHER
                for Netflix/Disney+ Hotstar/Spotify access codes.

                '
            operatorOrIssuer:
              type: string
              description: 'Issuing operator or brand. For MOBILE_PULSA: TELKOMSEL, XL, INDOSAT, TRI, SMARTFREN.
                For ELECTRICITY_TOKEN: PLN. For GAME_VOUCHER: Moonton, Garena, Riot, etc.

                '
              example: TELKOMSEL
            denomination:
              type: object
              additionalProperties: false
              description: Voucher/top-up denomination
              properties:
                value:
                  type: number
                currency:
                  type: string
                  default: IDR
                unit:
                  type: string
                  enum:
                  - IDR
                  - MB
                  - GB
                  - MINUTES
                  - DIAMONDS
                  - COINS
                  - OTHER
                  description: IDR for money-based; MB/GB for data; DIAMONDS/COINS for in-game
              required:
              - value
              - unit
            deliveryMethod:
              type: string
              enum:
              - PUSH_TO_TARGET
              - CODE_TO_BUYER
              - ACCOUNT_CREDIT
              - QR_VOUCHER
              description: 'PUSH_TO_TARGET: delivered directly to consumer account (pulsa to phone number, PLN token
                to meter, in-game currency to game account). CODE_TO_BUYER: redemption code sent to buyer to redeem
                later. ACCOUNT_CREDIT: credited to buyer''s wallet/account. QR_VOUCHER: scannable QR redeemable
                at merchant.

                '
            target:
              type: object
              additionalProperties: false
              description: Target identifier for delivery
              properties:
                type:
                  type: string
                  enum:
                  - MOBILE_NUMBER
                  - CUSTOMER_ID
                  - ACCOUNT_ID
                  - EMAIL
                  - METER_NUMBER
                  - GAME_USER_ID
                value:
                  type: string
                operatorValidationRequired:
                  type: boolean
                  description: Whether BPP must verify target exists before accepting (e.g. mobile number inquiry)
            redemptionCode:
              type: string
              description: 'Redemption code or voucher code. Returned in on_status[DELIVERED] for CODE_TO_BUYER
                delivery. Must be encrypted in transit.

                '
            redemptionUrl:
              type: string
              format: uri
              description: URL for redemption (streaming service activation, game code page)
            expiryAfterPurchase:
              type: string
              description: ISO 8601 duration — how long the voucher is valid from purchase
              example: P30D
            refundable:
              type: boolean
              default: false
              description: 'Whether the digital good is refundable. Most pulsa/top-up is non-refundable once delivered
                to target. Vouchers may be refundable if unredeemed.

                '
            cancellable:
              type: boolean
              default: false
              description: Whether cancellation is possible before delivery
          x-ion-conditional: true
          x-ion-condition: Required when resourceTangibility IN [DIGITAL_VOUCHER, DIGITAL_TOP_UP, DIGITAL_SUBSCRIPTION]
        dataResidency:
          type: string
          enum:
          - DOMESTIC_ONLY
          - INTERNATIONAL_ALLOWED
          description: 'Data residency requirement for this resource. DOMESTIC_ONLY means all PII and transaction
            data must be processed and stored within Indonesia; BAPs with foreign data processing must skip or refuse
            transactions for this resource. Required for pharmacy, health data, financial services, and regulated
            biometric categories.

            '
          example: DOMESTIC_ONLY
          x-ion-regulatory: UU 27/2022 tentang Pelindungan Data Pribadi (PDP Law)
          x-ion-conditional: true
          x-ion-condition: Required for pharmacy, health-data, financial-services categories
      allOf:
      - $ref: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/main/schema/core/v2/api/v2.0.0/beckn.yaml#/components/schemas/Attributes
      - if:
          properties:
            resourceStructure:
              enum:
              - VARIANT
          required:
          - resourceStructure
        then:
          required:
          - parentResourceId
          - isDefaultVariant
          - variantGroup
      - if:
          properties:
            resourceStructure:
              enum:
              - COMPOSED
              - WITH_EXTRAS
          required:
          - resourceStructure
        then:
          required:
          - customisationGroups
      - if:
          properties:
            ageRestricted:
              const: true
          required:
          - ageRestricted
        then:
          required:
          - minAge
      - if:
          properties:
            resourceStructure:
              const: VARIANT
          required:
          - resourceStructure
        then:
          required:
          - isDefaultVariant
          - variantGroup
      required:
      - quantity
      - resourceStructure
      - resourceTangibility
      - images
      - logisticsServiceType
      - availability
      - ageRestricted
      - countryOfOrigin
      x-ion-closed-extensions: false

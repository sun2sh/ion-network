openapi: 3.1.1
info:
  title: ION Logistics Provider Extension (v1)
  description: >
    Logistics sector provider attributes. Describes the logistics service provider —
    identity, licences, coverage, capabilities, fleet, and operational parameters.
    Attaches to: beckn:Provider.providerAttributes
  version: 1.0.0

components:
  schemas:
    LogisticsProviderAttributes:
      type: object
      title: Logistics Provider Attributes
      additionalProperties: false
      x-jsonld:
        "@context": ./context.jsonld
        "@type": ion:LogisticsProviderAttributes
      x-beckn-attaches-to: Provider.providerAttributes

      properties:

        # ═══ CATALOG TEMPORAL METADATA ═══
        catalogVersion:
          type: string
          x-ion-mandatory: always
          description: >
            Semver catalog version. Incremented on every catalog publish.
            BAPs use this to detect changes and trigger allocation recompute.

        catalogPublishedAt:
          type: string
          format: date-time
          x-ion-mandatory: always
          description: Timestamp when this catalog version was published

        catalogValidFrom:
          type: string
          format: date-time
          x-ion-mandatory: always
          description: >
            Timestamp from which this catalog's offers are bindable.
            May be in the future for pre-announced rate changes.

        catalogValidUntil:
          type: string
          format: date-time
          x-ion-mandatory: optional
          description: >
            If present, catalog supersedes at this time. Typically absent —
            catalog remains valid until a newer version is published.

        rateCardEffectiveFrom:
          type: string
          format: date-time
          x-ion-mandatory: optional
          description: >
            Sometimes rate card effective date differs from catalog publish date
            (e.g. publish new rates a week ahead of effective date for transparency).

        rateCardEffectiveUntil:
          type: string
          format: date-time
          x-ion-mandatory: optional

        catalogChangelogUrl:
          type: string
          format: uri
          x-ion-mandatory: optional
          description: URL to human-readable changelog describing what changed vs prior version

        catalogDeltaReference:
          type: string
          x-ion-mandatory: optional
          description: >
            Reference to the prior catalog version. BAPs can request delta from
            /catalog/pull?from={catalogDeltaReference} to get only changed offers.

        # IDENTITY AND LICENCES
        nibRegistered:
          type: boolean
          description: NIB (Nomor Induk Berusaha) business registration status
          x-ion-mandatory: always

        nibNumber:
          type: string
          description: NIB number for registered logistics entities
          x-ion-mandatory: conditional

        siupNumber:
          type: string
          description: SIUP (Surat Izin Usaha Perdagangan) trading licence number
          x-ion-mandatory: conditional

        alfiMembership:
          x-ion-mandatory: optional
          type: boolean
          description: ALFI (Asosiasi Logistik dan Forwarder Indonesia) member status

        asperindoMembership:
          x-ion-mandatory: optional
          type: boolean
          description: ASPERINDO (express, postal, logistics association) member status

        # PROVIDER MODEL
        providerCategory:
          type: string
          enum:
            - CARRIER_DIRECT
            - FREIGHT_FORWARDER
            - AGGREGATOR
            - MARKETPLACE_LOGISTICS
            - 3PL
            - 4PL
            - WAREHOUSE_OPERATOR
          x-ion-mandatory: always

        aggregatorModel:
          x-ion-mandatory: optional
          type: boolean
          description: True if this BPP aggregates capacity from multiple LSPs

        # SPINES AND MODES
        spinesSupported:
          type: array
          items:
            type: string
            enum:
              - LOG-HYPERLOCAL
              - LOG-PARCEL
              - LOG-FREIGHT
              - LOG-RORO
              - LOG-XB
              - LOG-WAREHOUSE
          x-ion-mandatory: always

        modesSupported:
          type: array
          items:
            type: string
            enum:
              - motorcycle
              - bicycle
              - car
              - van
              - truck
              - rail
              - sea
              - air
              - river
              - ferry
          x-ion-mandatory: always

        # COVERAGE
        coverage:
          type: array
          description: Geographic coverage declarations
          items:
            type: object
            properties:
              provinsiCode:
                type: string
              cityCode:
                type: string
              pincodes:
                type: array
                items:
                  type: string
              coverageType:
                type: string
                enum: [PICKUP, DELIVERY, BOTH]
          x-ion-mandatory: always

        # CAPABILITIES
        coldChainCertified:
          x-ion-mandatory: optional
          type: boolean
          description: Cold chain handling capability

        coldChainTemperatureZones:
          type: array
          items:
            type: string
            enum: [FROZEN, CHILLED, AMBIENT, CONTROLLED_ROOM]
          x-ion-mandatory: conditional

        hazmatCertified:
          x-ion-mandatory: optional
          type: boolean
          description: Dangerous goods handling certification

        hazmatClasses:
          type: array
          description: IATA/IMO dangerous goods classes supported
          items:
            type: string
          x-ion-mandatory: conditional

        highValueCapable:
          x-ion-mandatory: optional
          type: boolean
          description: Capable of handling high-declared-value shipments with enhanced security

        beaCukaiLicenceNumber:
          x-ion-mandatory: optional
          type: string
          description: PPJK (customs broker) licence for LOG-XB providers

        # OPERATIONS
        operatingHours:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
                enum: [MON, TUE, WED, THU, FRI, SAT, SUN, PUBLIC_HOLIDAY]
              opens:
                type: string
                format: time
              closes:
                type: string
                format: time
          x-ion-mandatory: always

        holidayCalendar:
          x-ion-mandatory: optional
          type: array
          description: Dates when no service is provided
          items:
            type: string
            format: date

        pickupCutoffTimes:
          x-ion-mandatory: optional
          type: array
          description: Latest time to request pickup for same-day or next-day dispatch per corridor
          items:
            type: object
            properties:
              corridor:
                type: string
              serviceLevel:
                type: string
              cutoffTime:
                type: string
                format: time

        # FLEET (for HYPERLOCAL providers)
        fleetType:
          x-ion-mandatory: optional
          type: array
          items:
            type: string
            enum: [OWN_FLEET, PARTNER_FLEET, CROWDSOURCED, DEDICATED_PARTNER]

        maxDeliveryRadiusKm:
          x-ion-mandatory: optional
          type: number
          description: Maximum service radius for hyperlocal providers

        # WAREHOUSE SPECIFIC
        warehouseLocations:
          x-ion-mandatory: optional
          type: array
          description: For LOG-WAREHOUSE providers
          items:
            type: object
            properties:
              locationId:
                type: string
              address:
                type: object
              warehouseType:
                type: string
                enum: [BONDED, NON_BONDED, COLD_STORAGE, FULFILMENT_CENTRE, DARK_STORE, CROSS_DOCK]
              totalCapacityCbm:
                type: number
              bondedStatus:
                type: boolean

        fwaApplicable:
          x-ion-mandatory: optional
          type: boolean
          description: Whether this provider accepts Framework Agreement-governed transactions

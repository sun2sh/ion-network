# Weight Dispute Policy: Standard 10% Tolerance
# ion://policy/weight-dispute.standard-10pct-tolerance

id: weight-dispute.standard-10pct-tolerance
type: WEIGHT_DISPUTE_POLICY
sector: logistics

tolerancePct: 10
toleranceMinKg: 0.5
description: >
  Weight discrepancies within 10% of declared weight (or 0.5kg minimum)
  are absorbed by the LSP. Above this threshold, LSP may raise a
  weight-dispute branch.

measurementAuthority: LSP_HUB_SCALE
buyerResponseWindowHours: 24
escalationAfterHours: 72

evidenceRequired:
  - SCALE_PHOTO
  - MEASUREMENT_TIMESTAMP
  - MEASUREMENT_LOCATION

---

# Weight Dispute Policy: Enterprise 5% Tolerance
# ion://policy/weight-dispute.enterprise-5pct-tolerance

id: weight-dispute.enterprise-5pct-tolerance
type: WEIGHT_DISPUTE_POLICY
sector: logistics

tolerancePct: 5
toleranceMinKg: 0.2

measurementAuthority: THIRD_PARTY_CERTIFIED_SCALE
buyerResponseWindowHours: 48
escalationAfterHours: 96

evidenceRequired:
  - CERTIFIED_SCALE_READING
  - THIRD_PARTY_CERTIFICATE
  - PHOTO_AT_TIME_OF_MEASUREMENT

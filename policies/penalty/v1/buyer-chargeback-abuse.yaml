iri: ion://policy/penalty.buyer-chargeback-abuse.standard
version: "1.0.0"
versionEffectiveFrom: "2026-05-01"
category: PENALTY
subCategory: BUYER_CHARGEBACK_ABUSE
status: ratified
ratifiedAt: "2026-04-15"

displayText:
  id: "Denda penyalahgunaan chargeback"
  en: "Chargeback abuse penalty"

triggerConditions:
  - condition: CHARGEBACK_RULED_AGAINST_BUYER
    severity: MAJOR
    penalty:
      type: PERCENTAGE
      value: 0.2
  - condition: CHARGEBACK_ABUSE_3X_YEAR
    severity: CRITICAL
    penalty:
      type: FIXED
      amount: 0
    additionalAction: BUYER_ACCOUNT_SUSPENDED

appliedVia: buyer_account_flag
settledTo: NETWORK_FUND
collectedBy: ION_CENTRAL

disputeRights:
  - "Penalized party may dispute via raise channel within 7 days"
  - "Dispute goes to marketplace mediation first, then BPSK/BANI per disputePolicy"

regulatoryBasis:
  - "OJK regulations on chargeback"
  - "ION Network Anti-Fraud Policy"

supersededBy: null
deprecatedAt: null

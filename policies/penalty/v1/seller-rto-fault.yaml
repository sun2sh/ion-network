iri: ion://policy/penalty.seller.rto_seller_fault
version: "1.0.0"
versionEffectiveFrom: "2026-05-01"
category: PENALTY
subCategory: SELLER_RTO_FAULT
status: ratified
ratifiedAt: "2026-04-15"

displayText:
  id: "Denda RTO kesalahan penjual"
  en: "RTO due to seller fault penalty"

triggerConditions:
  - condition: RTO_WRONG_ADDRESS_BY_SELLER
    severity: MAJOR
    penalty:
      type: PERCENTAGE
      value: 0.1
    additionalAction: SHIPPING_COST_BORNE_BY_SELLER
  - condition: RTO_PACKAGING_DAMAGE
    severity: MAJOR
    penalty:
      type: FIXED
      amount: 15000

appliedVia: reconcile.slaPenaltyDeduction
settledTo: CONSUMER
collectedBy: ION_CENTRAL

disputeRights:
  - "Penalized party may dispute via raise channel within 7 days"
  - "Dispute goes to marketplace mediation first, then BPSK/BANI per disputePolicy"

regulatoryBasis:
  - "UU 8/1999 Pasal 8"

supersededBy: null
deprecatedAt: null

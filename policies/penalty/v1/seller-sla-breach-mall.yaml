iri: ion://policy/penalty.seller-sla-breach.mall
version: "1.0.0"
versionEffectiveFrom: "2026-05-01"
category: PENALTY
subCategory: SELLER_SLA_BREACH
status: ratified
ratifiedAt: "2026-04-15"

displayText:
  id: "Denda SLA penjual - tier Mall"
  en: "Seller SLA breach penalty - Mall tier (stricter)"

triggerConditions:
  - condition: FIRST_RESPONSE_SLA_MISSED
    severity: MINOR
    penalty:
      type: PERCENTAGE
      value: 0.05
  - condition: RESOLUTION_SLA_MISSED
    severity: MAJOR
    penalty:
      type: PERCENTAGE
      value: 0.1
  - condition: ESCALATION_TO_BPSK
    severity: CRITICAL
    penalty:
      type: PERCENTAGE
      value: 0.2
  - condition: REPEAT_OFFENDER_2X_30D
    severity: CRITICAL
    penalty:
      type: PERCENTAGE
      value: 0.3
    additionalAction: MALL_STATUS_REVOKED

appliedVia: reconcile.slaPenaltyDeduction
settledTo: CONSUMER
collectedBy: ION_CENTRAL

disputeRights:
  - "Penalized party may dispute via raise channel within 7 days"
  - "Dispute goes to marketplace mediation first, then BPSK/BANI per disputePolicy"

regulatoryBasis:
  - "ION Network Policy - Mall Tier Standards"

supersededBy: null
deprecatedAt: null

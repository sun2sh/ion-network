iri: ion://policy/penalty.seller-cancel-without-cause.standard.premium
version: "1.0.0"
versionEffectiveFrom: "2026-05-01"
category: PENALTY
subCategory: SELLER_CANCEL_WITHOUT_CAUSE
status: ratified
ratifiedAt: "2026-04-15"

displayText:
  id: "Denda pembatalan premium/flash"
  en: "Seller cancellation penalty - Premium/Flash tier"

triggerConditions:
  - condition: CANCEL_AFTER_CONFIRM
    severity: CRITICAL
    penalty:
      type: PERCENTAGE
      value: 0.25
    additionalAction: LIVE_SESSION_STRIKE
  - condition: REPEAT_2X_30D
    severity: CRITICAL
    penalty:
      type: FIXED
      amount: 0
    additionalAction: PREMIUM_STATUS_REVOKED

appliedVia: reconcile.slaPenaltyDeduction
settledTo: CONSUMER
collectedBy: ION_CENTRAL

disputeRights:
  - "Penalized party may dispute via raise channel within 7 days"
  - "Dispute goes to marketplace mediation first, then BPSK/BANI per disputePolicy"

regulatoryBasis:
  - "ION Premium Tier Standards"

